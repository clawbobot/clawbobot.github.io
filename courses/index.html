<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anthropic 学院 · Claude 101 中文版</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    :root {
      --bg: #f7f8fc;
      --sidebar-bg: #ffffff;
      --surface: #ffffff;
      --border: #e4e7f0;
      --text: #1a1d2e;
      --muted: #6b7280;
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --purple-mid: #a78bfa;
      --green: #059669;
      --green-light: #d1fae5;
      --orange: #d97706;
      --orange-light: #fef3c7;
      --blue: #2563eb;
      --blue-light: #dbeafe;
      --red: #dc2626;
      --red-light: #fee2e2;
      --sidebar-w: 280px;
      --header-h: 64px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", Inter, ui-sans-serif, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Top header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      z-index: 100;
      gap: 1rem;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
    }

    .logo-badge {
      background: var(--purple);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
    }

    .header-course-title {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }

    .header-progress {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .progress-bar-wrap {
      width: 120px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple-mid));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      padding-top: var(--header-h);
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0 2rem;
    }

    .sidebar-section {
      margin-bottom: 0.25rem;
    }

    .sidebar-module {
      padding: 0.6rem 1.25rem;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .sidebar-lesson {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.25rem 0.55rem 1.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 120ms, border-color 120ms;
      color: var(--muted);
      text-decoration: none;
    }

    .sidebar-lesson:hover {
      background: var(--bg);
      color: var(--text);
    }

    .sidebar-lesson.active {
      background: var(--purple-light);
      border-left-color: var(--purple);
      color: var(--purple);
      font-weight: 600;
    }

    .sidebar-lesson.done {
      color: var(--green);
    }

    .lesson-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.6rem;
    }

    .sidebar-lesson.done .lesson-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .sidebar-lesson.active .lesson-check {
      border-color: var(--purple);
    }

    /* ── Main content ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 860px;
      padding: 3rem 3rem 6rem;
    }

    .lesson-header {
      margin-bottom: 2.5rem;
    }

    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .module-tag {
      background: var(--purple-light);
      color: var(--purple);
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.72rem;
    }

    .lesson-header h1 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .lesson-lead {
      font-size: 1.08rem;
      color: var(--muted);
      max-width: 640px;
      line-height: 1.8;
    }

    /* ── Cards ── */
    .card {
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin: 1.5rem 0;
    }

    .card-tip {
      background: var(--blue-light);
      border-left: 4px solid var(--blue);
    }

    .card-note {
      background: var(--orange-light);
      border-left: 4px solid var(--orange);
    }

    .card-key {
      background: var(--purple-light);
      border-left: 4px solid var(--purple);
    }

    .card-success {
      background: var(--green-light);
      border-left: 4px solid var(--green);
    }

    .card-warn {
      background: var(--red-light);
      border-left: 4px solid var(--red);
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .card-tip .card-label { color: var(--blue); }
    .card-note .card-label { color: var(--orange); }
    .card-key .card-label { color: var(--purple); }
    .card-success .card-label { color: var(--green); }
    .card-warn .card-label { color: var(--red); }

    /* ── Key points ── */
    .key-points {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin: 1.5rem 0;
    }

    .key-points h3 {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 0.75rem;
    }

    .key-points ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .key-points li {
      display: flex;
      gap: 0.6rem;
      font-size: 0.92rem;
    }

    .key-points li::before {
      content: "✓";
      color: var(--purple);
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ── Prompt box ── */
    .prompt-box {
      background: #1e1e2e;
      border-radius: 14px;
      margin: 1.5rem 0;
      overflow: hidden;
    }

    .prompt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .prompt-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a78bfa;
    }

    .copy-btn {
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 7px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 150ms;
    }

    .copy-btn:hover { background: rgba(124,58,237,0.4); }
    .copy-btn.copied { color: #6ee7b7; border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.15); }

    .prompt-body {
      padding: 1.2rem 1.4rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      color: #e2e8f0;
      white-space: pre-wrap;
    }

    /* ── Quiz ── */
    .quiz {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      margin: 2rem 0;
    }

    .quiz-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.75rem;
    }

    .quiz h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 150ms, background 150ms;
      font-size: 0.9rem;
    }

    .quiz-option:hover { border-color: var(--purple-mid); background: var(--purple-light); }
    .quiz-option.selected-correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .quiz-option.selected-wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }

    .quiz-option input { margin-top: 2px; accent-color: var(--purple); }

    .quiz-result {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .quiz-result.correct { background: var(--green-light); color: var(--green); display: block; }
    .quiz-result.wrong { background: var(--red-light); color: var(--red); display: block; }

    /* ── Hands-on exercise ── */
    .exercise {
      background: linear-gradient(135deg, #fdf4ff, #ede9fe);
      border: 1px solid #d8b4fe;
      border-radius: 14px;
      padding: 1.6rem;
      margin: 2rem 0;
    }

    .exercise-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 0.75rem;
    }

    .exercise h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .exercise p, .exercise li {
      font-size: 0.9rem;
      color: #4c1d95;
    }

    .exercise ol {
      padding-left: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    /* ── Nav buttons ── */
    .lesson-nav {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: border-color 150ms, background 150ms;
      text-decoration: none;
    }

    .nav-btn:hover { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }

    .nav-btn.primary {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .nav-btn.primary:hover { background: #6d28d9; border-color: #6d28d9; color: #fff; }

    /* ── Body text ── */
    .lesson-body h2 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 2rem 0 0.75rem;
    }

    .lesson-body p {
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: #374151;
    }

    .lesson-body ul, .lesson-body ol {
      padding-left: 1.4rem;
      margin-bottom: 1rem;
    }

    .lesson-body li {
      font-size: 0.95rem;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    code {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 0.1em 0.35em;
      font-family: ui-monospace, monospace;
      font-size: 0.85em;
    }

    /* ── Certificate ── */
    .certificate {
      background: linear-gradient(135deg, #fdf4ff 0%, #ede9fe 50%, #dbeafe 100%);
      border: 2px solid #c4b5fd;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      margin: 2rem 0;
    }

    .certificate-icon { font-size: 4rem; margin-bottom: 1rem; }
    .certificate h2 { font-size: 1.8rem; font-weight: 800; color: var(--purple); margin-bottom: 0.5rem; }
    .certificate p { color: var(--muted); margin-bottom: 1.5rem; }

    .cert-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.8rem;
      background: var(--purple);
      color: #fff;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      transition: background 150ms;
    }

    .cert-btn:hover { background: #6d28d9; }

    /* ── Mobile ── */
    .sidebar-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.25rem;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform 250ms ease; z-index: 90; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 1.5rem 1.25rem 4rem; }
      .sidebar-toggle { display: block; }
      .header-course-title { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">
    <span class="logo-badge">A</span>
    Anthropic 学院
  </a>
  <div class="header-course-title">Claude 101 · 从入门到实战</div>
  <div class="header-progress">
    <span id="progress-text">0 / 14 节</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div id="sidebar-content"><!-- filled by JS --></div>
  </nav>
  <main class="main" id="main-content"><!-- filled by JS --></main>
</div>

<script>
const STORAGE_KEY = 'claude101-done';

const course = {
  title: 'Claude 101 · 从入门到实战',
  modules: [
    {
      title: '模块一：认识 Claude',
      lessons: [
        {
          id: 'what-is-claude',
          title: '什么是 Claude？',
          duration: '8 分钟',
          content: `
<div class="lesson-header">
  <div class="lesson-meta">
    <span class="module-tag">模块一</span>
    <span>第 1 节 · 8 分钟</span>
  </div>
  <h1>什么是 Claude？</h1>
  <p class="lesson-lead">Claude 是由 Anthropic 开发的 AI 助手。和一位知识渊博、反应灵敏的同事一样，它能帮你写作、分析、编程、学习——全天候待命。</p>
</div>
<div class="lesson-body">
  <h2>Claude 能做什么？</h2>
  <p>Claude 是一个大型语言模型（LLM），能够理解并生成人类语言。你可以用自然语言与它对话，就像和人说话一样。</p>
  <ul>
    <li><strong>写作与编辑：</strong>起草邮件、报告、演讲稿、创意内容</li>
    <li><strong>分析与总结：</strong>提炼长文档要点、对比信息、生成见解</li>
    <li><strong>编程辅助：</strong>解释代码、调试、生成脚本</li>
    <li><strong>头脑风暴：</strong>激发创意、列出选项、扮演讨论对象</li>
    <li><strong>学习与研究：</strong>解释概念、回答问题、深入探讨主题</li>
  </ul>

  <div class="card card-key">
    <div class="card-label">核心理念</div>
    <p>Claude 由 Anthropic 设计，将安全性与实用性放在同等重要的位置。它被训练为诚实、无害，并尽力在不确定时明确说明。</p>
  </div>

  <h2>Claude 和搜索引擎有什么区别？</h2>
  <p>搜索引擎给你链接，Claude 给你<strong>对话</strong>。它会根据你的具体情况量身定制回答，而不是返回一堆网页让你自己筛选。</p>
  <p>把 Claude 想象成一位顾问：你描述问题，它帮你思考、起草、解释。</p>

  <div class="card card-tip">
    <div class="card-label">提示</div>
    <p>Claude 的知识有截止日期，无法实时获取互联网信息（除非你给它配置了工具）。遇到最新事件，请务必核实。</p>
  </div>

  <h2>Claude 家族：哪个适合你？</h2>
  <ul>
    <li><strong>Claude Haiku：</strong>速度最快，适合简单、高频任务</li>
    <li><strong>Claude Sonnet：</strong>速度与能力的最佳平衡，日常使用首选</li>
    <li><strong>Claude Opus：</strong>能力最强，适合复杂推理与长文档处理</li>
  </ul>

  <div class="key-points">
    <h3>本节要点</h3>
    <ul>
      <li>Claude 是 Anthropic 开发的 AI 助手，擅长语言类任务</li>
      <li>它以对话方式工作，能理解上下文、根据需求调整回答</li>
      <li>不同型号在速度与能力之间有所取舍</li>
      <li>Claude 以诚实和安全为设计原则，不确定时会说"我不确定"</li>
    </ul>
  </div>
</div>

<div class="quiz">
  <div class="quiz-label">📝 小测验</div>
  <h3>Claude 与传统搜索引擎最大的区别是什么？</h3>
  <div class="quiz-options">
    <label class="quiz-option"><input type="radio" name="q1" value="a"> 速度更慢</label>
    <label class="quiz-option"><input type="radio" name="q1" value="b"> 以对话方式提供个性化回答，而非返回链接列表</label>
    <label class="quiz-option"><input type="radio" name="q1" value="c"> 只能回答编程问题</label>
    <label class="quiz-option"><input type="radio" name="q1" value="d"> 必须联网才能使用</label>
  </div>
  <div class="quiz-result" id="q1-result"></div>
</div>

<div class="exercise">
  <div class="exercise-label">🚀 动手练习</div>
  <h3>第一次对话</h3>
  <ol>
    <li>打开 <code>claude.ai</code>（或你的公司 Claude 入口）</li>
    <li>用一句话描述你今天的工作挑战</li>
    <li>观察 Claude 的回应——它是否理解了你的意思？</li>
    <li>用追问"能具体说说第二点吗？"测试它的上下文理解能力</li>
  </ol>
</div>`
        },
        {
          id: 'first-conversation',
          title: '你的第一次对话',
          duration: '10 分钟',
          content: `
<div class="lesson-header">
  <div class="lesson-meta">
    <span class="module-tag">模块一</span>
    <span>第 2 节 · 10 分钟</span>
  </div>
  <h1>你的第一次对话</h1>
  <p class="lesson-lead">与 Claude 对话不需要学习特殊语法。但掌握几个技巧，能让你的问题得到更精准、更有用的回答。</p>
</div>
<div class="lesson-body">
  <h2>好问题的三个要素</h2>
  <p>Claude 的回答质量取决于你的问题质量。一个好问题通常包含：</p>
  <ol>
    <li><strong>背景（Context）：</strong>你是谁、这件事的来龙去脉是什么</li>
    <li><strong>任务（Task）：</strong>你希望 Claude 做什么</li>
    <li><strong>格式（Format）：</strong>你想要什么形式的输出</li>
  </ol>

  <div class="card card-note">

const quizAnswers = {

// --- State ---
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let currentLesson = null;

function getAllLessons() {
  return course.modules.flatMap(m => m.lessons);
}

function getLessonById(id) {
  return getAllLessons().find(l => l.id === id);
}

function getLessonIndex(id) {
  return getAllLessons().findIndex(l => l.id === id);
}

function renderSidebar() {
  const all = getAllLessons();
  let idx = 0;
  const html = course.modules.map((mod, mi) => `
    <div class="sidebar-section">
      <div class="sidebar-module">模块 ${mi + 1}：${mod.title.replace(/^模块.：/, '')}</div>
      ${mod.lessons.map(lesson => {
        const isDone = done.has(lesson.id);
        const isActive = lesson.id === currentLesson;
        idx++;
        return `<a class="sidebar-lesson${isDone ? ' done' : ''}${isActive ? ' active' : ''}"
            onclick="loadLesson('${lesson.id}')" href="#">
          <div class="lesson-check">${isDone ? '✓' : ''}</div>
          <span>${idx}. ${lesson.title}</span>
        </a>`;
      }).join('')}
    </div>
  `).join('');
  document.getElementById('sidebar-content').innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const total = getAllLessons().length;
  const count = done.size;
  document.getElementById('progress-text').textContent = `${count} / ${total} 节`;
  document.getElementById('progress-fill').style.width = `${(count / total) * 100}%`;
}

function loadLesson(id) {
  currentLesson = id;
  const lesson = getLessonById(id);
  const all = getAllLessons();
  const idx = getLessonIndex(id);
  const prev = idx > 0 ? all[idx - 1] : null;
  const next = idx < all.length - 1 ? all[idx + 1] : null;

  const navHtml = `
    <div class="lesson-nav">
      ${prev ? `<button class="nav-btn" onclick="loadLesson('${prev.id}')">← ${prev.title}</button>` : '<span></span>'}
      ${next
        ? `<button class="nav-btn primary" onclick="markDoneAndNext('${id}', '${next.id}')">下一节：${next.title} →</button>`
        : `<button class="nav-btn primary" onclick="markDone('${id}')">✓ 完成课程</button>`
      }
    </div>`;

  document.getElementById('main-content').innerHTML = lesson.content + navHtml;
  renderSidebar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.querySelector('.sidebar').classList.remove('open');

  // Wire up quiz options
  document.querySelectorAll('.quiz-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const radio = opt.querySelector('input[type=radio]');
      if (!radio) return;
      const qName = radio.name;
      const val = radio.value;
      const correct = quizAnswers[qName];
      const resultEl = document.getElementById(qName + '-result');
      document.querySelectorAll(`input[name="${qName}"]`).forEach(r => {
        const parent = r.closest('.quiz-option');
        parent.classList.remove('selected-correct', 'selected-wrong');
      });
      opt.classList.add(val === correct ? 'selected-correct' : 'selected-wrong');
      if (resultEl) {
        resultEl.className = 'quiz-result ' + (val === correct ? 'correct' : 'wrong');
        resultEl.textContent = val === correct
          ? '✓ 正确！继续加油。'
          : '✗ 再想想看——选项 B 通常是正确答案，因为它描述了最具体、最直接的解决方案。';
      }
    });
  });
}

function markDone(id) {
  done.add(id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
  renderSidebar();
}

function markDoneAndNext(id, nextId) {
  markDone(id);
  loadLesson(nextId);
}

function copyPrompt(btn) {
  const text = btn.closest('.prompt-box').querySelector('.prompt-body').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

function generateCertificate() {
  // Mark all done
  getAllLessons().forEach(l => done.add(l.id));
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
  renderSidebar();
  alert('🎉 证书已生成！\n\n在实际课程平台中，这里会生成带有你名字的 PDF 证书，可分享至 LinkedIn。\n\n感谢完成 Claude 101！');
}
