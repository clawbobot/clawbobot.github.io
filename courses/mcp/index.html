<script>
const COURSE = {
  id: 'mcp',
  title: 'MCP 协议与生态',
  modules: [
    {
      title: "MCP协议入门",
      lessons: [
        { id: "what-is-mcp", title: "什么是MCP：设计动机", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>什么是MCP：设计动机</h1><p class=\"lesson-lead\">MCP（Model Context Protocol）是Anthropic提出的开放标准，让AI模型能够安全、统一地访问外部工具和数据。本节讲解它诞生的背景与核心动机。</p></div><div class=\"lesson-body\"><h2>为什么需要MCP</h2><p>在MCP出现之前，每当你想让Claude连接一个新工具（数据库、文件系统、API），都需要在应用层手动实现集成逻辑。N个工具乘以M个AI客户端，就需要N×M套定制代码，维护成本极高。</p><h2>MCP的核心动机</h2><ul><li><strong>标准化</strong>：用统一协议描述工具能力，任何兼容的客户端都能自动理解和调用。</li><li><strong>可组合</strong>：Server可以独立开发和部署，客户端按需组合多个Server。</li><li><strong>安全边界</strong>：Server运行在独立进程，权限清晰，模型无法绕过边界直接访问。</li><li><strong>生态复用</strong>：社区开发的MCP Server可被所有兼容客户端直接使用。</li></ul><div class=\"card card-key\"><div class=\"card-label\">核心比喻</div><p>MCP之于AI工具，就像USB-C之于外设：一个标准接口，任何设备插上就能用，不需要为每对组合单独写驱动。</p></div><h2>MCP能做什么</h2><ol><li>让Claude读写本地文件、查询数据库、搜索知识库。</li><li>让Claude调用第三方服务（Git、Slack、日历等）。</li><li>让Claude动态获取实时数据，而不只靠训练知识。</li></ol><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 一个MCP Server暴露工具后，Claude可以这样使用它：\n# Claude -> MCP Client -> MCP Server -> 实际资源（数据库、文件等）\n# 整个过程通过标准化协议通信，无需应用层手动集成</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>MCP解决了N×M工具集成问题，统一为1×N</li><li>标准化协议让AI客户端和工具Server解耦</li><li>Server独立进程运行，提供清晰安全边界</li><li>社区Server可被所有兼容客户端复用</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>MCP最核心的设计动机是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>让Claude回复速度更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>用统一标准协议解决AI模型连接外部工具的N×M集成问题，实现工具与客户端的解耦复用</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>替代Function Calling</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"d\"><span>降低模型训练成本</span></label></div><div class=\"quiz-result\" id=\"q1-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>理解MCP的价值</h3><ol><li>列出你日常工作中希望让Claude能访问的3个工具或数据源。</li><li>思考：如果没有MCP，接入这3个工具各需要多少自定义代码？</li><li>画出MCP如何把这3个集成简化为3个独立Server的示意图。</li></ol></div></div>" },
        { id: "mcp-architecture", title: "MCP架构：Client、Server、Transport", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 12 分钟</span></div><h1>MCP架构：Client、Server、Transport</h1><p class=\"lesson-lead\">MCP采用Client-Server架构，通过Transport层传输消息。理解这三个组成部分，是读懂任何MCP代码的前提。</p></div><div class=\"lesson-body\"><h2>三个核心角色</h2><ul><li><code>MCP Host</code>：宿主应用，如Claude Desktop或Claude Code，内嵌MCP Client与模型交互。</li><li><code>MCP Client</code>：协议客户端，负责连接Server、发送请求、接收响应，每个Host实例对应一个Client。</li><li><code>MCP Server</code>：工具提供方，实现并暴露Resources、Tools、Prompts三类能力。</li></ul><h2>Transport层</h2><p>Transport是Client与Server的通信通道，目前支持两种：</p><ul><li><code>stdio</code>：通过标准输入/输出通信，适合本地进程；Host启动Server子进程，通过管道交换消息。</li><li><code>HTTP + SSE</code>：通过HTTP请求和Server-Sent Events通信，适合远程Server部署。</li></ul><div class=\"card card-key\"><div class=\"card-label\">消息格式</div><p>MCP使用<strong>JSON-RPC 2.0</strong>作为消息格式。每条消息都是一个JSON对象，包含method、params和id字段。这让协议简单、语言无关。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># MCP消息示例（JSON-RPC 2.0格式）\n# Client发送工具调用请求：\n# {\n#   \"jsonrpc\": \"2.0\",\n#   \"id\": 1,\n#   \"method\": \"tools/call\",\n#   \"params\": {\"name\": \"read_file\", \"arguments\": {\"path\": \"/tmp/test.txt\"}}\n# }\n#\n# Server返回结果：\n# {\n#   \"jsonrpc\": \"2.0\",\n#   \"id\": 1,\n#   \"result\": {\"content\": [{\"type\": \"text\", \"text\": \"文件内容...\"}]}\n# }</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Host内嵌Client，Client连接一个或多个Server</li><li>Server独立进程，暴露Tools/Resources/Prompts</li><li>stdio适合本地，HTTP+SSE适合远程部署</li><li>消息格式为JSON-RPC 2.0，语言无关</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在MCP架构中，当Server运行在远程云服务器时，应该选用哪种Transport？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>stdio，因为它更简单</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>HTTP + SSE，因为它适合网络通信，可以跨机器连接远程Server</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>两种都不行，远程不支持MCP</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"d\"><span>WebSocket，MCP只支持WebSocket</span></label></div><div class=\"quiz-result\" id=\"q2-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>画出MCP架构图</h3><ol><li>画出Host、Client、Server三者的关系，标注数据流方向。</li><li>在图中标注stdio和HTTP+SSE各自适用的连接类型。</li><li>思考：一个Host可以同时连接多少个Server？有什么限制？</li></ol></div></div>" },
        { id: "mcp-vs-function-calling", title: "MCP vs Function Calling", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>MCP vs Function Calling</h1><p class=\"lesson-lead\">MCP和Function Calling都能让Claude调用外部能力，但定位不同。理解区别才能在合适的场景选对工具。</p></div><div class=\"lesson-body\"><h2>Function Calling回顾</h2><p>Function Calling（工具调用）是Claude API的原生能力：你在请求里定义工具的JSON Schema，Claude决定是否调用并返回调用参数，你的应用执行工具并把结果塞回对话。整个流程<strong>在你的应用内</strong>完成。</p><h2>MCP的不同之处</h2><ul><li><strong>进程隔离</strong>：MCP Server是独立进程，不在调用者应用内，有清晰的权限边界。</li><li><strong>标准化发现</strong>：Client启动时自动从Server获取工具列表，无需手动写Schema。</li><li><strong>可组合性</strong>：多个Server可以并联，Claude统一看到所有工具，而Function Calling通常绑定单个应用。</li><li><strong>生态共享</strong>：MCP Server可发布给任何人使用；Function Calling的工具只在你的应用生效。</li></ul><div class=\"card card-note\"><div class=\"card-label\">如何选择</div><p>如果工具<strong>只服务你这一个应用</strong>，Function Calling就够用；如果工具<strong>需要复用、共享、或跨客户端使用</strong>，用MCP Server封装是更好的选择。MCP内部也使用类Function Calling机制传递工具调用。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># Function Calling：工具Schema写在请求里，应用内执行\ntools = [{\"name\": \"get_stock_price\", \"description\": \"查询股票价格\",\n          \"input_schema\": {\"type\": \"object\", \"properties\": {\"ticker\": {\"type\": \"string\"}}, \"required\": [\"ticker\"]}}]\n\n# MCP：工具由Server声明，Client自动发现，跨应用复用\n# Claude Desktop 配置后即可使用，无需在每个请求里重复定义</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Function Calling在应用内，MCP在独立进程</li><li>MCP自动发现工具，无需手写Schema</li><li>MCP支持多Server并联，可组合性更强</li><li>单应用专用选Function Calling，共享复用选MCP</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪个场景更适合用MCP而不是Function Calling？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>在自己的聊天App里定义一个只给该App用的天气查询工具</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>开发一个Git仓库分析工具，希望Claude Code、Claude Desktop都能直接使用，无需各自实现集成</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>临时测试一个单次调用的工具</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"d\"><span>只有一个用户的私有脚本</span></label></div><div class=\"quiz-result\" id=\"q3-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>对比两种方案</h3><ol><li>用Function Calling实现一个查询汇率的工具，在应用内完成。</li><li>思考：如果你想让这个工具也能在Claude Code里使用，需要额外做什么？</li><li>列出把它改造为MCP Server后，在可复用性和维护成本上的差异。</li></ol></div></div>" },
      ]
    },
    {
      title: "搭建第一个MCP Server",
      lessons: [
        { id: "python-sdk-server", title: "Python SDK创建Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 14 分钟</span></div><h1>Python SDK创建Server</h1><p class=\"lesson-lead\">Anthropic官方提供了Python MCP SDK，让你用几十行代码就能创建一个功能完整的MCP Server。</p></div><div class=\"lesson-body\"><h2>安装SDK</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>pip install mcp</pre></div><h2>创建第一个Server</h2><p>以下是一个最简单的MCP Server，暴露一个计算器工具。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\n\n# 创建Server实例，名称用于标识\napp = FastMCP(\"计算器Server\")\n\n@app.tool()\ndef add(a: float, b: float) -> float:\n    \"\"\"把两个数字相加并返回结果\"\"\"\n    return a + b\n\n@app.tool()\ndef multiply(a: float, b: float) -> float:\n    \"\"\"把两个数字相乘并返回结果\"\"\"\n    return a * b\n\nif __name__ == \"__main__\":\n    # 以stdio模式运行，适合本地调试\n    app.run()</pre></div><div class=\"card card-key\"><div class=\"card-label\">FastMCP</div><p><code>FastMCP</code>是高层封装，类似FastAPI的风格：用装饰器声明工具，SDK自动处理JSON-RPC协议细节、参数解析与错误处理，让你专注业务逻辑。</p></div><div class=\"card card-tip\"><div class=\"card-label\">类型注解很重要</div><p>SDK会把Python类型注解自动转换为JSON Schema，供Claude理解参数含义。<strong>务必</strong>写清楚参数类型和docstring，这直接影响Claude是否能正确调用你的工具。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>pip install mcp 安装官方Python SDK</li><li>FastMCP用装饰器风格快速声明工具</li><li>类型注解自动转为JSON Schema供Claude理解</li><li>docstring即工具描述，要写清楚工具用途</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在Python MCP SDK中，工具的参数描述是通过什么方式传递给Claude的？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"a\"><span>需要手动编写JSON Schema文件</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"b\"><span>SDK自动把Python类型注解和docstring转换为JSON Schema，Claude通过Schema理解参数</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"c\"><span>通过配置文件单独声明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"d\"><span>Claude不需要描述，直接猜参数</span></label></div><div class=\"quiz-result\" id=\"q4-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>创建你的第一个Server</h3><ol><li>安装mcp SDK，创建一个暴露两个工具的Server（自选功能）。</li><li>确保每个工具都有完整的类型注解和docstring。</li><li>用<code>app.run()</code>以stdio模式启动，观察Server的输出。</li></ol></div></div>" },
        { id: "typescript-sdk-server", title: "TypeScript SDK创建Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 14 分钟</span></div><h1>TypeScript SDK创建Server</h1><p class=\"lesson-lead\">TypeScript SDK是MCP生态中最常见的实现语言之一，适合Node.js环境和前端开发者。</p></div><div class=\"lesson-body\"><h2>初始化项目</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">typescript</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>npm init -y\nnpm install @modelcontextprotocol/sdk zod\nnpm install -D typescript @types/node ts-node</pre></div><h2>创建Server</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">typescript</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import { McpServer } from \"@modelcontextprotocol/sdk/server/mcp.js\";\nimport { StdioServerTransport } from \"@modelcontextprotocol/sdk/server/stdio.js\";\nimport { z } from \"zod\";\n\nconst server = new McpServer({ name: \"计算器Server\", version: \"1.0.0\" });\n\nserver.tool(\n  \"add\",\n  \"把两个数字相加并返回结果\",\n  { a: z.number().describe(\"第一个加数\"), b: z.number().describe(\"第二个加数\") },\n  async ({ a, b }) => ({\n    content: [{ type: \"text\", text: String(a + b) }],\n  })\n);\n\nserver.tool(\n  \"multiply\",\n  \"把两个数字相乘并返回结果\",\n  { a: z.number().describe(\"被乘数\"), b: z.number().describe(\"乘数\") },\n  async ({ a, b }) => ({\n    content: [{ type: \"text\", text: String(a * b) }],\n  })\n);\n\nconst transport = new StdioServerTransport();\nawait server.connect(transport);</pre></div><div class=\"card card-note\"><div class=\"card-label\">Zod用于参数验证</div><p>TypeScript SDK使用<code>zod</code>定义参数Schema：它既做运行时类型验证，又能自动生成JSON Schema。<code>.describe()</code>为参数添加说明，帮助Claude理解参数含义。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>@modelcontextprotocol/sdk是官方TypeScript SDK</li><li>用zod定义参数Schema，自动校验与生成描述</li><li>server.tool()注册工具，返回content数组</li><li>StdioServerTransport连接stdio通信管道</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>TypeScript SDK中使用zod定义参数Schema的主要好处是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"a\"><span>zod让代码运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"b\"><span>zod同时提供运行时类型验证和自动JSON Schema生成，一套定义同时保障安全与文档</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"c\"><span>只是为了代码风格统一</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"d\"><span>zod是MCP协议强制要求的</span></label></div><div class=\"quiz-result\" id=\"q5-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>用TypeScript实现一个Server</h3><ol><li>初始化一个TypeScript项目并安装MCP SDK。</li><li>创建一个暴露字符串处理工具的Server（如统计字数、转大写）。</li><li>用zod为每个参数添加类型和描述，编译并运行。</li></ol></div></div>" },
        { id: "local-debug", title: "本地测试调试", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 12 分钟</span></div><h1>本地测试调试</h1><p class=\"lesson-lead\">开发MCP Server时，快速验证工具行为是关键。本节介绍本地测试的几种方式。</p></div><div class=\"lesson-body\"><h2>MCP Inspector</h2><p>官方提供<code>mcp dev</code>命令和MCP Inspector工具，让你在浏览器里交互式调用Server，无需先接入Claude。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 安装开发工具\npip install \"mcp[dev]\"\n\n# 启动Inspector，自动打开浏览器界面\nmcp dev server.py\n\n# Inspector会显示Server暴露的所有工具和资源\n# 你可以直接在界面里输入参数、调用工具、查看返回值</pre></div><h2>直接运行测试脚本</h2><p>对于简单验证，也可以直接导入Server模块，在Python里调用工具函数。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># test_server.py\nfrom server import add, multiply\n\n# 直接测试工具逻辑\nassert add(2, 3) == 5\nassert multiply(4, 5) == 20\nprint(\"所有测试通过\")</pre></div><div class=\"card card-tip\"><div class=\"card-label\">调试技巧</div><p>MCP Server通过stdio通信，标准输出被协议占用，<strong>调试日志要写到stderr</strong>：<code>import sys; print(\"debug\", file=sys.stderr)</code>。MCP Inspector的Console面板会显示stderr输出。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>mcp dev启动Inspector，浏览器里可视化测试</li><li>Inspector显示所有工具，支持交互式调用</li><li>调试日志必须写到stderr，不能写到stdout</li><li>简单逻辑可直接单元测试工具函数</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在MCP Server中，为什么调试日志要写到stderr而不是stdout？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"a\"><span>stderr的颜色更好看</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"b\"><span>MCP协议通过stdio传输JSON-RPC消息，stdout被协议占用，写入日志会破坏消息格式导致通信失败</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"c\"><span>stderr比stdout快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"d\"><span>stdout不支持中文</span></label></div><div class=\"quiz-result\" id=\"q6-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>调试你的Server</h3><ol><li>用mcp dev启动你在上一节写的Server，在Inspector里调用每个工具。</li><li>故意传入一个错误类型的参数，观察错误信息。</li><li>添加一条stderr日志，验证它在Inspector Console中正确显示。</li></ol></div></div>" },
        { id: "connect-claude", title: "连接Claude Code和Desktop", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 12 分钟</span></div><h1>连接Claude Code和Desktop</h1><p class=\"lesson-lead\">Server开发完成后，下一步是把它接入Claude Code或Claude Desktop，让Claude真正能调用你的工具。</p></div><div class=\"lesson-body\"><h2>接入Claude Code</h2><p>在项目的<code>.claude/settings.json</code>（或全局配置）里添加MCP Server配置：</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># .claude/settings.json\n{\n  \"mcpServers\": {\n    \"calculator\": {\n      \"command\": \"python\",\n      \"args\": [\"/path/to/server.py\"],\n      \"env\": {}\n    }\n  }\n}</pre></div><h2>接入Claude Desktop</h2><p>编辑Claude Desktop的配置文件（macOS路径：<code>~/Library/Application Support/Claude/claude_desktop_config.json</code>）：</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>{\n  \"mcpServers\": {\n    \"calculator\": {\n      \"command\": \"python\",\n      \"args\": [\"/path/to/server.py\"]\n    },\n    \"my-ts-server\": {\n      \"command\": \"node\",\n      \"args\": [\"/path/to/build/index.js\"]\n    }\n  }\n}</pre></div><div class=\"card card-note\"><div class=\"card-label\">重启生效</div><p>修改配置后需要<strong>重启Claude Desktop</strong>或重新加载Claude Code，Server才会被启动。启动成功后，在对话中可以看到工具列表，也可以主动让Claude列出可用工具来验证。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Claude Code在settings.json中配置mcpServers</li><li>Claude Desktop在专属配置文件中配置</li><li>配置项：command指定运行命令，args指定脚本路径</li><li>修改配置后需重启客户端才能生效</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>把MCP Server接入Claude Desktop后，如果工具没有出现，第一步应该做什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"a\"><span>重新安装MCP SDK</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"b\"><span>重启Claude Desktop，让它重新读取配置并启动Server进程</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"c\"><span>删除Server代码重写</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"d\"><span>联系Anthropic客服</span></label></div><div class=\"quiz-result\" id=\"q7-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>完整接入流程</h3><ol><li>把你的计算器Server接入Claude Desktop或Claude Code。</li><li>在对话中让Claude帮你计算一道题，观察它是否调用了你的工具。</li><li>查看Server的stderr输出，确认工具调用请求已经到达。</li></ol></div></div>" },
      ]
    },
    {
      title: "Resources、Tools、Prompts",
      lessons: [
        { id: "expose-resources", title: "暴露Resources", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>暴露Resources</h1><p class=\"lesson-lead\">Resources是MCP的三大能力之一，用于把文件、数据库记录、API数据等内容作为上下文提供给Claude。</p></div><div class=\"lesson-body\"><h2>什么是Resources</h2><p>Resources类似只读数据源，每个Resource有唯一的URI（如<code>file:///path/to/file</code>或<code>db://table/row</code>），Claude可以请求读取其内容，作为回答问题的上下文。</p><h2>声明Resources</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nfrom mcp.types import Resource\nimport json\n\napp = FastMCP(\"文档Server\")\n\n@app.resource(\"docs://readme\")\ndef get_readme() -> str:\n    \"\"\"项目README文件内容\"\"\"\n    with open(\"README.md\", \"r\") as f:\n        return f.read()\n\n@app.resource(\"data://config\")\ndef get_config() -> str:\n    \"\"\"当前应用配置\"\"\"\n    config = {\"version\": \"1.0\", \"env\": \"production\", \"debug\": False}\n    return json.dumps(config, ensure_ascii=False, indent=2)\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-key\"><div class=\"card-label\">Resource vs Tool</div><p>Resources是<strong>被动数据</strong>，Claude读取它作为上下文；Tools是<strong>主动操作</strong>，Claude调用它执行动作并获取结果。读文件用Resource，写文件或搜索用Tool。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Resources提供只读数据作为Claude的上下文</li><li>每个Resource有唯一URI标识</li><li>用@app.resource装饰器声明，返回字符串内容</li><li>Resources适合文件、配置、文档等静态数据</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪个场景最适合用Resource而不是Tool来实现？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"a\"><span>让Claude搜索数据库中的记录</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"b\"><span>把项目的API文档作为只读上下文提供给Claude，让它参考文档回答问题</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"c\"><span>让Claude向外部API发送POST请求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"d\"><span>让Claude写入并保存一个文件</span></label></div><div class=\"quiz-result\" id=\"q8-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>暴露一个Resource</h3><ol><li>创建一个Server，暴露本地某个文本文件作为Resource。</li><li>在Claude Desktop中连接后，让Claude总结该Resource的内容。</li><li>思考：如果文件内容会频繁变化，Resource还合适吗？</li></ol></div></div>" },
        { id: "define-tools", title: "定义Tools与参数验证", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>定义Tools与参数验证</h1><p class=\"lesson-lead\">Tools是MCP最核心的能力，让Claude能执行操作并获取动态结果。严格的参数验证是工具稳健运行的保障。</p></div><div class=\"lesson-body\"><h2>带参数验证的工具</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nfrom pydantic import BaseModel, Field\nfrom typing import Optional\n\napp = FastMCP(\"文件工具Server\")\n\nclass SearchParams(BaseModel):\n    query: str = Field(description=\"搜索关键词\", min_length=1, max_length=200)\n    max_results: int = Field(default=10, description=\"最多返回条数\", ge=1, le=100)\n    file_type: Optional[str] = Field(default=None, description=\"文件类型过滤，如pdf、txt\")\n\n@app.tool()\ndef search_files(params: SearchParams) -> list[dict]:\n    \"\"\"在本地文件系统中搜索匹配关键词的文件，返回文件路径和摘要列表\"\"\"\n    results = []\n    # 实际搜索逻辑...\n    return results[:params.max_results]\n\n@app.tool()\ndef read_file(path: str, encoding: str = \"utf-8\") -> str:\n    \"\"\"读取指定路径的文件内容并返回文本\"\"\"\n    with open(path, \"r\", encoding=encoding) as f:\n        return f.read()\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-warn\"><div class=\"card-label\">安全验证</div><p>工具接收的参数来自Claude的推断，可能存在偏差。<strong>永远不要</strong>直接把参数传入shell命令或SQL查询，必须做路径校验、注入防御等安全检查，避免意外操作。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用Pydantic BaseModel定义复杂参数，自动验证</li><li>Field()添加约束（min、max、ge、le）和描述</li><li>参数验证失败会自动返回错误，不执行工具</li><li>工具接收外部参数必须做安全验证，防注入</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在MCP Tool中使用Pydantic BaseModel定义参数的主要好处是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"a\"><span>让代码更难读</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"b\"><span>自动进行运行时参数验证、提供详细错误信息，并自动生成带约束的JSON Schema供Claude参考</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"c\"><span>Pydantic能让工具运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"d\"><span>只是为了兼容TypeScript</span></label></div><div class=\"quiz-result\" id=\"q9-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>带验证的工具</h3><ol><li>创建一个带Pydantic参数模型的工具，设置必填和可选字段各至少一个。</li><li>故意让Claude传入超出范围的参数值，观察验证错误信息。</li><li>添加一个路径安全检查，确保read_file不能读取系统敏感目录。</li></ol></div></div>" },
        { id: "server-prompts", title: "服务端Prompts模板", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>服务端Prompts模板</h1><p class=\"lesson-lead\">MCP的Prompts能力让Server提供可重用的提示词模板，Claude或用户可以按需实例化这些模板。</p></div><div class=\"lesson-body\"><h2>什么是MCP Prompts</h2><p>Prompts是Server定义的可参数化对话模板。客户端（或用户）选择一个Prompt后，Server用提供的参数渲染成实际消息，发送给Claude开始对话。适合固定的工作流，如代码审查、文档生成等。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nfrom mcp.types import PromptMessage, TextContent\n\napp = FastMCP(\"提示词Server\")\n\n@app.prompt()\ndef code_review(language: str, code: str) -> list[PromptMessage]:\n    \"\"\"代码审查提示词，输入编程语言和代码，生成审查对话\"\"\"\n    return [\n        PromptMessage(\n            role=\"user\",\n            content=TextContent(\n                type=\"text\",\n                text=f\"请对以下{language}代码进行审查，指出潜在的Bug、性能问题和代码风格建议：\\n\\n```{language}\\n{code}\\n```\",\n            ),\n        )\n    ]\n\n@app.prompt()\ndef summarize_doc(doc_uri: str, style: str = \"简洁\") -> list[PromptMessage]:\n    \"\"\"文档总结提示词，指定资源URI和总结风格\"\"\"\n    return [\n        PromptMessage(\n            role=\"user\",\n            content=TextContent(\n                type=\"text\",\n                text=f\"请以{style}的风格总结以下文档（URI: {doc_uri}）的核心要点。\",\n            ),\n        )\n    ]\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-tip\"><div class=\"card-label\">使用场景</div><p>Prompts最适合<strong>标准化工作流</strong>：团队常用的代码审查格式、固定的报告生成模板、统一的问题排查流程。把这些固化为Prompt，所有使用同一Server的用户都能一键使用。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Prompts是可参数化的对话模板</li><li>用@app.prompt装饰器声明，返回PromptMessage列表</li><li>客户端按需选择并用参数实例化</li><li>适合标准化、可复用的对话工作流</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>MCP Prompts最适合用于以下哪种场景？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"a\"><span>实时读取外部API数据</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"b\"><span>把团队的代码审查标准封装为可参数化模板，让所有人一键启动统一格式的代码审查流程</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"c\"><span>替代Tools执行动态操作</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"d\"><span>存储大型二进制文件</span></label></div><div class=\"quiz-result\" id=\"q10-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>创建一个Prompt模板</h3><ol><li>为你日常最常用的一种AI对话场景创建一个Prompt模板（如写周报、翻译文档）。</li><li>定义至少两个参数，让模板可以灵活配置。</li><li>在Claude Desktop中连接Server，测试Prompt是否正确渲染。</li></ol></div></div>" },
        { id: "resources-subscription", title: "Resources订阅与实时更新", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>Resources订阅与实时更新</h1><p class=\"lesson-lead\">MCP支持Client订阅Resource的变化通知，当数据更新时Server主动推送，实现实时感知动态数据。</p></div><div class=\"lesson-body\"><h2>订阅机制</h2><p>Client发送<code>resources/subscribe</code>请求，Server在数据变化时发送<code>notifications/resources/updated</code>通知，Client再读取最新内容。这避免了频繁轮询。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nfrom mcp.server.models import InitializationOptions\nimport asyncio\n\napp = FastMCP(\"实时监控Server\")\n\n# 监控的系统指标（模拟实时数据）\n_metrics = {\"cpu\": 0.0, \"memory\": 0.0}\n\n@app.resource(\"metrics://system\")\ndef get_system_metrics() -> str:\n    \"\"\"当前系统CPU和内存使用率\"\"\"\n    return f\"CPU: {_metrics['cpu']:.1f}%  内存: {_metrics['memory']:.1f}%\"\n\nasync def update_metrics():\n    \"\"\"模拟后台持续更新指标\"\"\"\n    import random\n    while True:\n        _metrics[\"cpu\"] = random.uniform(10, 90)\n        _metrics[\"memory\"] = random.uniform(30, 80)\n        # 通知所有订阅者资源已更新\n        await app.notify_resource_updated(\"metrics://system\")\n        await asyncio.sleep(5)  # 每5秒更新一次\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-note\"><div class=\"card-label\">适用场景</div><p>订阅适合<strong>持续变化的数据</strong>：系统监控指标、日志流、股票价格、任务执行状态。对于静态数据（配置文件、文档），普通Resource读取即可，不必订阅。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Client可订阅Resource变化，避免轮询</li><li>Server数据变化时调用notify_resource_updated推送</li><li>Client收到通知后重新读取最新内容</li><li>适合实时监控、日志流等动态数据场景</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>为什么实时监控场景更适合用Resource订阅而非轮询？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"a\"><span>订阅的实现比轮询简单</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"b\"><span>订阅由Server主动推送变化通知，只在有更新时才通信，比定期轮询效率更高、延迟更低</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"c\"><span>订阅比轮询更安全</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"d\"><span>MCP只支持订阅，不支持轮询</span></label></div><div class=\"quiz-result\" id=\"q11-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现Resource订阅</h3><ol><li>创建一个暴露实时时间的Resource（每秒更新）。</li><li>实现notify_resource_updated的调用，在Inspector中观察更新通知。</li><li>思考：如果有100个Client同时订阅，Server需要怎样设计才能高效？</li></ol></div></div>" },
      ]
    },
    {
      title: "高级MCP模式",
      lessons: [
        { id: "multi-server", title: "组合多个Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 12 分钟</span></div><h1>组合多个Server</h1><p class=\"lesson-lead\">MCP的强大之处在于可以同时连接多个Server，让Claude统一访问来自不同来源的工具和数据。</p></div><div class=\"lesson-body\"><h2>多Server并联</h2><p>Claude Desktop和Claude Code都支持在配置中定义多个Server，每个Server独立运行，Claude看到的是所有Server工具的并集。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># claude_desktop_config.json - 同时连接多个Server\n{\n  \"mcpServers\": {\n    \"filesystem\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/Users/me/projects\"]\n    },\n    \"github\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"],\n      \"env\": {\"GITHUB_TOKEN\": \"ghp_xxxxxxxx\"}\n    },\n    \"my-db-server\": {\n      \"command\": \"python\",\n      \"args\": [\"/path/to/db_server.py\"],\n      \"env\": {\"DATABASE_URL\": \"postgresql://localhost/mydb\"}\n    }\n  }\n}</pre></div><div class=\"card card-key\"><div class=\"card-label\">工具命名冲突</div><p>多个Server可能暴露同名工具（如都有<code>search</code>），Claude会看到带Server前缀的完整名称（如<code>github__search</code>、<code>my-db-server__search</code>），以区分来源。设计工具名时尽量语义明确，减少歧义。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>配置文件里同时定义多个mcpServers即可并联</li><li>每个Server独立进程，互不干扰</li><li>Claude统一看到所有Server工具的并集</li><li>同名工具用Server前缀区分，建议命名语义清晰</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>同时连接多个MCP Server时，如果两个Server都有名为search的工具，Claude如何区分？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"a\"><span>Claude随机选一个</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"b\"><span>工具名带有Server前缀（如server1__search和server2__search），Claude通过完整名称区分来源</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"c\"><span>后加载的Server会覆盖先加载的</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"d\"><span>MCP不允许两个Server有同名工具</span></label></div><div class=\"quiz-result\" id=\"q12-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>组合使用多个Server</h3><ol><li>在配置中同时添加官方filesystem Server和你自己的Server。</li><li>让Claude完成一个需要同时用到两个Server工具的任务。</li><li>观察Claude如何在对话中自动选择和切换不同Server的工具。</li></ol></div></div>" },
        { id: "auth-security", title: "认证与安全", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 12 分钟</span></div><h1>认证与安全</h1><p class=\"lesson-lead\">当MCP Server需要访问敏感资源（数据库、私有API）时，认证和权限控制是生产环境的必修课。</p></div><div class=\"lesson-body\"><h2>通过环境变量传递凭据</h2><p>最简单的方式：在配置文件的<code>env</code>字段传入密钥，Server从环境变量读取，避免硬编码。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import os\nfrom mcp.server import FastMCP\n\napp = FastMCP(\"安全数据库Server\")\n\n# 从环境变量读取凭据，不写死\nDB_URL = os.environ[\"DATABASE_URL\"]\nAPI_SECRET = os.environ[\"API_SECRET\"]\n\n@app.tool()\ndef query_user_data(user_id: int) -> dict:\n    \"\"\"查询指定用户的数据，需要有效的数据库连接\"\"\"\n    # 在这里做额外的权限检查\n    if user_id <= 0:\n        raise ValueError(\"无效的用户ID\")\n    # 执行查询...\n    return {\"user_id\": user_id, \"data\": \"...\"}\n\n@app.tool()\ndef call_private_api(endpoint: str, payload: dict) -> dict:\n    \"\"\"调用内部API，自动附带认证头\"\"\"\n    import urllib.request, json\n    req = urllib.request.Request(\n        f\"https://internal-api.example.com/{endpoint}\",\n        data=json.dumps(payload).encode(),\n        headers={\"Authorization\": f\"Bearer {API_SECRET}\", \"Content-Type\": \"application/json\"},\n    )\n    with urllib.request.urlopen(req) as resp:\n        return json.loads(resp.read())\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-warn\"><div class=\"card-label\">工具滥用风险</div><p>MCP工具由Claude自主决定调用，存在被误用或滥用的风险。关键操作（删除、付款、发送消息）应在工具内增加<strong>额外确认逻辑</strong>，或限制Claude能操作的数据范围（如只读、沙箱）。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>通过env字段注入环境变量，Server内读取</li><li>凭据永远不要硬编码在Server代码里</li><li>关键操作在工具内做权限和范围验证</li><li>破坏性操作考虑增加二次确认或限制范围</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>MCP Server需要访问数据库，最安全的凭据管理方式是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"a\"><span>把数据库密码写在Server代码里</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"b\"><span>通过配置文件的env字段注入环境变量，Server从os.environ读取，避免凭据进入代码仓库</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"c\"><span>把密码写在工具的docstring里</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"d\"><span>每次请求都让用户输入密码</span></label></div><div class=\"quiz-result\" id=\"q13-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>安全加固Server</h3><ol><li>把你Server中所有硬编码的配置值改为从环境变量读取。</li><li>为一个敏感工具添加范围限制（如只允许读取某个目录）。</li><li>列出你的Server中所有&quot;危险操作&quot;，为每个制定防护措施。</li></ol></div></div>" },
        { id: "streaming-resources", title: "流式Resources与大文件", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 12 分钟</span></div><h1>流式Resources与大文件</h1><p class=\"lesson-lead\">处理日志文件、大型数据集等大文件时，一次性加载到内存既慢又危险。本节讲如何在MCP中处理大文件。</p></div><div class=\"lesson-body\"><h2>分段返回策略</h2><p>对于大文件，最可靠的策略是在工具中支持分段读取：Claude先获取文件元信息，再按需请求具体段落，而不是一次性返回全部内容。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nimport os\n\napp = FastMCP(\"大文件Server\")\n\n@app.tool()\ndef get_file_info(path: str) -> dict:\n    \"\"\"获取文件的元信息：大小、行数、编码，不读取内容\"\"\"\n    stat = os.stat(path)\n    with open(path, \"r\", errors=\"replace\") as f:\n        lines = sum(1 for _ in f)\n    return {\"size_bytes\": stat.st_size, \"lines\": lines, \"path\": path}\n\n@app.tool()\ndef read_file_chunk(path: str, start_line: int, end_line: int) -> str:\n    \"\"\"读取文件指定行范围的内容，start_line和end_line从1开始\"\"\"\n    if end_line - start_line > 500:\n        raise ValueError(\"单次最多读取500行，请分多次请求\")\n    result = []\n    with open(path, \"r\", errors=\"replace\") as f:\n        for i, line in enumerate(f, 1):\n            if i < start_line:\n                continue\n            if i > end_line:\n                break\n            result.append(line)\n    return \"\".join(result)\n\n@app.tool()\ndef search_in_file(path: str, keyword: str, context_lines: int = 2) -> list[dict]:\n    \"\"\"在大文件中搜索关键词，返回匹配行及上下文，避免加载整个文件\"\"\"\n    matches = []\n    with open(path, \"r\", errors=\"replace\") as f:\n        lines = f.readlines()\n    for i, line in enumerate(lines):\n        if keyword in line:\n            start = max(0, i - context_lines)\n            end = min(len(lines), i + context_lines + 1)\n            matches.append({\"line\": i + 1, \"context\": \"\".join(lines[start:end])})\n    return matches\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-key\"><div class=\"card-label\">上下文窗口限制</div><p>Claude的上下文有大小限制，一次性返回超大文件会撑满窗口。设计工具时要<strong>主动限制单次返回量</strong>，并提供元信息查询接口，让Claude能智能决定读取哪部分。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>大文件先返回元信息，再按需分段读取</li><li>单次返回量要设上限，防止撑满上下文</li><li>提供关键词搜索工具，避免Claude读取全文</li><li>errors=\"replace\"避免编码错误导致工具崩溃</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>处理大型日志文件时，以下哪种设计最合理？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"a\"><span>一次性把整个日志文件内容作为Resource返回给Claude</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"b\"><span>提供元信息查询、分段读取和关键词搜索三个工具，让Claude按需获取，每次返回量设上限</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"c\"><span>压缩文件后再返回</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"d\"><span>把日志文件拆分成多个Resource，每个1MB</span></label></div><div class=\"quiz-result\" id=\"q14-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现大文件工具集</h3><ol><li>创建三个配套工具：元信息查询、分段读取、关键词搜索。</li><li>用一个100MB的日志文件测试，确认内存占用可控。</li><li>让Claude分析该日志中某个错误的出现规律，观察它如何分多步读取。</li></ol></div></div>" },
        { id: "error-handling-retry", title: "错误处理与重试", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>错误处理与重试</h1><p class=\"lesson-lead\">工具在生产中会遇到各种失败：网络超时、外部API不可用、权限错误。良好的错误处理让Agent更稳健。</p></div><div class=\"lesson-body\"><h2>在工具中正确抛出错误</h2><p>MCP工具抛出的Python异常会被SDK捕获，转换为JSON-RPC错误返回给Claude。Claude会看到错误信息并决定下一步（重试、换参数或报告失败）。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import time, random\nfrom mcp.server import FastMCP\n\napp = FastMCP(\"可靠外部APIServer\")\n\ndef call_external_api(url: str) -> dict:\n    \"\"\"模拟可能失败的外部API调用\"\"\"\n    if random.random() < 0.3:  # 30%概率失败\n        raise ConnectionError(\"外部API暂时不可用\")\n    return {\"status\": \"ok\", \"data\": \"...\"}\n\n@app.tool()\ndef fetch_data_with_retry(url: str, max_retries: int = 3) -> dict:\n    \"\"\"带重试的外部数据获取，自动处理临时性网络错误\"\"\"\n    last_error = None\n    for attempt in range(max_retries):\n        try:\n            return call_external_api(url)\n        except ConnectionError as e:\n            last_error = e\n            wait = 2 ** attempt  # 指数退避\n            import sys; print(f\"第{attempt+1}次失败，{wait}秒后重试\", file=sys.stderr)\n            time.sleep(wait)\n        except PermissionError:\n            # 权限错误不应重试，直接抛出\n            raise ValueError(f\"无权访问该资源: {url}\")\n    raise RuntimeError(f\"重试{max_retries}次后仍失败: {last_error}\")\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"card card-key\"><div class=\"card-label\">错误信息要清晰</div><p>抛给Claude的错误信息要足够清晰，让Claude能判断：这个错误是<strong>可以重试</strong>（网络临时故障），还是<strong>需要换参数</strong>（路径不存在），还是<strong>需要报告用户</strong>（权限不足）。模糊的错误信息会让Claude陷入无效的重试循环。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>工具内的异常会被转为JSON-RPC错误传给Claude</li><li>在工具内对临时性错误做指数退避重试</li><li>不可重试的错误（权限、参数错误）直接抛出</li><li>错误信息要清晰描述失败原因和建议操作</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>工具遇到&quot;文件不存在&quot;错误时，最合适的处理方式是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"a\"><span>无限重试，直到文件出现</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"b\"><span>立即抛出含明确路径信息的错误，让Claude知道参数有误并换用正确路径，而非浪费重试次数</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"c\"><span>静默返回空字符串</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"d\"><span>重试3次后终止整个Server</span></label></div><div class=\"quiz-result\" id=\"q15-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现健壮的工具</h3><ol><li>为一个调用外部HTTP API的工具添加指数退避重试（最多3次）。</li><li>区分临时错误（网络超时）和永久错误（404、403），只对前者重试。</li><li>测试：让Claude连续调用该工具，观察它如何应对随机失败。</li></ol></div></div>" },
      ]

      title: "实战项目",

        { id: "git-analysis-server", title: "Git仓库分析Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 16 分钟</span></div><h1>Git仓库分析Server</h1><p class=\"lesson-lead\">第一个实战项目：构建一个让Claude能分析Git仓库历史、提交者、文件变更的MCP Server。</p></div><div class=\"lesson-body\"><h2>项目功能</h2><ul><li>列出最近N条提交记录</li><li>查看某次提交的详细变更</li><li>统计各作者的提交数量</li><li>查看某文件的修改历史</li></ul><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import subprocess, json\nfrom mcp.server import FastMCP\nfrom pathlib import Path\n\napp = FastMCP(\"Git分析Server\")\n\nREPO_PATH = Path(\".\").resolve()  # 从环境变量或参数获取\n\ndef git(cmd: list[str]) -> str:\n    \"\"\"在仓库目录执行git命令，返回输出\"\"\"\n    result = subprocess.run(\n        [\"git\", \"-C\", str(REPO_PATH)] + cmd,\n        capture_output=True, text=True, timeout=30\n    )\n    if result.returncode != 0:\n        raise RuntimeError(f\"git错误: {result.stderr.strip()}\")\n    return result.stdout.strip()\n\n@app.tool()\ndef list_commits(n: int = 20) -> list[dict]:\n    \"\"\"列出最近n条提交记录，包含hash、作者、时间和提交信息\"\"\"\n    output = git([\"log\", f\"-{n}\", \"--pretty=format:%H|%an|%ae|%ai|%s\"])\n    commits = []\n    for line in output.splitlines():\n        parts = line.split(\"|\", 4)\n        if len(parts) == 5:\n            commits.append({\"hash\": parts[0][:8], \"author\": parts[1],\n                            \"email\": parts[2], \"date\": parts[3], \"message\": parts[4]})\n    return commits\n\n@app.tool()\ndef show_commit(commit_hash: str) -> str:\n    \"\"\"显示指定提交的详细变更内容（diff）\"\"\"\n    return git([\"show\", \"--stat\", commit_hash])\n\n@app.tool()\ndef author_stats() -> list[dict]:\n    \"\"\"统计每位作者的提交数量，按提交数降序排列\"\"\"\n    output = git([\"shortlog\", \"-sn\", \"HEAD\"])\n    stats = []\n    for line in output.splitlines():\n        parts = line.strip().split(\"\\t\", 1)\n        if len(parts) == 2:\n            stats.append({\"count\": int(parts[0]), \"author\": parts[1]})\n    return stats\n\n@app.tool()\ndef file_history(file_path: str, n: int = 10) -> list[dict]:\n    \"\"\"查看某个文件最近n次修改的提交记录\"\"\"\n    output = git([\"log\", f\"-{n}\", \"--pretty=format:%H|%an|%ai|%s\", \"--\", file_path])\n    history = []\n    for line in output.splitlines():\n        parts = line.split(\"|\", 3)\n        if len(parts) == 4:\n            history.append({\"hash\": parts[0][:8], \"author\": parts[1],\n                            \"date\": parts[2], \"message\": parts[3]})\n    return history\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用subprocess调用git命令，capture_output=True获取输出</li><li>解析git log的格式化输出为结构化数据</li><li>设置timeout防止git命令挂起</li><li>仓库路径从环境变量或配置读取，不写死</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在Git分析Server中，调用subprocess运行git命令时，为什么要设置timeout参数？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"a\"><span>timeout能让git命令运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"b\"><span>防止git操作（如大仓库log）意外挂起，导致MCP工具调用永远不返回，阻塞Claude的整个对话</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"c\"><span>MCP协议要求所有subprocess调用必须有timeout</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"d\"><span>timeout可以减少网络流量</span></label></div><div class=\"quiz-result\" id=\"q16-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>完善Git分析Server</h3><ol><li>把Server接入Claude Code，让它分析当前项目的提交历史。</li><li>让Claude找出过去一个月提交最多的作者。</li><li>添加一个工具：对比两个提交之间某文件的差异（git diff）。</li></ol></div></div>" },
        { id: "knowledge-base-server", title: "本地知识库搜索Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 16 分钟</span></div><h1>本地知识库搜索Server</h1><p class=\"lesson-lead\">第二个实战项目：构建一个让Claude能搜索本地Markdown文档库的MCP Server，实现轻量级RAG。</p></div><div class=\"lesson-body\"><h2>设计思路</h2><p>扫描指定目录下的所有Markdown文件，建立内存索引，提供全文搜索和文档读取工具。Claude通过搜索找到相关文档，再读取详情作为上下文回答问题。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import os, re\nfrom pathlib import Path\nfrom mcp.server import FastMCP\n\napp = FastMCP(\"知识库Server\")\n\nDOCS_DIR = Path(os.environ.get(\"DOCS_DIR\", \"./docs\"))\n\n# 启动时扫描并建立索引\n_index: list[dict] = []\n\ndef build_index():\n    \"\"\"扫描文档目录，建立内存索引\"\"\"\n    global _index\n    _index = []\n    for md_file in DOCS_DIR.rglob(\"*.md\"):\n        content = md_file.read_text(encoding=\"utf-8\", errors=\"replace\")\n        # 提取标题\n        title_match = re.search(r\"^#+\\s+(.+)$\", content, re.MULTILINE)\n        title = title_match.group(1) if title_match else md_file.stem\n        _index.append({\n            \"path\": str(md_file.relative_to(DOCS_DIR)),\n            \"title\": title,\n            \"content\": content,\n        })\n\nbuild_index()\n\n@app.tool()\ndef search_docs(query: str, top_k: int = 5) -> list[dict]:\n    \"\"\"在知识库中搜索包含关键词的文档，返回最多top_k个匹配结果的摘要\"\"\"\n    query_lower = query.lower()\n    results = []\n    for doc in _index:\n        if query_lower in doc[\"content\"].lower() or query_lower in doc[\"title\"].lower():\n            # 找到关键词附近的摘要\n            idx = doc[\"content\"].lower().find(query_lower)\n            snippet = doc[\"content\"][max(0, idx-100):idx+200] if idx >= 0 else doc[\"content\"][:200]\n            results.append({\"path\": doc[\"path\"], \"title\": doc[\"title\"], \"snippet\": snippet})\n    return results[:top_k]\n\n@app.tool()\ndef read_doc(path: str) -> str:\n    \"\"\"读取知识库中指定路径的文档完整内容\"\"\"\n    full_path = DOCS_DIR / path\n    if not full_path.resolve().is_relative_to(DOCS_DIR.resolve()):\n        raise ValueError(\"不允许访问知识库目录以外的文件\")\n    return full_path.read_text(encoding=\"utf-8\", errors=\"replace\")\n\n@app.tool()\ndef list_docs() -> list[dict]:\n    \"\"\"列出知识库中所有文档的路径和标题\"\"\"\n    return [{\"path\": d[\"path\"], \"title\": d[\"title\"]} for d in _index]\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>启动时扫描文档建立内存索引，搜索不重复读文件</li><li>提供搜索（摘要）和读取（全文）两个工具，分开使用</li><li>路径安全检查：确保只能访问文档目录内的文件</li><li>docs目录通过环境变量配置，不写死路径</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>知识库搜索Server中，为什么要把&quot;搜索&quot;和&quot;读取全文&quot;设计为两个独立工具？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"a\"><span>技术上无法合并为一个工具</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"b\"><span>搜索返回多文档摘要让Claude定位相关文档，读取再获取详情，避免一次性加载所有文档撑满上下文</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"c\"><span>只是代码组织需要</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"d\"><span>MCP不允许单个工具既搜索又读取</span></label></div><div class=\"quiz-result\" id=\"q17-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>搭建你的知识库Server</h3><ol><li>把你的一批笔记或文档目录接入Server。</li><li>让Claude回答一个问题，观察它如何先搜索再读取来组织答案。</li><li>改进搜索：支持多个关键词（AND逻辑），提升搜索精度。</li></ol></div></div>" },
        { id: "database-query-server", title: "数据库查询Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 16 分钟</span></div><h1>数据库查询Server</h1><p class=\"lesson-lead\">第三个实战项目：构建一个让Claude能安全查询SQLite数据库的MCP Server，支持结构探查和只读查询。</p></div><div class=\"lesson-body\"><h2>安全设计原则</h2><p>数据库Server必须严格限制操作范围：只允许SELECT查询，禁止INSERT/UPDATE/DELETE/DROP等写操作，防止Claude误操作破坏数据。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import sqlite3, os, re\nfrom mcp.server import FastMCP\n\napp = FastMCP(\"数据库查询Server\")\nDB_PATH = os.environ[\"SQLITE_DB_PATH\"]\n\ndef get_conn():\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    return conn\n\n@app.tool()\ndef list_tables() -> list[str]:\n    \"\"\"列出数据库中所有表名\"\"\"\n    with get_conn() as conn:\n        rows = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\").fetchall()\n    return [r[\"name\"] for r in rows]\n\n@app.tool()\ndef describe_table(table_name: str) -> list[dict]:\n    \"\"\"查看指定表的字段名、类型和约束\"\"\"\n    # 防SQL注入：只允许字母数字下划线\n    if not re.match(r\"^[a-zA-Z0-9_]+$\", table_name):\n        raise ValueError(\"无效的表名\")\n    with get_conn() as conn:\n        rows = conn.execute(f\"PRAGMA table_info({table_name})\").fetchall()\n    return [{\"column\": r[\"name\"], \"type\": r[\"type\"], \"not_null\": bool(r[\"notnull\"])} for r in rows]\n\n@app.tool()\ndef query(sql: str, limit: int = 100) -> list[dict]:\n    \"\"\"执行只读SQL查询，自动添加LIMIT防止返回过多数据。只允许SELECT语句\"\"\"\n    # 安全检查：只允许SELECT语句\n    sql_stripped = sql.strip().upper()\n    if not sql_stripped.startswith(\"SELECT\"):\n        raise ValueError(\"只允许SELECT查询，禁止修改操作\")\n    if any(kw in sql_stripped for kw in [\"DROP\", \"DELETE\", \"UPDATE\", \"INSERT\", \"ALTER\", \"CREATE\"]):\n        raise ValueError(\"查询中包含禁止的关键词\")\n    # 添加LIMIT\n    if \"LIMIT\" not in sql_stripped:\n        sql = sql.rstrip(\";\") + f\" LIMIT {limit}\"\n    with get_conn() as conn:\n        rows = conn.execute(sql).fetchall()\n    return [dict(r) for r in rows]\n\nif __name__ == \"__main__\":\n    app.run()</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>只允许SELECT，在工具层阻断所有写操作</li><li>表名做正则校验防SQL注入，SQL参数用参数化查询</li><li>自动添加LIMIT，防止返回数百万行</li><li>DB路径从环境变量读取，不写死</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>数据库查询Server中，在工具层禁止非SELECT语句的目的是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"a\"><span>SELECT比其他语句运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"b\"><span>防止Claude误判意图执行DELETE或UPDATE等破坏性操作，从工具层设立不可绕过的安全边界</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"c\"><span>SQLite不支持其他操作</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"d\"><span>减少SQL解析时间</span></label></div><div class=\"quiz-result\" id=\"q18-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建数据库查询Server</h3><ol><li>用一个已有的SQLite数据库（或新建测试库）连接你的Server。</li><li>让Claude探查表结构，然后用自然语言描述一个查询需求，让它生成SQL并执行。</li><li>尝试让Claude写一个DELETE语句，验证安全检查是否有效阻断。</li></ol></div></div>" },
        { id: "slack-integration-server", title: "Slack消息集成Server", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 16 分钟</span></div><h1>Slack消息集成Server</h1><p class=\"lesson-lead\">第四个实战项目：构建一个让Claude能读取Slack频道历史和发送消息的MCP Server，演示第三方API集成模式。</p></div><div class=\"lesson-body\"><h2>准备工作</h2><p>需要在Slack创建一个App，获取Bot Token（<code>xoxb-...</code>），并授予<code>channels:history</code>、<code>chat:write</code>等权限。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">typescript</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import { McpServer } from \"@modelcontextprotocol/sdk/server/mcp.js\";\nimport { StdioServerTransport } from \"@modelcontextprotocol/sdk/server/stdio.js\";\nimport { z } from \"zod\";\n\nconst SLACK_TOKEN = process.env.SLACK_BOT_TOKEN!;\nconst BASE_URL = \"https://slack.com/api\";\n\nasync function slackApi(method: string, params: Record&lt;string, string&gt;) {\n  const url = new URL(`${BASE_URL}/${method}`);\n  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));\n  const res = await fetch(url.toString(), {\n    headers: { Authorization: `Bearer ${SLACK_TOKEN}` },\n  });\n  const data = await res.json() as { ok: boolean; error?: string; [k: string]: unknown };\n  if (!data.ok) throw new Error(`Slack API错误: ${data.error}`);\n  return data;\n}\n\nconst server = new McpServer({ name: \"Slack集成Server\", version: \"1.0.0\" });\n\nserver.tool(\"list_channels\", \"列出工作区中所有公开频道的名称和ID\", {},\n  async () => {\n    const data = await slackApi(\"conversations.list\", { limit: \"100\" });\n    const channels = (data.channels as Array&lt;{id: string; name: string}&gt;)\n      .map(c => `#${c.name} (${c.id})`).join(\"\\n\");\n    return { content: [{ type: \"text\", text: channels }] };\n  }\n);\n\nserver.tool(\"get_messages\", \"获取指定频道最近N条消息\",\n  { channel: z.string().describe(\"频道ID，如C0123456\"),\n    limit: z.number().min(1).max(50).default(20).describe(\"消息条数\") },\n  async ({ channel, limit }) => {\n    const data = await slackApi(\"conversations.history\", { channel, limit: String(limit) });\n    const msgs = (data.messages as Array&lt;{text: string; ts: string}&gt;)\n      .map(m => `[${new Date(Number(m.ts) * 1000).toLocaleString()}] ${m.text}`).join(\"\\n\");\n    return { content: [{ type: \"text\", text: msgs }] };\n  }\n);\n\nserver.tool(\"send_message\", \"向指定频道发送一条消息（需要Claude二次确认后执行）\",\n  { channel: z.string().describe(\"频道ID\"),\n    text: z.string().min(1).max(1000).describe(\"消息内容\") },\n  async ({ channel, text }) => {\n    await slackApi(\"chat.postMessage\", { channel, text });\n    return { content: [{ type: \"text\", text: \"消息发送成功\" }] };\n  }\n);\n\nconst transport = new StdioServerTransport();\nawait server.connect(transport);</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Bot Token通过环境变量注入，不写入代码</li><li>封装slackApi函数，统一处理认证和错误</li><li>写操作（send_message）要在工具描述中提示需确认</li><li>第三方API集成的通用模式：封装→工具化→安全控制</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在Slack集成Server中，send_message工具的描述里写明&quot;需要Claude二次确认后执行&quot;有什么实际作用？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"a\"><span>这只是注释，没有实际效果</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"b\"><span>Claude会把工具描述作为行为指引，写明需确认能引导Claude在执行发送前先告知用户意图，降低误发风险</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"c\"><span>描述触发了MCP协议层的审批流程</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"d\"><span>强制Slack API进行二次验证</span></label></div><div class=\"quiz-result\" id=\"q19-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建Slack集成Server</h3><ol><li>创建Slack测试App，获取Bot Token并配置权限。</li><li>连接Server后，让Claude总结指定频道最近一天的讨论要点。</li><li>思考：如何在send_message工具中加入内容过滤，防止Claude发送不当内容？</li></ol></div></div>" },
      ]
    },
    {
      title: "部署与生产化",
      lessons: [
        { id: "remote-deployment", title: "远程Server部署：HTTP与SSE", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 14 分钟</span></div><h1>远程Server部署：HTTP与SSE</h1><p class=\"lesson-lead\">本地stdio适合开发，生产环境需要通过HTTP+SSE把MCP Server部署为可被多个客户端访问的网络服务。</p></div><div class=\"lesson-body\"><h2>HTTP+SSE Transport</h2><p>远程Server通过HTTP接收请求，通过Server-Sent Events（SSE）向Client推送流式响应。客户端配置<code>url</code>替代<code>command</code>即可连接远程Server。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>from mcp.server import FastMCP\nfrom mcp.server.sse import SseServerTransport\nfrom starlette.applications import Starlette\nfrom starlette.routing import Route\nimport uvicorn\n\napp = FastMCP(\"远程知识库Server\")\n\n@app.tool()\ndef search(query: str) -> list[str]:\n    \"\"\"搜索知识库\"\"\"\n    return [f\"关于{query}的搜索结果...\"]\n\n# 包装为ASGI应用\nmcp_app = app.get_asgi_app()\n\n# 也可以直接用FastMCP的run方法指定transport\nif __name__ == \"__main__\":\n    # 以SSE模式运行，监听8000端口\n    app.run(transport=\"sse\", host=\"0.0.0.0\", port=8000)</pre></div><h2>客户端连接远程Server</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># claude_desktop_config.json - 连接远程Server\n{\n  \"mcpServers\": {\n    \"remote-kb\": {\n      \"url\": \"https://your-server.example.com/mcp\",\n      \"headers\": {\"Authorization\": \"Bearer YOUR_TOKEN\"}\n    }\n  }\n}</pre></div><div class=\"card card-key\"><div class=\"card-label\">部署注意事项</div><p>远程Server必须：1）使用HTTPS而非HTTP；2）实现认证（如Bearer Token或OAuth）；3）配置CORS；4）做好速率限制，防止滥用。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>生产部署用HTTP+SSE Transport，支持多Client</li><li>FastMCP.run(transport=\"sse\")启动SSE模式</li><li>Client配置url替代command连接远程Server</li><li>必须启用HTTPS、认证、CORS和速率限制</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>把MCP Server从本地stdio模式改为远程部署时，必须新增哪项安全措施？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"a\"><span>增加更多工具</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"b\"><span>启用HTTPS和请求认证（如Bearer Token），防止未授权访问，因为网络上的Server任何人都能尝试连接</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"c\"><span>把所有工具改为只读</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"d\"><span>换用TypeScript重写</span></label></div><div class=\"quiz-result\" id=\"q20-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>部署远程Server</h3><ol><li>把你的一个Server改为SSE模式，在本地用uvicorn启动。</li><li>修改Claude Desktop配置，用url替代command连接本地SSE Server。</li><li>思考：如果要把Server部署到云服务器，需要额外配置哪些内容？</li></ol></div></div>" },
        { id: "production-config", title: "生产环境配置与监控", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 12 分钟</span></div><h1>生产环境配置与监控</h1><p class=\"lesson-lead\">把MCP Server推向生产，需要做好日志、监控、优雅重启和健康检查，让服务可观测、可维护。</p></div><div class=\"lesson-body\"><h2>结构化日志</h2><p>生产环境用结构化日志（JSON格式），便于日志系统聚合和查询。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import logging, json, time, sys\nfrom mcp.server import FastMCP\n\n# 配置结构化日志（输出到stderr）\nlogging.basicConfig(\n    stream=sys.stderr,\n    level=logging.INFO,\n    format=\"%(message)s\",\n)\nlogger = logging.getLogger(__name__)\n\ndef log(level: str, event: str, **kwargs):\n    record = {\"time\": time.time(), \"level\": level, \"event\": event, **kwargs}\n    logger.info(json.dumps(record, ensure_ascii=False))\n\napp = FastMCP(\"生产级Server\")\n\n@app.tool()\ndef search(query: str) -> list[str]:\n    \"\"\"搜索工具，带性能监控\"\"\"\n    start = time.time()\n    try:\n        results = [f\"结果: {query}\"]\n        log(\"info\", \"tool_call\", tool=\"search\", query=query,\n            results=len(results), duration_ms=(time.time()-start)*1000)\n        return results\n    except Exception as e:\n        log(\"error\", \"tool_error\", tool=\"search\", error=str(e))\n        raise\n\nif __name__ == \"__main__\":\n    log(\"info\", \"server_start\", version=\"1.0.0\")\n    app.run()</pre></div><div class=\"card card-note\"><div class=\"card-label\">健康检查</div><p>远程Server建议暴露<code>/health</code>接口，返回Server版本和工具列表。负载均衡器和监控系统可通过它确认Server存活并自动摘除故障节点。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>日志输出到stderr，格式用JSON便于采集</li><li>记录每次工具调用的耗时和结果数量</li><li>错误日志包含完整上下文便于排查</li><li>暴露/health接口支持健康检查和自动恢复</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>生产级MCP Server应该把日志写到哪里，用什么格式？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"a\"><span>写到stdout，用纯文本格式，方便阅读</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"b\"><span>写到stderr，用JSON结构化格式，因为stdout被MCP协议占用，JSON便于日志系统自动解析和告警</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"c\"><span>写到数据库，不需要文件日志</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"d\"><span>不需要日志，MCP Server自带监控</span></label></div><div class=\"quiz-result\" id=\"q21-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>为Server添加生产级监控</h3><ol><li>为你的一个Server添加结构化JSON日志，记录每次工具调用的耗时。</li><li>添加/health接口，返回Server版本和已加载工具列表。</li><li>模拟一次工具调用失败，验证错误日志是否包含足够的排查信息。</li></ol></div></div>" },
        { id: "mcp-ecosystem", title: "MCP生态与社区", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>MCP生态与社区</h1><p class=\"lesson-lead\">MCP已经形成了活跃的开源生态。了解现有资源，能让你快速复用社区成果，也能贡献自己的Server。</p></div><div class=\"lesson-body\"><h2>官方资源</h2><ul><li><strong>官方文档</strong>：modelcontextprotocol.io，包含协议规范、SDK文档和教程。</li><li><strong>官方Server集合</strong>：github.com/modelcontextprotocol/servers，收录了文件系统、GitHub、Slack、数据库等常用Server。</li><li><strong>Python SDK</strong>：github.com/modelcontextprotocol/python-sdk</li><li><strong>TypeScript SDK</strong>：github.com/modelcontextprotocol/typescript-sdk</li></ul><h2>社区生态</h2><p>MCP生态快速增长，已有数百个社区Server覆盖各类使用场景：</p><ul><li>开发工具：代码搜索、CI/CD、容器管理</li><li>数据工具：各类数据库、数据可视化</li><li>协作工具：Notion、Linear、Jira、日历</li><li>AI工具：向量数据库、嵌入服务</li></ul><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 使用官方filesystem Server（无需自己开发）\n# claude_desktop_config.json:\n{\n  \"mcpServers\": {\n    \"filesystem\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/Users/me\"]\n    },\n    \"github\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"],\n      \"env\": {\"GITHUB_TOKEN\": \"ghp_xxxxxx\"}\n    }\n  }\n}</pre></div><div class=\"card card-success\"><div class=\"card-label\">参与社区</div><p>你开发的MCP Server可以发布为npm包或PyPI包，供全社区使用。遵循官方的Server命名规范（<code>@your-org/mcp-server-xxx</code>），在README中标注兼容的MCP协议版本，即可被社区发现。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>modelcontextprotocol.io是官方文档和规范入口</li><li>官方Server仓库覆盖大量常用集成场景</li><li>社区已有数百个Server可直接使用</li><li>自己的Server可发布为包贡献给生态</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>想在项目中快速接入GitHub功能，最高效的做法是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"a\"><span>从零开始自己实现GitHub MCP Server</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"b\"><span>直接使用官方@modelcontextprotocol/server-github包，配置Token后即可使用，无需自己开发</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"c\"><span>MCP不支持GitHub集成</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"d\"><span>必须联系Anthropic申请GitHub接入权限</span></label></div><div class=\"quiz-result\" id=\"q22-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>探索MCP生态</h3><ol><li>浏览官方servers仓库，找到3个适合你工作场景的现有Server。</li><li>接入其中一个，让Claude用它完成一项实际任务。</li><li>思考：你最近开发的哪个Server值得开源贡献给社区？整理README并发布。</li></ol></div></div>" },
      ]
    },
  ],
  answers: { q1: 'b', q2: 'b', q3: 'b', q4: 'b', q5: 'b', q6: 'b', q7: 'b', q8: 'b', q9: 'b', q10: 'b', q11: 'b', q12: 'b', q13: 'b', q14: 'b', q15: 'b', q16: 'b', q17: 'b', q18: 'b', q19: 'b', q20: 'b', q21: 'b', q22: 'b' }
};
