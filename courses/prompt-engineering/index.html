<script>
const COURSE = {
  id: 'prompt-engineering',
  title: '提示词工程',
  modules: [
    {
      title: "提示词基础",
      lessons: [
        { id: "why-prompt-eng", title: "为什么提示词工程很重要？", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 8 分钟</span></div><h1>为什么提示词工程很重要？</h1><p class=\"lesson-lead\">同一个模型，不同的提示词会带来天差地别的结果。提示词工程就是用最小成本撬动最大能力的技艺。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>def ask(client, prompt):\n    return client.messages.create(\n        model=\"claude-sonnet-4-20250514\", max_tokens=256,\n        messages=[{\"role\": \"user\", \"content\": prompt}],\n    ).content[0].text\n\nprint(ask(client, \"写点关于狗的东西\"))          # 弱提示\nprint(ask(client, \"你是宠物科普作者，为养狗新手写100字金毛介绍，用要点列表\"))</pre></div><h2>提示词是模型的接口</h2><p>大模型的能力已经内置在权重里，但要把它准确地调用出来，取决于你怎么问。清晰、结构化的提示能显著提升正确率、稳定性和格式可控性，而无需训练或微调。</p><div class=\"card card-key\"><div class=\"card-label\">核心观念</div><p>提示词工程不是玄学，而是一套<strong>可迭代、可评估</strong>的工程方法：先写、再测、再改。比起换更大的模型，优化提示往往更便宜、更快见效。</p></div><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">对比示例</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">弱：写点关于狗的东西。\n\n强：你是一名宠物科普作者。请为养狗新手写一段 100 字以内的中文介绍，说明金毛犬的性格与日常照料要点，用要点列表呈现。</div></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>提示词是调用模型已有能力的接口</li><li>好提示能提升准确率、稳定性与格式可控性</li><li>提示工程是可迭代、可评估的工程方法</li><li>优化提示常比换大模型更划算</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>提示词工程最准确的定位是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>一种需要重新训练模型的技术</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>通过清晰、结构化的指令把模型已有能力准确调用出来的可迭代工程方法</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>只对小模型有效的小技巧</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"d\"><span>与输出质量无关的形式</span></label></div><div class=\"quiz-result\" id=\"q1-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>改写一个弱提示</h3><ol><li>找一个你常用的模糊提问。</li><li>为它补上角色、任务、约束与输出格式。</li><li>对比改写前后的回复质量。</li></ol></div></div>" },
        { id: "three-elements", title: "清晰指令的三要素：上下文、任务、格式", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>清晰指令的三要素：上下文、任务、格式</h1><p class=\"lesson-lead\">一条高质量提示通常包含三个部分：提供上下文、明确任务、规定输出格式。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>prompt = (\n    \"【上下文】你是一名资深财经编辑。\n\"\n    \"【任务】把下面的财报摘要改写成通俗版本。\n\"\n    \"【格式】不超过3段，每段一个要点，避免术语。\n\n\"\n    f\"财报摘要：{summary}\"\n)\nresp = client.messages.create(model=\"claude-sonnet-4-20250514\",\n    max_tokens=512, messages=[{\"role\":\"user\",\"content\":prompt}])</pre></div><h2>三要素</h2><ul><li><strong>上下文</strong>：背景信息、角色设定、相关资料。</li><li><strong>任务</strong>：你具体要它做什么，动词要明确。</li><li><strong>格式</strong>：输出长度、结构、语言、是否用列表/JSON。</li></ul><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">三要素模板</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">【上下文】你是一名资深财经编辑。\n【任务】把下面这段财报摘要改写成面向普通读者的通俗版本。\n【格式】不超过 3 段，每段一个要点，避免专业术语。\n\n财报摘要：……</div></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>把三要素显式分块（用标题或 XML 标签），能让模型更准确地理解你的意图，也方便你后续单独修改某一部分。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>清晰指令=上下文+任务+格式</li><li>上下文给背景与角色</li><li>任务要用明确动词描述</li><li>格式约束让输出可预测</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>下面哪一项最完整地构成一条清晰的指令？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>只写一个任务动词</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>只给背景资料</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>同时提供上下文（背景/角色）、明确的任务和具体的输出格式要求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"d\"><span>只规定输出格式</span></label></div><div class=\"quiz-result\" id=\"q2-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>套用三要素模板</h3><ol><li>选一个真实需求，按上下文/任务/格式三块填写。</li><li>用 XML 标签或标题把三块分隔清楚。</li><li>测试并微调每一块。</li></ol></div></div>" },
        { id: "anti-patterns", title: "常见提示词反模式与陷阱", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>常见提示词反模式与陷阱</h1><p class=\"lesson-lead\">了解常见错误，能让你少走很多弯路。本节盘点最高频的反模式。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 反模式：模糊否定\nbad = \"写一段介绍，不要太专业。\"\n# 改进：正向、具体、可判断\ngood = \"用初中生能懂的话，写一段80字以内的介绍，配一个生活化的例子。\"</pre></div><h2>典型反模式</h2><ul><li><strong>含糊其辞</strong>：好一点、专业些，模型无从判断标准。</li><li><strong>负面堆砌</strong>：只说不要做什么，却不说要做什么。</li><li><strong>一次塞太多</strong>：多个无关任务混在一条提示里。</li><li><strong>缺少示例</strong>：复杂格式不给样例，靠模型猜。</li></ul><div class=\"card card-warn\"><div class=\"card-label\">常见陷阱</div><p>只写不要用专业术语，不如直接写用初中生能懂的话解释。<strong>正向、具体</strong>的指令永远优于模糊的否定。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>避免含糊的程度词，给可判断的标准</li><li>用正向指令替代单纯的否定</li><li>一条提示聚焦一个任务</li><li>复杂格式务必给示例</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪种写法最可能产生不稳定的结果？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>给出明确角色、任务与输出示例</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>只写让它写得专业点、好一点这类含糊的程度要求，不给任何可判断的标准</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>用正向、具体的指令</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"d\"><span>把复杂格式配上样例</span></label></div><div class=\"quiz-result\" id=\"q3-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>自查你的提示</h3><ol><li>拿一条现有提示，对照四种反模式逐项检查。</li><li>把所有否定式改成正向指令。</li><li>为其中的格式要求补一个示例。</li></ol></div></div>" },
      ]
    },
    {
      title: "角色与人格设定",
      lessons: [
        { id: "system-prompt-power", title: "System Prompt 的力量与最佳实践", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>System Prompt 的力量与最佳实践</h1><p class=\"lesson-lead\">System Prompt 决定了 Claude 的底层人格与行为准则，是最有杠杆的一段提示。</p></div><div class=\"lesson-body\"><h2>为什么 system 最有杠杆</h2><p>它对整段对话全程生效，是设定身份、语气、能力边界与输出风格的最佳位置。把稳定不变的规则放这里，比在每条 user 消息里重复要高效得多。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>system = (\n    \"你是 Acme 公司的客服助手 小艾。\"\n    \"语气友好专业，只回答与 Acme 产品相关的问题。\"\n    \"无法解答时引导用户联系人工客服，不要编造信息。\"\n)\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\", max_tokens=512,\n    system=system,\n    messages=[{\"role\":\"user\",\"content\":\"你们的退货政策是什么？\"}],\n)</pre></div><div class=\"card card-key\"><div class=\"card-label\">最佳实践</div><p>system 里写<strong>角色 + 规则 + 风格 + 边界</strong>；具体每次的任务放 user。规则用要点列出，越明确越好。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>system 对整段对话全程生效，杠杆最大</li><li>适合放角色、规则、风格与边界</li><li>稳定规则放 system，可变任务放 user</li><li>规则用要点列出更易遵循</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>关于 System Prompt 的最佳实践，哪项最合适？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"a\"><span>把每次都不同的具体任务写进 system</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"b\"><span>在 system 里设定稳定的角色、规则、风格与边界，把每次可变的具体任务放在 user 消息里</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"c\"><span>system 留空，全靠 user 消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"d\"><span>把 API Key 写进 system</span></label></div><div class=\"quiz-result\" id=\"q4-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>写一个客服 system</h3><ol><li>为一个虚拟产品写客服助手的 system，含身份、三条规则与语气。</li><li>测试它对越界问题（如闲聊）的反应。</li><li>根据结果收紧或放宽规则。</li></ol></div></div>" },
        { id: "role-consistency", title: "角色一致性：让 Claude 保持人格", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>角色一致性：让 Claude 保持人格</h1><p class=\"lesson-lead\">长对话中角色容易漂移。本节讲如何让 Claude 稳定地保持设定的人格。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>messages = [\n    {\"role\":\"user\",\"content\":\"今天天气怎么样？\"},\n    {\"role\":\"assistant\",\"content\":\"云收雨歇，风里已有秋的凉意。\"},  # 锚定语气\n    {\"role\":\"user\",\"content\":\"帮我推荐一本书。\"},\n]\nresp = client.messages.create(model=\"claude-sonnet-4-20250514\",\n    max_tokens=256, system=\"你是诗人风格的助手，回答简短而富有意象。\",\n    messages=messages)</pre></div><h2>角色漂移与对策</h2><p>随着对话变长，模型可能逐渐偏离最初的人格。对策：在 system 中明确人格特征，必要时用少量对话示例锚定语气，并在关键处重申。</p><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">锚定语气的少样本</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">system：你是诗人风格的助手，回答简短而富有意象。\n\nuser：今天天气怎么样？\nassistant：云收雨歇，风里已有秋的凉意。\n\nuser：帮我推荐一本书。</div></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>用一两轮示范对话（few-shot）来锚定语气，往往比堆砌形容词更有效。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>长对话中人格可能漂移</li><li>在 system 明确人格特征</li><li>用少样本示范对话锚定语气</li><li>关键节点可适度重申角色</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>要让 Claude 在长对话中稳定保持某种说话风格，最有效的做法之一是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"a\"><span>只在 system 写它很有风格</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"b\"><span>在 system 明确人格，并用一两轮示范对话（few-shot）锚定具体语气</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"c\"><span>每次都换不同人格</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"d\"><span>完全不设定，靠运气</span></label></div><div class=\"quiz-result\" id=\"q5-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>锚定一个人格</h3><ol><li>设定一个鲜明人格（如简洁的禅师）。</li><li>写两轮示范对话锚定语气。</li><li>进行 6 轮对话，检查是否发生漂移。</li></ol></div></div>" },
        { id: "boundary-control", title: "边界控制：定义 Claude 能做与不能做的", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>边界控制：定义 Claude 能做与不能做的</h1><p class=\"lesson-lead\">明确的边界能让助手既有用又安全。本节讲如何定义允许与拒绝的范围。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>system = (\n    \"你是医疗信息助手。\n\"\n    \"可以：解释医学名词、提供权威科普。\n\"\n    \"不可以：给出诊断、开处方、替代医生。\n\"\n    \"被要求做不可以的事时：礼貌说明限制，并建议咨询专业医生。\"\n)</pre></div><h2>正负清单</h2><p>同时给出<strong>能做什么</strong>和<strong>不能做什么</strong>，并说明越界时如何回应（拒绝 + 引导），比单纯禁止更可靠。</p><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">边界设定示例</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">你是医疗信息助手。\n可以：解释常见医学名词、提供权威科普。\n不可以：给出诊断、开具处方、替代医生建议。\n当被要求做不可以的事时：礼貌说明限制，并建议咨询专业医生。</div></div><div class=\"card card-warn\"><div class=\"card-label\">注意</div><p>边界要<strong>具体且给出替代行为</strong>。只写不要诊断不够，应补上当用户求诊断时该怎么回应。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>同时给出允许与禁止清单</li><li>说明越界时的具体回应方式</li><li>拒绝要配合引导，更有用</li><li>边界具体可执行才可靠</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>设定边界时，哪种写法最稳健？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"a\"><span>只写一句不要做坏事</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"b\"><span>列出能做与不能做的具体清单，并规定越界时如何礼貌拒绝并引导用户</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"c\"><span>完全不设边界</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"d\"><span>只列允许做的，不提禁止的</span></label></div><div class=\"quiz-result\" id=\"q6-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>为助手划边界</h3><ol><li>为一个法律信息助手写允许/禁止清单。</li><li>规定它被要求出具正式法律意见时的回应。</li><li>用越界问题测试边界是否生效。</li></ol></div></div>" },
      ]
    },
    {
      title: "思维链（Chain of Thought）",
      lessons: [
        { id: "what-is-cot", title: "什么是 CoT？原理与适用场景", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>什么是 CoT？原理与适用场景</h1><p class=\"lesson-lead\">思维链（Chain of Thought）让模型先推理再作答，显著提升复杂任务的准确率。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 复杂多步问题：先推理再作答\nprompt = \"一个水箱每分钟进3升漏1升，初始5升，10分钟后多少升？请一步步推理。\"\nresp = client.messages.create(model=\"claude-sonnet-4-20250514\",\n    max_tokens=512, messages=[{\"role\":\"user\",\"content\":prompt}])\nprint(resp.content[0].text)</pre></div><h2>原理</h2><p>对于需要多步推理的问题，让模型把思考过程一步步写出来，往往比直接给答案更准。因为推理过程占用了更多计算并减少了跳步出错。</p><h2>适用场景</h2><ul><li>数学与逻辑题</li><li>多步骤规划</li><li>需要权衡的判断题</li></ul><div class=\"card card-key\"><div class=\"card-label\">核心</div><p>CoT 适合<strong>复杂、多步</strong>的问题。对简单的事实问答，强加 CoT 反而浪费 token，收益有限。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>CoT 让模型先推理再作答</li><li>推理过程减少跳步出错</li><li>适合数学、逻辑、多步规划</li><li>简单问答不必强加 CoT</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>思维链（CoT）最适合用于哪类任务？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"a\"><span>简单的事实查询</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"b\"><span>需要多步推理或逻辑权衡的复杂问题</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"c\"><span>所有任务，无差别使用</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"d\"><span>只为了增加输出长度</span></label></div><div class=\"quiz-result\" id=\"q7-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>感受 CoT 的差异</h3><ol><li>找一道多步数学题。</li><li>分别用直接作答和先推理后作答两种提示。</li><li>比较两者的正确率。</li></ol></div></div>" },
        { id: "zero-shot-cot", title: "零样本 CoT：让模型自己推理", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>零样本 CoT：让模型自己推理</h1><p class=\"lesson-lead\">不给示例，只用一句引导语，就能触发模型的逐步推理。</p></div><div class=\"lesson-body\"><h2>一句话触发</h2><p>在问题后加上让我们一步步思考之类的引导，即可让模型展开推理。这就是零样本 CoT。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>prompt = (\n    \"一个水箱每分钟进水 3 升、漏水 1 升，\"\n    \"初始 5 升，10 分钟后有多少升？\\n\"\n    \"请一步步推理，最后用 答案： 给出结果。\"\n)\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\", max_tokens=512,\n    messages=[{\"role\":\"user\",\"content\":prompt}],\n)\nprint(resp.content[0].text)</pre></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>要求模型在推理后用固定标记（如答案：）输出结论，便于你用程序提取最终结果。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>零样本 CoT 不需要示例</li><li>用一句引导语触发逐步推理</li><li>适合快速增强推理而不增加构造成本</li><li>用固定标记输出结论便于解析</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>零样本 CoT 的关键特征是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"a\"><span>必须提供多个推理示例</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"b\"><span>不提供示例，仅用一句引导语（如请一步步推理）就触发模型展开推理</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"c\"><span>需要微调模型</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"d\"><span>只能用于翻译</span></label></div><div class=\"quiz-result\" id=\"q8-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>触发零样本 CoT</h3><ol><li>选一道逻辑题。</li><li>加一句引导语让模型逐步推理。</li><li>要求它用答案：标记结论并用程序提取。</li></ol></div></div>" },
        { id: "few-shot-cot", title: "少样本 CoT：用示例引导推理过程", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>少样本 CoT：用示例引导推理过程</h1><p class=\"lesson-lead\">当你想控制推理的风格或步骤结构时，给出带推理过程的示例最有效。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>prompt = (\n    \"问题：3个苹果分给2人，每人几个还剩几个？\n\"\n    \"推理：3 ÷ 2 = 1 余 1，每人1个，剩1个。\n\"\n    \"答案：每人1个，剩1个。\n\n\"\n    \"问题：7块糖分给3个孩子，每人几块还剩几块？\n推理：\"\n)</pre></div><h2>示范推理</h2><p>提供一两个完整的问题+推理+答案示例，模型会模仿你示范的推理方式。这对统一推理格式特别有用。</p><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">少样本 CoT 示例</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">问题：3 个苹果分给 2 人，每人几个还剩几个？\n推理：3 ÷ 2 = 1 余 1，所以每人 1 个，剩 1 个。\n答案：每人 1 个，剩 1 个。\n\n问题：7 块糖分给 3 个孩子，每人几块还剩几块？\n推理：</div></div><div class=\"card card-key\"><div class=\"card-label\">要点</div><p>示例中的推理风格会被模仿。想要简洁推理就示范简洁的，想要详尽就示范详尽的。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用带推理过程的示例引导模型</li><li>模型会模仿示例的推理风格</li><li>适合统一推理步骤与格式</li><li>1-2 个高质量示例通常已足够</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>少样本 CoT 相比零样本 CoT 的独特优势是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"a\"><span>完全不需要提示</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"b\"><span>通过示范带推理过程的示例，可以精确控制推理的风格、步骤结构和输出格式</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"c\"><span>一定更省 token</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"d\"><span>不需要给出答案</span></label></div><div class=\"quiz-result\" id=\"q9-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>设计推理示例</h3><ol><li>为一类计算题写一个问题+推理+答案的示例。</li><li>用它引导模型解三道同类新题。</li><li>调整示例的详略，观察输出推理的变化。</li></ol></div></div>" },
        { id: "extended-thinking", title: "Extended Thinking：深度推理模式", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>Extended Thinking：深度推理模式</h1><p class=\"lesson-lead\">Claude 的扩展思考能力可在作答前进行更深入的内部推理，适合高难度问题。</p></div><div class=\"lesson-body\"><h2>什么是 Extended Thinking</h2><p>开启后，模型会先生成一段思考内容，再给出最终回答。它在数学证明、复杂规划、疑难调试等任务上表现更好。你可以通过 budget 控制思考预算。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>resp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=4096,\n    thinking={\"type\": \"enabled\", \"budget_tokens\": 2048},\n    messages=[{\"role\":\"user\",\"content\":\"证明：任意三个连续整数之积能被 6 整除。\"}],\n)\nfor block in resp.content:\n    print(block.type)  # 可能含 thinking 与 text 两类块</pre></div><div class=\"card card-note\"><div class=\"card-label\">权衡</div><p>更深入的思考会消耗更多 token、增加延迟。把它用在<strong>确实困难</strong>的任务上，简单任务无需开启。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Extended Thinking 让模型先深入推理再作答</li><li>适合证明、复杂规划、疑难调试</li><li>用 budget_tokens 控制思考预算</li><li>会增加 token 与延迟，按需开启</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>关于 Extended Thinking，哪项描述最准确？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"a\"><span>它能让所有任务都免费变快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"b\"><span>它让模型在作答前进行更深入的内部推理，适合高难度任务，但会增加 token 消耗和延迟，应按需开启</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"c\"><span>它会替代 system prompt</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"d\"><span>它只能用于翻译任务</span></label></div><div class=\"quiz-result\" id=\"q10-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>对比深度推理</h3><ol><li>选一道你觉得困难的题。</li><li>分别在开/关 Extended Thinking 下作答。</li><li>比较正确率与耗时，总结何时值得开启。</li></ol></div></div>" },
      ]
    },
    {
      title: "少样本学习",
      lessons: [
        { id: "fewshot-selection", title: "Few-Shot 示例的选择原则", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>Few-Shot 示例的选择原则</h1><p class=\"lesson-lead\">示例质量直接决定少样本学习的效果。选对示例，事半功倍。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 一个含格式瑕疵的坏示例会污染所有输出\nexamples = [\n    {\"text\":\"今天天气真好\", \"label\":\"正面\"},\n    {\"text\":\"这服务太差了\", \"label\":\"负面\"},\n    {\"text\":\"还行吧\",       \"label\":\"中性\"},   # 覆盖边界情况\n]</pre></div><h2>选择原则</h2><ul><li><strong>代表性</strong>：覆盖典型与边界情况。</li><li><strong>多样性</strong>：避免示例彼此雷同。</li><li><strong>正确性</strong>：示例本身必须准确无误。</li><li><strong>一致性</strong>：格式与你期望的输出完全一致。</li></ul><div class=\"card card-warn\"><div class=\"card-label\">注意</div><p>示例里的任何错误或不一致都会被模型学走。一个带格式瑕疵的示例，可能让所有输出都跟着出错。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>示例要有代表性，覆盖典型与边界</li><li>保持多样性，避免雷同</li><li>示例本身必须完全正确</li><li>示例格式与期望输出一致</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>挑选 few-shot 示例时，最容易被忽视却影响巨大的是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"a\"><span>示例越多越好</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"b\"><span>示例本身的正确性与格式一致性——任何错误或不一致都会被模型直接模仿</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"c\"><span>示例必须很长</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"d\"><span>示例顺序无所谓</span></label></div><div class=\"quiz-result\" id=\"q11-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>评估你的示例集</h3><ol><li>检查现有示例是否有事实或格式错误。</li><li>替换掉彼此雷同的示例。</li><li>补一个边界情况示例。</li></ol></div></div>" },
        { id: "example-ordering", title: "示例排列顺序的影响", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>示例排列顺序的影响</h1><p class=\"lesson-lead\">示例的先后顺序会影响模型表现，尤其在分类任务中。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import random\n# 分类示例：打乱顺序、让类别交错以减少标签偏置\nrandom.seed(42)               # 固定种子保证可复现\nrandom.shuffle(examples)</pre></div><h2>顺序效应</h2><p>模型对靠近问题的示例更敏感（近因效应），且若所有同类示例扎堆出现，可能引入标签偏置。常见做法是打乱类别顺序、保持均衡。</p><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>做分类时，让不同类别的示例<strong>交错排列</strong>而非按类别分块，可减少偏置。固定随机种子可保证可复现。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>示例顺序会影响输出，存在近因效应</li><li>同类示例扎堆易引入标签偏置</li><li>分类任务建议类别交错排列</li><li>固定顺序/种子保证可复现</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在 few-shot 分类中，为减少标签偏置，较好的做法是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"a\"><span>把同一类别的示例全部排在一起</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"b\"><span>让不同类别的示例交错、均衡排列，避免某一类扎堆</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"c\"><span>只放一个类别的示例</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"d\"><span>随机到无法复现</span></label></div><div class=\"quiz-result\" id=\"q12-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>测试顺序效应</h3><ol><li>用一组分类示例，分别按分块和交错两种顺序。</li><li>在相同测试集上比较准确率。</li><li>记录顺序带来的差异。</li></ol></div></div>" },
        { id: "dynamic-fewshot", title: "动态少样本与检索增强", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 12 分钟</span></div><h1>动态少样本与检索增强</h1><p class=\"lesson-lead\">与其固定一套示例，不如根据当前输入动态检索最相关的示例，效果更好。</p></div><div class=\"lesson-body\"><h2>按需检索示例</h2><p>把一个示例库做向量索引，针对每条输入检索语义最相近的几个示例放进提示。这能让示例始终贴合当前问题，是 RAG 思想在 few-shot 上的应用。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>def build_prompt(query, retriever):\n    examples = retriever.top_k(query, k=3)   # 检索最相关示例\n    shots = \"\\n\\n\".join(f\"输入：{e.q}\\n输出：{e.a}\" for e in examples)\n    return f\"{shots}\\n\\n输入：{query}\\n输出：\"</pre></div><div class=\"card card-key\"><div class=\"card-label\">要点</div><p>动态少样本 = <strong>检索 + few-shot</strong>。示例随输入变化，既相关又节省固定提示的篇幅。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>根据输入动态检索最相关示例</li><li>把示例库做向量索引按需取用</li><li>示例始终贴合当前问题</li><li>本质是 RAG 与 few-shot 的结合</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>动态少样本（检索增强）相比静态固定示例的主要优势是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"a\"><span>完全不需要示例库</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"b\"><span>为每条输入检索语义最相关的示例，使示例始终贴合当前问题，提升相关性与命中率</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"c\"><span>一定减少所有 token</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"d\"><span>不需要任何模型</span></label></div><div class=\"quiz-result\" id=\"q13-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>搭一个简易检索器</h3><ol><li>建立一个小示例库并做向量索引。</li><li>对新输入检索 top-3 示例拼进提示。</li><li>对比静态与动态示例的回答质量。</li></ol></div></div>" },
      ]
    },
    {
      title: "结构化输出",
      lessons: [
        { id: "json-output", title: "引导输出 JSON：方法与技巧", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 12 分钟</span></div><h1>引导输出 JSON：方法与技巧</h1><p class=\"lesson-lead\">结构化数据常需要 JSON 输出。本节讲如何稳定地让 Claude 产出合法 JSON。</p></div><div class=\"lesson-body\"><h2>三个技巧</h2><ul><li>明确给出目标 JSON 的字段与类型。</li><li>提供一个示例 JSON。</li><li>用 prefill 让回复以 <code>{</code> 开头，减少多余文字。</li></ul><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>resp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\", max_tokens=512,\n    messages=[\n        {\"role\":\"user\",\"content\":\"提取姓名和年龄，输出 JSON：张三今年28岁\"},\n        {\"role\":\"assistant\",\"content\":\"{\"},   # prefill 强制以 { 开头\n    ],\n)\nprint(\"{\" + resp.content[0].text)</pre></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>给出字段 schema + 一个示例 + prefill，三者结合能让 JSON 输出非常稳定。解析前仍建议用 try/except 兜底。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>明确字段与类型，并给示例 JSON</li><li>用 prefill 让回复以 { 开头</li><li>减少模型添加的多余说明文字</li><li>解析时仍要做异常兜底</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>要让 Claude 稳定输出合法 JSON，下面哪种组合最有效？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"a\"><span>只说请输出 JSON</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"b\"><span>明确字段与类型、给一个示例 JSON，并用 prefill 让回复以 { 开头</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"c\"><span>把 temperature 调到最高</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"d\"><span>要求它先解释再输出</span></label></div><div class=\"quiz-result\" id=\"q14-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>稳定产出 JSON</h3><ol><li>定义一个含三个字段的目标 schema。</li><li>用示例+prefill 让模型输出 JSON。</li><li>写解析代码并加 try/except 兜底。</li></ol></div></div>" },
        { id: "xml-output", title: "XML 格式输出与解析", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>XML 格式输出与解析</h1><p class=\"lesson-lead\">Claude 对 XML 标签理解很好，用标签包裹输出便于稳定提取。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import re\ntext = resp.content[0].text\nsummary = re.search(r\"&lt;summary&gt;(.*?)&lt;/summary&gt;\", text, re.S).group(1)\nkeywords = re.search(r\"&lt;keywords&gt;(.*?)&lt;/keywords&gt;\", text, re.S).group(1)\nprint(summary.strip(), keywords.strip())</pre></div><h2>用标签分区</h2><p>要求模型把不同部分放进不同标签，例如 <code>&lt;summary&gt;</code> 与 <code>&lt;tags&gt;</code>，再用正则或解析器提取。这比解析自由文本可靠得多。</p><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">XML 输出提示</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">请阅读文章，输出：\n&lt;summary&gt;不超过两句话的摘要&lt;/summary&gt;\n&lt;keywords&gt;逗号分隔的关键词&lt;/keywords&gt;</div></div><div class=\"card card-key\"><div class=\"card-label\">要点</div><p>XML 标签既<strong>引导</strong>模型组织输出，又方便你<strong>精确提取</strong>每一部分，是 Claude 上非常稳健的结构化方式。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用 XML 标签为输出分区</li><li>Claude 对标签结构理解良好</li><li>标签便于正则或解析器精确提取</li><li>比解析自由文本更可靠</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>为什么用 XML 标签包裹输出在 Claude 上特别有效？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"a\"><span>因为 XML 更省 token</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"b\"><span>标签既能引导模型清晰组织各部分输出，又便于程序精确提取每一段，比解析自由文本可靠</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"c\"><span>因为只有 XML 能被解析</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"d\"><span>因为它能替代 system prompt</span></label></div><div class=\"quiz-result\" id=\"q15-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>用标签提取</h3><ol><li>让模型把摘要和关键词分别放进两个标签。</li><li>写代码提取两个标签内的内容。</li><li>测试 5 篇不同文章的稳定性。</li></ol></div></div>" },
        { id: "prefill-output", title: "使用 Prefill 控制输出格式", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>使用 Prefill 控制输出格式</h1><p class=\"lesson-lead\">通过预填 assistant 消息的开头，可以强力约束输出的起始与格式。</p></div><div class=\"lesson-body\"><h2>Prefill 是什么</h2><p>在 messages 末尾加一条 <code>assistant</code> 消息，写上回复应有的开头。模型会从你给的开头继续，从而跳过寒暄、直接进入目标格式。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>messages=[\n    {\"role\":\"user\",\"content\":\"列出三个利好和三个风险\"},\n    {\"role\":\"assistant\",\"content\":\"利好：\\n1.\"},  # prefill 控制结构起点\n]</pre></div><div class=\"card card-note\"><div class=\"card-label\">用途</div><p>Prefill 常用来：强制 JSON 以 { 开头、跳过当然可以这类开场白、固定列表/表格的起始结构。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Prefill 是预填 assistant 消息开头</li><li>模型从给定开头继续生成</li><li>可跳过寒暄、直达目标格式</li><li>常用于 JSON、列表与固定结构</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Prefill（预填 assistant 开头）的作用是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"a\"><span>让模型忽略 user 消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"b\"><span>预先写好回复的开头，使模型从该开头继续，从而强制特定起始格式并跳过多余开场白</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"c\"><span>存储对话历史</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"d\"><span>提高 temperature</span></label></div><div class=\"quiz-result\" id=\"q16-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>用 prefill 定格式</h3><ol><li>用 prefill 让回复直接以编号列表开始。</li><li>再用 prefill 强制 JSON 以 { 开头。</li><li>对比有无 prefill 时多余文字的差异。</li></ol></div></div>" },
        { id: "tooluse-typed-output", title: "结合 Tool Use 实现强类型输出", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 12 分钟</span></div><h1>结合 Tool Use 实现强类型输出</h1><p class=\"lesson-lead\">用工具的 input_schema 约束输出，是获得强类型结构化数据的最稳方式。</p></div><div class=\"lesson-body\"><h2>用工具当作输出模式</h2><p>定义一个工具，其 input_schema 就是你想要的数据结构。让模型调用它，模型填入的参数即为符合 schema 的结构化输出，比让它自由写 JSON 更可靠。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>tools=[{\n  \"name\":\"record_person\",\n  \"description\":\"记录一个人的结构化信息\",\n  \"input_schema\":{\n    \"type\":\"object\",\n    \"properties\":{\n      \"name\":{\"type\":\"string\"},\n      \"age\":{\"type\":\"integer\"},\n    },\n    \"required\":[\"name\",\"age\"],\n  },\n}]\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\", max_tokens=512,\n    tools=tools, tool_choice={\"type\":\"tool\",\"name\":\"record_person\"},\n    messages=[{\"role\":\"user\",\"content\":\"李雷，今年30岁\"}],\n)\n# resp 中的 tool_use.input 即符合 schema 的结构化数据</pre></div><div class=\"card card-key\"><div class=\"card-label\">要点</div><p>用 <code>tool_choice</code> 强制调用某工具，模型必须按 schema 填参数，从而得到<strong>经过校验的强类型输出</strong>。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>把工具的 input_schema 当作输出模式</li><li>模型填入的参数即结构化数据</li><li>tool_choice 可强制调用指定工具</li><li>比自由 JSON 更可靠、可校验</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>用 Tool Use 实现强类型输出的核心思路是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"a\"><span>让模型把 JSON 写在普通文本里</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"b\"><span>定义一个 input_schema 即为目标结构的工具，并用 tool_choice 强制模型调用它，使其按 schema 填参数得到经校验的结构化输出</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"c\"><span>提高 max_tokens</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"d\"><span>禁用所有工具</span></label></div><div class=\"quiz-result\" id=\"q17-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>用工具约束输出</h3><ol><li>定义一个含两字段的工具 schema。</li><li>用 tool_choice 强制调用它。</li><li>校验返回的 input 是否完全符合 schema。</li></ol></div></div>" },
      ]
    },
    {
      title: "评估与迭代",
      lessons: [
        { id: "prompt-versioning", title: "提示词版本管理策略", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>提示词版本管理策略</h1><p class=\"lesson-lead\">提示词是关键资产，应像代码一样做版本管理。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>PROMPTS = {\n    \"v1\": \"总结这段文字。\",\n    \"v2\": \"用不超过两句话总结这段文字，突出核心结论。\",  # 改进版\n}\ndef run(version, text):\n    return ask(client, PROMPTS[version] + \"\n\n\" + text)</pre></div><h2>为什么要版本管理</h2><p>提示词的微小改动可能显著改变行为。把提示纳入版本控制，记录每次变更与原因，才能回滚、对比和复盘。</p><div class=\"card card-tip\"><div class=\"card-label\">实践</div><p>给每个提示一个 <strong>版本号</strong>，把提示文本与对应的评估结果一起保存。上线前用固定评估集回归测试。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>提示词是关键资产，需版本管理</li><li>记录每次变更内容与原因</li><li>为提示打版本号便于回滚对比</li><li>变更后用评估集做回归测试</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>为什么要对提示词做版本管理？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"a\"><span>纯粹为了好看</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"b\"><span>因为提示的微小改动可能显著改变行为，版本管理让你能回滚、对比、复盘并做回归测试</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"c\"><span>为了增加 token</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"d\"><span>版本管理对提示没有意义</span></label></div><div class=\"quiz-result\" id=\"q18-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>建立提示版本库</h3><ol><li>为一个提示建立 v1、v2 两个版本。</li><li>记录两版的差异与改动原因。</li><li>用同一评估集对比两版表现。</li></ol></div></div>" },
        { id: "eval-dataset", title: "构建评估数据集", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 12 分钟</span></div><h1>构建评估数据集</h1><p class=\"lesson-lead\">没有评估集，优化就是凭感觉。本节讲如何构建有代表性的评估数据集。</p></div><div class=\"lesson-body\"><h2>构成</h2><p>一个好的评估集应包含：典型输入、边界与困难输入、以及期望输出或评分标准。规模不必很大，但要有代表性。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>eval_set = [\n    {\"input\":\"今天天气真好\", \"expect_label\":\"正面\"},\n    {\"input\":\"这服务太差了\", \"expect_label\":\"负面\"},\n    {\"input\":\"还行吧\",       \"expect_label\":\"中性\"},  # 边界样本\n]</pre></div><div class=\"card card-key\"><div class=\"card-label\">要点</div><p>评估集要覆盖<strong>真实分布 + 边界难例</strong>。把它固定下来，每次改提示都在同一套数据上测，才能横向比较。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>评估集含典型、边界与困难输入</li><li>为每条样本给期望输出或评分标准</li><li>规模够用即可，重在代表性</li><li>固定评估集才能横向比较</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>一个有效的提示评估数据集应具备什么特征？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"a\"><span>只包含最简单的样本</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"b\"><span>覆盖典型输入、边界与困难样本，并配有期望输出或评分标准，且固定下来以便横向比较</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"c\"><span>越大越好，内容随意</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"d\"><span>每次评估都换一批样本</span></label></div><div class=\"quiz-result\" id=\"q19-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>建一个迷你评估集</h3><ol><li>为一个分类任务收集 15 条样本，含若干边界例。</li><li>为每条标注期望标签。</li><li>用它测一版提示并记录准确率。</li></ol></div></div>" },
        { id: "llm-as-judge", title: "自动化评估与 LLM-as-judge", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 12 分钟</span></div><h1>自动化评估与 LLM-as-judge</h1><p class=\"lesson-lead\">对开放式输出，可用另一个模型按评分标准自动打分，规模化评估质量。</p></div><div class=\"lesson-body\"><h2>让模型当裁判</h2><p>对没有唯一答案的任务（如摘要、文案），给评判模型一份明确的评分标准（rubric），让它对输出打分或两两比较。注意提供清晰标准以减少主观性。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>judge_prompt = \"\"\"你是严格的评审。请按以下标准给摘要打分（1-5）：\n- 准确性：是否忠实原文\n- 简洁性：是否冗余\n只输出 JSON：{\"score\": &lt;int&gt;, \"reason\": \"&lt;str&gt;\"}\n\n原文：{doc}\n待评摘要：{summary}\"\"\"</pre></div><div class=\"card card-warn\"><div class=\"card-label\">注意</div><p>LLM 裁判也会有偏差（如偏好更长的回答）。用<strong>明确 rubric</strong>、必要时多次评分取平均，并定期用人工抽检校准。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用模型按 rubric 给开放式输出打分</li><li>适合无唯一答案的任务</li><li>明确评分标准以减少主观性</li><li>裁判有偏差，需人工抽检校准</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>使用 LLM-as-judge 时，下面哪条最重要？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"a\"><span>不给任何评分标准，让裁判自由发挥</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"b\"><span>提供清晰明确的评分标准（rubric），并意识到裁判存在偏差、用人工抽检校准</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"c\"><span>让裁判模型越小越好</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"d\"><span>只评一次且从不校准</span></label></div><div class=\"quiz-result\" id=\"q20-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>搭一个评分流程</h3><ol><li>为摘要任务写一份含两条维度的 rubric。</li><li>用裁判模型对 10 条摘要打分输出 JSON。</li><li>人工抽检 3 条，校准 rubric。</li></ol></div></div>" },
        { id: "systematic-optimization", title: "提示词优化的系统方法", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>提示词优化的系统方法</h1><p class=\"lesson-lead\">把前面所有内容串起来，形成一套可重复的提示优化闭环。</p></div><div class=\"lesson-body\"><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>def score_prompt(prompt, eval_set):\n    correct = 0\n    for case in eval_set:\n        out = ask(client, prompt + \"\n\n\" + case[\"input\"])\n        if case[\"expect_label\"] in out:\n            correct += 1\n    return correct / len(eval_set)        # 在固定评估集上量化每一版</pre></div><h2>优化闭环</h2><ol><li>明确目标与评估指标。</li><li>写初版提示并在评估集上跑分。</li><li>分析失败案例，定位问题。</li><li>有针对性地修改（加示例、调结构、明确约束）。</li><li>回归评估，比较版本，保留更优者。</li></ol><div class=\"card card-success\"><div class=\"card-label\">系统方法</div><p>提示优化是<strong>数据驱动的迭代</strong>，不是灵感比拼。每次只改一处变量，用评估集量化效果，才能稳步提升。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>先定目标与评估指标</li><li>在评估集上量化每一版表现</li><li>分析失败案例做针对性修改</li><li>每次只改一个变量便于归因</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>系统化提示优化的核心原则是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"a\"><span>凭灵感一次性写出完美提示</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"b\"><span>以评估集为基准做数据驱动的迭代，每次只改一个变量、分析失败案例并量化对比版本</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"c\"><span>改得越多越好，不用评估</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"d\"><span>只看单条输出的主观感觉</span></label></div><div class=\"quiz-result\" id=\"q21-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>跑一轮优化闭环</h3><ol><li>为一个任务定指标并写初版提示。</li><li>在评估集跑分，挑出 3 个失败案例。</li><li>针对性改一处，回归对比，保留更优版本。</li></ol></div></div>" },
      ]
    },
  ],
  answers: { q1: 'b', q2: 'c', q3: 'b', q4: 'b', q5: 'b', q6: 'b', q7: 'b', q8: 'b', q9: 'b', q10: 'b', q11: 'b', q12: 'b', q13: 'b', q14: 'b', q15: 'b', q16: 'b', q17: 'b', q18: 'b', q19: 'b', q20: 'b', q21: 'b' }
};
