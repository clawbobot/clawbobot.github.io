<script>
const COURSE = {
  id: 'agents',
  title: 'Agent 系统开发',
  modules: [
    {
      title: "Agent 基础概念",
      lessons: [
        { id: "agent-intro", title: "什么是 AI Agent？自主性与任务规划", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>什么是 AI Agent？自主性与任务规划</h1><p class=\"lesson-lead\">AI Agent 是能够自主感知环境、制定计划并采取行动来完成目标的 AI 系统。本节建立你对 Agent 的整体认知。</p></div><div class=\"lesson-body\"><h2>Agent 的本质</h2><p>与普通聊天模型不同，AI Agent 具备<strong>自主性</strong>：它不只是回答问题，而是主动分解目标、选择工具、执行步骤，并根据结果调整策略。一个 Agent 可以在没有人类逐步指引的情况下完成复杂任务。</p><h2>任务规划能力</h2><p>规划是 Agent 的核心能力之一。面对一个高层目标（如&quot;帮我分析竞品并生成报告&quot;），Agent 会自动将其分解为子任务序列，确定依赖关系，并依次或并行执行。这种规划能力让 Agent 能处理人类难以通过单次提问解决的复杂问题。</p><div class=\"card card-key\"><div class=\"card-label\">核心概念</div><p>Agent 的自主性体现在三个维度：<strong>目标导向</strong>（围绕目标而非单条指令工作）、<strong>多步执行</strong>（通过多个步骤完成任务）、<strong>适应性</strong>（根据环境反馈调整计划）。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\n# 一个最简单的 Agent 骨架：接收目标，生成行动计划\ndef plan_task(goal: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"你是一个任务规划专家。将用户的目标分解为清晰的步骤序列，每步都有明确的输入和输出。\",\n        messages=[{\"role\": \"user\", \"content\": f\"目标：{goal}\\n请生成详细的执行计划。\"}],\n    )\n    return resp.content[0].text\n\nplan = plan_task(\"分析三家竞品的定价策略并生成对比报告\")\nprint(plan)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Agent 能自主感知环境、规划并执行多步任务</li><li>与聊天模型的关键区别是自主性和多步执行</li><li>规划能力让 Agent 处理复杂的高层目标</li><li>适应性使 Agent 能根据反馈调整策略</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>AI Agent 与普通对话模型最根本的区别是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>Agent 使用更大的模型，所以更聪明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>Agent 具备自主性，能围绕目标自主规划、多步执行并根据反馈调整，而不只是回答单个问题</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>Agent 只能处理编程任务</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"d\"><span>Agent 不需要 API Key</span></label></div><div class=\"quiz-result\" id=\"q1-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>设计你的第一个 Agent 目标</h3><ol><li>选择一个需要多步骤的实际任务（如&quot;整理收件箱并分类&quot;）。</li><li>手动将其分解为 5 个以上的子步骤，标明每步的输入和输出。</li><li>思考：哪些步骤需要外部工具？哪些可以纯靠模型推理完成？</li></ol></div></div>" },
        { id: "agent-vs-chat", title: "Agent 与普通对话的本质区别", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>Agent 与普通对话的本质区别</h1><p class=\"lesson-lead\">理解 Agent 和聊天机器人之间的架构差异，是选择正确方案的前提。本节从多个维度对比两者。</p></div><div class=\"lesson-body\"><h2>交互模式的差异</h2><p>普通对话是<strong>请求-响应</strong>模式：用户问，模型答，一次一问。Agent 则是<strong>目标-循环</strong>模式：接受一个高层目标后，Agent 自主循环执行（感知→规划→行动→观察），直到目标达成或需要人类介入。</p><h2>能力边界的差异</h2><p>对话模型的能力边界是其训练知识和上下文窗口。Agent 通过工具调用突破了这一边界：它可以查询实时数据库、执行代码、调用外部 API、操作文件系统，真正与现实世界交互。</p><div class=\"card card-tip\"><div class=\"card-label\">选型建议</div><p>如果任务能在<strong>一次交互</strong>内完成，用普通对话即可；如果任务需要<strong>多步骤、外部工具或动态决策</strong>，才考虑 Agent 架构。Agent 的复杂度和成本更高，不要过度设计。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\n# 普通对话：单次请求，模型直接回答\ndef chat_answer(question: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=512,\n        messages=[{\"role\": \"user\", \"content\": question}],\n    )\n    return resp.content[0].text\n\n# Agent 模式：带工具，可能需要多轮循环\ntools = [{\n    \"name\": \"search_web\",\n    \"description\": \"搜索最新信息\",\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\"query\": {\"type\": \"string\"}},\n        \"required\": [\"query\"],\n    },\n}]\n\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=1024,\n    tools=tools,\n    messages=[{\"role\": \"user\", \"content\": \"今天 AI 领域最重要的新闻是什么？\"}],\n)\nprint(resp.stop_reason)  # tool_use 说明 Agent 需要调用工具</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>对话是请求-响应；Agent 是目标-循环</li><li>Agent 通过工具突破模型知识边界</li><li>单步任务用对话，多步复杂任务用 Agent</li><li>Agent 复杂度高，避免过度设计</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪个场景最适合用 Agent 而非普通对话？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>询问某个历史事件的时间</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>自动监控竞品网站价格变化、汇总成报告并发邮件通知团队</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>把一段英文翻译成中文</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"d\"><span>生成一首诗</span></label></div><div class=\"quiz-result\" id=\"q2-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>对比两种架构</h3><ol><li>用普通对话请 Claude 回答一个需要最新信息的问题，观察其局限。</li><li>设计一个带工具的 Agent 方案来解决同样的问题。</li><li>对比两者的代码复杂度和能力差异，写下你的结论。</li></ol></div></div>" },
        { id: "agent-loop", title: "感知→规划→行动→观察循环", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>感知→规划→行动→观察循环</h1><p class=\"lesson-lead\">Agent 的运行核心是一个持续的四步循环。理解这个循环，就理解了 Agent 的工作机制。</p></div><div class=\"lesson-body\"><h2>四步循环详解</h2><p><strong>感知（Perceive）</strong>：Agent 接收输入——用户指令、工具返回的结果、环境状态等。<strong>规划（Plan）</strong>：基于当前状态和目标，决定下一步做什么。<strong>行动（Act）</strong>：调用工具、执行代码或生成输出。<strong>观察（Observe）</strong>：接收行动结果，更新对环境状态的认知，进入下一轮感知。</p><h2>循环的终止条件</h2><p>循环不会无限持续。终止条件通常有：目标已达成（模型判断任务完成）、遇到无法自主解决的错误、达到最大步骤数限制、需要人类确认高风险操作。</p><div class=\"card card-note\"><div class=\"card-label\">实现注意</div><p>在代码中实现这个循环时，必须设置<strong>最大迭代次数</strong>（如 20 步）作为安全阀，防止 Agent 因 bug 或模型错误陷入无限循环，造成意外费用或副作用。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\ndef run_agent_loop(goal: str, tools: list, max_steps: int = 20):\n    messages = [{\"role\": \"user\", \"content\": goal}]\n    \n    for step in range(max_steps):\n        # 感知 + 规划：模型接收当前状态，决定下一步\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=2048,\n            tools=tools,\n            messages=messages,\n        )\n        \n        # 行动完成（任务结束）\n        if resp.stop_reason == \"end_turn\":\n            print(f\"任务完成，共 {step+1} 步\")\n            return resp.content[0].text\n        \n        # 行动：需要调用工具\n        if resp.stop_reason == \"tool_use\":\n            messages.append({\"role\": \"assistant\", \"content\": resp.content})\n            tool_results = []\n            for block in resp.content:\n                if block.type == \"tool_use\":\n                    # 观察：执行工具并收集结果\n                    result = execute_tool(block.name, block.input)\n                    tool_results.append({\n                        \"type\": \"tool_result\",\n                        \"tool_use_id\": block.id,\n                        \"content\": result,\n                    })\n            messages.append({\"role\": \"user\", \"content\": tool_results})\n    \n    return \"达到最大步骤数限制\"\n\ndef execute_tool(name: str, inputs: dict) -> str:\n    # 实际项目中在此处分发到各工具实现\n    return f\"[工具 {name} 返回结果]\"</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Agent 循环：感知→规划→行动→观察</li><li>每步行动结果作为下一步感知的输入</li><li>必须设置最大迭代次数作为安全阀</li><li>终止条件：完成、错误、达到上限、需人工确认</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>为什么 Agent 循环必须设置最大迭代次数？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>迭代次数越少越好，减少思考时间</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>防止因 bug 或模型错误导致无限循环，避免意外高费用或副作用</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>API 强制要求必须设置</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"d\"><span>让代码看起来更整洁</span></label></div><div class=\"quiz-result\" id=\"q3-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现基础 Agent 循环</h3><ol><li>实现上面的 run_agent_loop 函数，加入一个简单的计算工具。</li><li>让 Agent 完成一个需要 3 步工具调用的计算任务。</li><li>故意去掉 max_steps 限制，观察潜在风险，再加回去。</li></ol></div></div>" },
        { id: "agent-types", title: "反应型、推理型与混合型 Agent", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>反应型、推理型与混合型 Agent</h1><p class=\"lesson-lead\">Agent 并非一种固定架构，按推理深度可分为三类。选择合适的类型能在能力与效率之间取得最佳平衡。</p></div><div class=\"lesson-body\"><h2>三种类型</h2><p><strong>反应型 Agent（Reactive）</strong>：直接将感知映射到行动，没有显式规划步骤。速度快、延迟低，适合规则清晰的简单任务（如意图路由、快速分类）。<strong>推理型 Agent（Reasoning）</strong>：在行动前进行深度推理和计划，适合复杂、多步、需要权衡的任务，但延迟和成本更高。<strong>混合型 Agent</strong>：结合两者，用轻量感知快速判断任务复杂度，简单的走反应路径，复杂的触发深度规划。</p><div class=\"card card-key\"><div class=\"card-label\">选型原则</div><p>不要默认用最复杂的类型。先评估任务的<strong>不确定性</strong>和<strong>步骤数</strong>：简单确定→反应型；复杂多步→推理型；任务复杂度变化大→混合型。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\ndef reactive_agent(user_input: str) -> str:\n    \"\"\"反应型：直接感知→行动，无中间规划步骤\"\"\"\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=256,\n        system=\"根据用户输入立即分类：技术支持/账单/其他。只输出类别名。\",\n        messages=[{\"role\": \"user\", \"content\": user_input}],\n    )\n    return resp.content[0].text.strip()\n\ndef reasoning_agent(goal: str) -> str:\n    \"\"\"推理型：先生成详细计划，再逐步执行\"\"\"\n    # 第一步：深度规划\n    plan_resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"你是规划专家。先输出详细的步骤计划，再说明每步所需工具。\",\n        messages=[{\"role\": \"user\", \"content\": goal}],\n    )\n    plan = plan_resp.content[0].text\n    # 第二步：按计划执行（此处省略工具调用循环）\n    return plan\n\n# 混合型：根据复杂度动态选择\ndef hybrid_agent(task: str) -> str:\n    complexity_check = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=64,\n        system=\"判断任务复杂度，只回答 simple 或 complex。\",\n        messages=[{\"role\": \"user\", \"content\": task}],\n    )\n    if \"simple\" in complexity_check.content[0].text.lower():\n        return reactive_agent(task)\n    else:\n        return reasoning_agent(task)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>反应型：快速直接，适合简单确定任务</li><li>推理型：深度规划，适合复杂多步任务</li><li>混合型：动态选择路径，兼顾效率与能力</li><li>选型依据：任务不确定性和步骤数</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>一个需要处理各种复杂度请求的客服系统，最适合哪种 Agent 类型？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"a\"><span>纯反应型，因为速度最快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"b\"><span>混合型，简单问题走反应路径，复杂问题触发深度推理</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"c\"><span>纯推理型，因为最聪明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"d\"><span>不使用任何 Agent，直接对话即可</span></label></div><div class=\"quiz-result\" id=\"q4-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现混合型路由</h3><ol><li>实现上面的 hybrid_agent 函数，加入实际的复杂度判断逻辑。</li><li>准备 5 个简单问题和 5 个复杂问题，测试路由准确率。</li><li>对比两条路径的响应时间差异。</li></ol></div></div>" },
      ]
    },
    {
      title: "规划与推理",
      lessons: [
        { id: "planning-basics", title: "Agent 规划策略：分解、排序、依赖管理", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>Agent 规划策略：分解、排序、依赖管理</h1><p class=\"lesson-lead\">规划是 Agent 将高层目标转化为可执行步骤的关键能力。本节讲解三种核心规划策略。</p></div><div class=\"lesson-body\"><h2>任务分解</h2><p>将复杂目标拆分为独立子任务，每个子任务有清晰的输入、输出和完成标准。好的分解粒度：每个子任务在单次工具调用或推理步骤内可完成。</p><h2>排序与依赖管理</h2><p>子任务之间存在依赖关系（A 的输出是 B 的输入）或可并行关系（C 和 D 互相独立）。好的规划器会识别这些关系，串行执行依赖任务，并行执行独立任务，最大化效率。</p><div class=\"card card-tip\"><div class=\"card-label\">规划提示词技巧</div><p>在 system prompt 中明确要求模型&quot;先输出 JSON 格式的任务依赖图，再开始执行&quot;，可以显著提升规划质量和可解释性。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\ndef generate_task_plan(goal: str) -> dict:\n    \"\"\"让模型生成结构化任务计划，含依赖关系\"\"\"\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=2048,\n        system=\"\"\"你是任务规划专家。将目标分解为子任务并以 JSON 格式输出：\n{\n  \"tasks\": [\n    {\n      \"id\": \"t1\",\n      \"name\": \"任务名\",\n      \"description\": \"具体描述\",\n      \"depends_on\": [],\n      \"tool\": \"所需工具名\"\n    }\n  ]\n}\"\"\",\n        messages=[{\"role\": \"user\", \"content\": f\"目标：{goal}\"}],\n    )\n    text = resp.content[0].text\n    # 提取 JSON\n    start = text.find(\"{\")\n    end = text.rfind(\"}\") + 1\n    return json.loads(text[start:end])\n\nplan = generate_task_plan(\"调研竞品定价，生成对比表格，发送给销售团队\")\nfor task in plan.get(\"tasks\", []):\n    deps = task.get(\"depends_on\", [])\n    print(f\"{task['id']}: {task['name']} (依赖: {deps or '无'})\")\n</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>任务分解要达到单步可执行的粒度</li><li>识别任务间的依赖关系与并行机会</li><li>结构化规划输出（如 JSON）便于程序处理</li><li>规划质量直接影响 Agent 整体成功率</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>关于任务依赖管理，以下哪种做法最能提升 Agent 效率？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"a\"><span>所有子任务一律串行执行，简单安全</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"b\"><span>识别相互独立的子任务并行执行，仅对有依赖关系的任务串行处理</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"c\"><span>随机执行顺序，看哪个先完成</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"d\"><span>只执行第一个子任务</span></label></div><div class=\"quiz-result\" id=\"q5-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建任务依赖图</h3><ol><li>选择一个包含 6 个以上步骤的实际任务。</li><li>用 JSON 格式描述每个子任务及其依赖关系。</li><li>画出依赖图，标出可并行执行的任务集合。</li></ol></div></div>" },
        { id: "chain-of-thought", title: "思维链在 Agent 中的应用", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>思维链在 Agent 中的应用</h1><p class=\"lesson-lead\">思维链（Chain of Thought）让模型在给出行动决策前先推理，显著提升 Agent 在复杂场景下的决策质量。</p></div><div class=\"lesson-body\"><h2>为什么 Agent 需要思维链</h2><p>面对需要多步推理的决策（如&quot;现在应该调用哪个工具？参数应该是什么？&quot;），直接输出答案容易出错。让模型先在内部&quot;思考&quot;推理过程，再输出行动，能大幅提升准确率，尤其对于工具选择和参数构造。</p><h2>扩展思维（Extended Thinking）</h2><p>Claude 支持扩展思维模式，模型会在回复前进行深度内部推理，这对 Agent 的复杂决策特别有价值。</p><div class=\"card card-key\"><div class=\"card-label\">思维链 vs 扩展思维</div><p>普通思维链通过提示词引导模型&quot;先想再答&quot;；扩展思维（thinking 参数）是模型内置的深度推理机制，更彻底但也更耗 token。对于高风险决策步骤优先考虑扩展思维。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\n# 方法一：通过提示词引导思维链\ndef cot_decision(context: str, options: list) -> str:\n    options_text = \"\\n\".join(f\"{i+1}. {o}\" for i, o in enumerate(options))\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"在给出最终决策前，先逐步分析每个选项的利弊，然后用'决策：'开头给出最终答案。\",\n        messages=[{\"role\": \"user\", \"content\": f\"当前状态：{context}\\n\\n可选行动：\\n{options_text}\"}],\n    )\n    return resp.content[0].text\n\n# 方法二：使用扩展思维（更深度的推理）\ndef extended_thinking_decision(context: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=8000,\n        thinking={\"type\": \"enabled\", \"budget_tokens\": 5000},\n        messages=[{\"role\": \"user\", \"content\": f\"分析以下情况并给出最优 Agent 行动策略：{context}\"}],\n    )\n    # 分离思维过程和最终答案\n    for block in resp.content:\n        if block.type == \"text\":\n            return block.text\n    return \"\"\n\nresult = cot_decision(\n    \"用户要求分析竞品，已获取网页内容\",\n    [\"直接生成报告\", \"先提取关键数据再生成\", \"请求更多信息\"]\n)\nprint(result)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>思维链在行动前先推理，提升决策质量</li><li>对工具选择和参数构造帮助尤为显著</li><li>扩展思维是模型内置的深度推理机制</li><li>高风险决策步骤优先考虑扩展思维</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在 Agent 的工具选择决策中引入思维链的主要好处是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"a\"><span>减少 token 消耗，降低成本</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"b\"><span>让模型在选择工具前先推理分析，显著提升复杂场景下的决策准确率</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"c\"><span>让代码更简洁</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"d\"><span>思维链只对写作任务有效</span></label></div><div class=\"quiz-result\" id=\"q6-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>对比有无思维链的决策质量</h3><ol><li>设计一个需要选择 3 种工具之一的场景（如：搜索、计算、查数据库）。</li><li>分别用有思维链和无思维链的提示词各测试 5 次。</li><li>统计两种方式的工具选择准确率，记录差异。</li></ol></div></div>" },
        { id: "task-decomposition", title: "复杂任务分解与子任务调度", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>复杂任务分解与子任务调度</h1><p class=\"lesson-lead\">面对大型复杂任务，分层分解和智能调度是 Agent 高效完成目标的关键工程技术。</p></div><div class=\"lesson-body\"><h2>分层分解</h2><p>复杂任务往往需要分层处理：顶层是抽象目标，中层是功能模块，底层是具体的工具调用。好的分层让每一层的 Agent 只关注自己的抽象级别，降低复杂度。</p><h2>子任务调度策略</h2><p>调度器负责决定子任务的执行时机和资源分配：串行调度保证顺序依赖；并行调度最大化吞吐；优先级调度让关键路径上的任务优先完成；动态调度则根据中间结果实时调整执行计划。</p><div class=\"card card-note\"><div class=\"card-label\">工程要点</div><p>子任务调度需要跟踪每个任务的状态（待执行、执行中、完成、失败）。用字典或状态机管理任务状态，确保失败的任务能被重试或触发回退计划。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport asyncio\nfrom enum import Enum\n\nclient = anthropic.Anthropic()\n\nclass TaskStatus(Enum):\n    PENDING = \"pending\"\n    RUNNING = \"running\"\n    DONE = \"done\"\n    FAILED = \"failed\"\n\nclass TaskScheduler:\n    def __init__(self):\n        self.tasks = {}\n        self.results = {}\n    \n    def add_task(self, task_id: str, name: str, depends_on: list = None):\n        self.tasks[task_id] = {\n            \"name\": name,\n            \"depends_on\": depends_on or [],\n            \"status\": TaskStatus.PENDING,\n        }\n    \n    def get_ready_tasks(self) -> list:\n        \"\"\"返回所有依赖已完成的待执行任务\"\"\"\n        ready = []\n        for tid, task in self.tasks.items():\n            if task[\"status\"] != TaskStatus.PENDING:\n                continue\n            deps_done = all(\n                self.tasks[d][\"status\"] == TaskStatus.DONE\n                for d in task[\"depends_on\"]\n            )\n            if deps_done:\n                ready.append(tid)\n        return ready\n    \n    def execute_task(self, task_id: str):\n        task = self.tasks[task_id]\n        task[\"status\"] = TaskStatus.RUNNING\n        # 调用 Claude 执行子任务\n        dep_results = {d: self.results.get(d, \"\") for d in task[\"depends_on\"]}\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=512,\n            messages=[{\"role\": \"user\", \"content\": f\"执行任务：{task['name']}\\n前置结果：{dep_results}\"}],\n        )\n        self.results[task_id] = resp.content[0].text\n        task[\"status\"] = TaskStatus.DONE\n        return self.results[task_id]\n\n# 示例：分析报告生成流程\nscheduler = TaskScheduler()\nscheduler.add_task(\"t1\", \"抓取竞品A数据\")\nscheduler.add_task(\"t2\", \"抓取竞品B数据\")\nscheduler.add_task(\"t3\", \"对比分析\", depends_on=[\"t1\", \"t2\"])\nscheduler.add_task(\"t4\", \"生成报告\", depends_on=[\"t3\"])\n\nwhile any(t[\"status\"] == TaskStatus.PENDING for t in scheduler.tasks.values()):\n    for tid in scheduler.get_ready_tasks():\n        print(f\"执行: {scheduler.tasks[tid]['name']}\")\n        scheduler.execute_task(tid)\n\nprint(\"最终报告:\", scheduler.results.get(\"t4\", \"\")[:100])</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>分层分解让每层 Agent 只处理自己的抽象级别</li><li>调度器管理任务状态和执行顺序</li><li>并行调度独立任务可大幅提升效率</li><li>任务状态追踪是实现重试和回退的基础</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在子任务调度中，&quot;动态调度&quot;相比&quot;静态串行调度&quot;的核心优势是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"a\"><span>动态调度代码更简单</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"b\"><span>能根据中间结果和环境变化实时调整执行计划，处理不确定性更强</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"c\"><span>动态调度一定比静态快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"d\"><span>动态调度不需要跟踪任务状态</span></label></div><div class=\"quiz-result\" id=\"q7-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现任务调度器</h3><ol><li>用上面的 TaskScheduler 实现一个 5 步骤的数据处理流水线。</li><li>加入并行执行逻辑，让没有依赖关系的任务同时运行。</li><li>模拟一个任务失败，实现自动重试逻辑。</li></ol></div></div>" },
        { id: "replanning", title: "动态重规划：遇到障碍时如何调整", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>动态重规划：遇到障碍时如何调整</h1><p class=\"lesson-lead\">真实环境充满不确定性，原始计划常常遇到障碍。动态重规划让 Agent 具备应对变化的弹性。</p></div><div class=\"lesson-body\"><h2>触发重规划的场景</h2><p>工具调用失败（API 超时、权限不足）、中间结果与预期不符（搜索结果为空）、发现新约束（用户追加限制）、资源不可用（目标网站挂了）。这些情况下，Agent 不能硬撑原计划，必须触发重规划。</p><h2>重规划策略</h2><p>常见策略：<strong>局部调整</strong>（只修改失败的子任务，保留其他计划）、<strong>全局重规划</strong>（基于最新状态重新生成完整计划）、<strong>降级执行</strong>（切换到更简单的备选方案完成核心目标）。</p><div class=\"card card-key\"><div class=\"card-label\">设计原则</div><p>重规划要传入<strong>完整的当前状态</strong>：已完成的步骤、已获取的数据、遇到的具体错误。信息越完整，模型重规划的质量越高。不要只传错误信息，要传上下文。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\ndef replan(original_goal: str, completed_steps: list,\n           failed_step: str, error_msg: str) -> str:\n    \"\"\"基于当前状态触发重规划\"\"\"\n    context = f\"\"\"原始目标：{original_goal}\n\n已完成的步骤：\n{chr(10).join(f\"- {s}\" for s in completed_steps)}\n\n失败的步骤：{failed_step}\n错误信息：{error_msg}\n\n请分析失败原因，给出调整后的执行计划。\n可以局部修改失败步骤，或提出备选方案完成原始目标。\"\"\"\n\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"你是一个擅长处理意外情况的 Agent 规划师。当计划遇到障碍时，灵活调整策略。\",\n        messages=[{\"role\": \"user\", \"content\": context}],\n    )\n    return resp.content[0].text\n\n# 模拟一次重规划\nnew_plan = replan(\n    original_goal=\"抓取竞品网站定价数据并生成报告\",\n    completed_steps=[\"确定目标竞品列表\", \"获取竞品 A 数据\"],\n    failed_step=\"获取竞品 B 数据\",\n    error_msg=\"HTTP 403 Forbidden - 目标网站拒绝爬虫访问\",\n)\nprint(new_plan)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>工具失败、结果偏差等场景需触发重规划</li><li>局部调整、全局重规划、降级执行三种策略</li><li>重规划时传入完整状态上下文</li><li>提前设计备选路径，降低重规划难度</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>触发重规划时，传给模型的上下文应该包含什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"a\"><span>只传错误信息就够了</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"b\"><span>原始目标、已完成步骤、已获数据、具体错误——完整的当前状态</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"c\"><span>重新发送原始用户请求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"d\"><span>不需要传任何上下文，模型自动知道</span></label></div><div class=\"quiz-result\" id=\"q8-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现重规划机制</h3><ol><li>在你的 Agent 循环中加入错误捕获和重规划触发逻辑。</li><li>模拟三种不同的失败场景（网络、权限、数据为空），各触发一次重规划。</li><li>对比每次重规划给出的调整方案质量。</li></ol></div></div>" },
      ]
    },
    {
      title: "记忆系统",
      lessons: [
        { id: "memory-types", title: "四类记忆：工作、情景、语义、过程", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>四类记忆：工作、情景、语义、过程</h1><p class=\"lesson-lead\">Agent 的记忆系统是其连续工作能力的基础。理解四类记忆的特性，才能为不同场景选择合适的存储方案。</p></div><div class=\"lesson-body\"><h2>四类记忆对比</h2><p><strong>工作记忆（Working Memory）</strong>：当前上下文窗口中的信息，最快但容量有限，任务结束后消失。<strong>情景记忆（Episodic Memory）</strong>：过去执行过的具体任务和交互历史，帮助 Agent 从经验中学习。<strong>语义记忆（Semantic Memory）</strong>：通用知识、事实和概念，通常存于向量数据库供检索。<strong>过程记忆（Procedural Memory）</strong>：执行特定任务的技能和方法，体现在 system prompt 或 fine-tuning 中。</p><div class=\"card card-key\"><div class=\"card-label\">记忆选型</div><p>短期任务状态 → 工作记忆；历史交互经验 → 情景记忆；知识库文档 → 语义记忆；固定技能流程 → 过程记忆。生产 Agent 通常同时使用多种记忆类型。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nfrom datetime import datetime\n\nclient = anthropic.Anthropic()\n\nclass AgentMemorySystem:\n    def __init__(self):\n        # 工作记忆：当前对话上下文\n        self.working_memory: list = []\n        # 情景记忆：历史任务摘要\n        self.episodic_memory: list = []\n        # 语义记忆：简化为关键词→内容的字典\n        self.semantic_memory: dict = {}\n        # 过程记忆：固定在 system prompt 中\n        self.procedural_memory = \"你是一个专业的数据分析 Agent，擅长 Python 和 SQL。\"\n    \n    def add_to_working(self, role: str, content: str):\n        self.working_memory.append({\"role\": role, \"content\": content})\n    \n    def commit_episode(self, task_name: str, outcome: str):\n        \"\"\"将完成的任务存入情景记忆\"\"\"\n        self.episodic_memory.append({\n            \"timestamp\": datetime.now().isoformat(),\n            \"task\": task_name,\n            \"outcome\": outcome,\n        })\n    \n    def store_knowledge(self, key: str, content: str):\n        \"\"\"存储语义知识\"\"\"\n        self.semantic_memory[key] = content\n    \n    def query(self, user_input: str) -> str:\n        # 检索相关语义记忆注入上下文\n        relevant = [v for k, v in self.semantic_memory.items() if k in user_input]\n        context_msg = f\"相关知识：{relevant}\\n问题：{user_input}\" if relevant else user_input\n        self.add_to_working(\"user\", context_msg)\n        \n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=512,\n            system=self.procedural_memory,\n            messages=self.working_memory,\n        )\n        answer = resp.content[0].text\n        self.add_to_working(\"assistant\", answer)\n        return answer\n\nmem = AgentMemorySystem()\nmem.store_knowledge(\"Python\", \"项目使用 Python 3.11，已安装 pandas 和 numpy\")\nprint(mem.query(\"用 Python 统计一列数据的均值\"))</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>工作记忆：上下文窗口，快但有限且短暂</li><li>情景记忆：历史任务经验，支持经验学习</li><li>语义记忆：通用知识，向量数据库存储检索</li><li>过程记忆：固定技能，在 system prompt 体现</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Agent 需要&quot;记住&quot;公司产品手册中的所有产品规格用于回答客户问题，最适合哪类记忆？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"a\"><span>工作记忆，每次把全部手册塞入上下文</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"b\"><span>语义记忆，存入向量数据库按需检索相关内容</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"c\"><span>情景记忆，记录每次客户问答</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"d\"><span>过程记忆，写进 system prompt</span></label></div><div class=\"quiz-result\" id=\"q9-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建多层记忆系统</h3><ol><li>实现上面的 AgentMemorySystem，补全所有方法。</li><li>模拟一个 5 轮对话，观察工作记忆的增长。</li><li>在第 3 轮加入语义记忆检索，验证它能影响回答。</li></ol></div></div>" },
        { id: "working-memory", title: "上下文窗口管理与工作记忆", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>上下文窗口管理与工作记忆</h1><p class=\"lesson-lead\">上下文窗口是 Agent 的工作记忆，既是最快的信息通道，也是最宝贵的稀缺资源。本节讲如何高效管理它。</p></div><div class=\"lesson-body\"><h2>窗口容量的挑战</h2><p>长时运行的 Agent 会在上下文中积累大量信息：原始指令、工具调用历史、中间结果、错误日志……这些内容很快就会逼近模型的上下文限制，导致性能下降或请求失败。</p><h2>管理策略</h2><p><strong>滑动窗口</strong>：只保留最近 N 轮对话，丢弃早期历史。<strong>摘要压缩</strong>：定期将早期内容压缩成摘要，保留关键信息。<strong>选择性保留</strong>：只保留与当前任务相关的内容，过滤无关信息。</p><div class=\"card card-tip\"><div class=\"card-label\">实践建议</div><p>对于长时运行的 Agent，建议在每 N 步后主动触发一次上下文压缩，将已完成的步骤总结为一段摘要替换原来的详细记录，可以节省 60-80% 的 token 消耗。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\nclass ContextWindowManager:\n    def __init__(self, max_messages: int = 20, compress_threshold: int = 15):\n        self.messages = []\n        self.max_messages = max_messages\n        self.compress_threshold = compress_threshold\n        self.summary = \"\"  # 历史摘要\n    \n    def add_message(self, role: str, content: str):\n        self.messages.append({\"role\": role, \"content\": content})\n        if len(self.messages) >= self.compress_threshold:\n            self._compress_context()\n    \n    def _compress_context(self):\n        \"\"\"将早期消息压缩成摘要\"\"\"\n        # 保留最近的 5 条消息\n        to_compress = self.messages[:-5]\n        recent = self.messages[-5:]\n        \n        if not to_compress:\n            return\n        \n        compress_text = \"\\n\".join(\n            f\"{m['role']}: {m['content'][:200]}\" for m in to_compress\n        )\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=512,\n            messages=[{\"role\": \"user\", \"content\": f\"请将以下对话压缩为简洁摘要，保留关键信息和决策：\\n{compress_text}\"}],\n        )\n        new_summary = resp.content[0].text\n        self.summary = f\"{self.summary}\\n{new_summary}\".strip()\n        \n        # 重建消息列表：摘要 + 最近消息\n        self.messages = [{\n            \"role\": \"user\",\n            \"content\": f\"[历史摘要]\\n{self.summary}\",\n        }, {\n            \"role\": \"assistant\",\n            \"content\": \"已了解历史上下文，继续执行任务。\",\n        }] + recent\n        print(f\"上下文已压缩：{len(to_compress)} 条消息 → 摘要\")\n    \n    def get_messages(self) -> list:\n        return self.messages\n\nmgr = ContextWindowManager()\nfor i in range(18):\n    mgr.add_message(\"user\", f\"步骤 {i}: 执行数据处理操作\")\n    mgr.add_message(\"assistant\", f\"步骤 {i} 完成，结果已记录。\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>上下文窗口是 Agent 最宝贵的资源</li><li>长时运行需要主动管理，防止溢出</li><li>摘要压缩可节省 60-80% 的 token 消耗</li><li>选择性保留：只留与当前任务相关的信息</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Agent 长时运行时上下文不断增长，最有效的应对策略是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"a\"><span>换用上下文更大的模型，无需任何管理</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"b\"><span>定期将早期内容压缩为摘要并替换原始记录，保留最近的详细消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"c\"><span>直接截断最早的内容，不做任何处理</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"d\"><span>每次都重新开始新的上下文</span></label></div><div class=\"quiz-result\" id=\"q10-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现上下文压缩</h3><ol><li>实现 ContextWindowManager，运行一个 30 步的 Agent 任务。</li><li>记录每次压缩前后的 token 数量变化。</li><li>验证压缩后 Agent 仍然能正确引用早期步骤的关键信息。</li></ol></div></div>" },
        { id: "long-term-memory", title: "向量数据库与长期记忆", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>向量数据库与长期记忆</h1><p class=\"lesson-lead\">向量数据库让 Agent 拥有超越上下文窗口的持久记忆，支持语义相似度检索海量知识。</p></div><div class=\"lesson-body\"><h2>向量数据库的原理</h2><p>文本先通过 Embedding 模型转换为高维向量，存入向量数据库。检索时，将查询文本也转为向量，通过余弦相似度或欧氏距离找到最相近的记忆片段，返回给 Agent 作为上下文。</p><h2>常见选型</h2><p>本地开发可用 <code>chromadb</code>（纯 Python，零配置）；生产环境可选 Pinecone、Weaviate、Qdrant 或 pgvector（PostgreSQL 扩展）。选型考虑因素：数据量、查询延迟、托管 vs 自建。</p><div class=\"card card-note\"><div class=\"card-label\">Embedding 选择</div><p>可以用 Claude 以外的 Embedding 服务（如 OpenAI text-embedding-3-small 或开源的 bge-m3）将文本转为向量。Embedding 模型的质量直接影响检索精度，中文场景要选支持中文的模型。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n# pip install chromadb openai（仅演示，实际可换任意 embedding 服务）\nimport chromadb\nfrom openai import OpenAI\n\nclaude = anthropic.Anthropic()\noai = OpenAI()  # 仅用于 embedding\nchroma = chromadb.Client()\ncollection = chroma.create_collection(\"agent_memory\")\n\ndef embed(text: str) -> list:\n    \"\"\"将文本转为向量\"\"\"\n    resp = oai.embeddings.create(model=\"text-embedding-3-small\", input=text)\n    return resp.data[0].embedding\n\ndef store_memory(doc_id: str, content: str, metadata: dict = None):\n    \"\"\"存入长期记忆\"\"\"\n    collection.add(\n        ids=[doc_id],\n        embeddings=[embed(content)],\n        documents=[content],\n        metadatas=[metadata or {}],\n    )\n\ndef retrieve_memory(query: str, n_results: int = 3) -> list:\n    \"\"\"语义检索最相关的记忆\"\"\"\n    results = collection.query(\n        query_embeddings=[embed(query)],\n        n_results=n_results,\n    )\n    return results[\"documents\"][0]\n\ndef rag_query(question: str) -> str:\n    \"\"\"检索增强的 Agent 回答\"\"\"\n    memories = retrieve_memory(question)\n    context = \"\\n\".join(memories)\n    resp = claude.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=512,\n        system=f\"基于以下记忆回答问题：\\n{context}\",\n        messages=[{\"role\": \"user\", \"content\": question}],\n    )\n    return resp.content[0].text\n\n# 存入一些记忆\nstore_memory(\"m1\", \"用户偏好：喜欢简洁的代码，不喜欢过多注释\", {\"type\": \"preference\"})\nstore_memory(\"m2\", \"项目使用 FastAPI + PostgreSQL 技术栈\", {\"type\": \"context\"})\nstore_memory(\"m3\", \"上次部署在 2024-01-15，版本 v2.3.1\", {\"type\": \"history\"})\n\nprint(rag_query(\"我们项目用什么数据库？\"))</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>向量数据库让 Agent 突破上下文窗口限制</li><li>Embedding 将文本转为向量，支持语义检索</li><li>本地用 chromadb，生产可选 Pinecone/Qdrant</li><li>中文场景需选择支持中文的 Embedding 模型</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>向量数据库与普通关键词搜索的核心区别是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"a\"><span>向量数据库更便宜</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"b\"><span>向量数据库基于语义相似度检索，能找到意思相近但用词不同的内容，而关键词搜索只能精确匹配</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"c\"><span>向量数据库只能存储图片</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"d\"><span>向量数据库查询速度更慢</span></label></div><div class=\"quiz-result\" id=\"q11-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建长期记忆</h3><ol><li>用 chromadb 创建一个知识库，存入 10 条不同主题的记忆。</li><li>用语义近似但用词不同的查询测试检索效果。</li><li>将检索结果注入 Claude 的上下文，对比有无记忆时的回答质量。</li></ol></div></div>" },
        { id: "memory-retrieval", title: "记忆检索策略与相关性排序", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>记忆检索策略与相关性排序</h1><p class=\"lesson-lead\">检索到正确的记忆和检索到所有记忆一样重要。本节讲解提升检索精度的关键策略。</p></div><div class=\"lesson-body\"><h2>检索精度的挑战</h2><p>简单的向量相似度检索存在问题：返回的结果可能语义相关但时间过时、或者相关度接近难以区分。生产级 Agent 需要更精细的检索策略。</p><h2>提升检索质量的策略</h2><p><strong>混合检索</strong>：结合向量相似度（语义）和关键词匹配（精确），取两者的综合排序。<strong>时间衰减</strong>：给近期记忆更高权重，旧记忆相关分降低。<strong>元数据过滤</strong>：先用类型、来源、时间等元数据过滤，再做向量检索。<strong>重排序（Reranking）</strong>：检索出候选集后，用交叉编码器模型精排。</p><div class=\"card card-tip\"><div class=\"card-label\">查询扩展技巧</div><p>让模型先将用户查询改写成多种表达形式，再分别检索，最后合并结果去重。这种&quot;查询扩展&quot;技术能显著提升召回率，特别适合用户表达不精确的场景。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nfrom datetime import datetime, timedelta\n\nclient = anthropic.Anthropic()\n\ndef expand_query(original_query: str) -> list:\n    \"\"\"用模型将查询扩展为多种表达，提升召回率\"\"\"\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=256,\n        system=\"将用户查询改写为 3 种不同表达方式，每行一种，不要编号。\",\n        messages=[{\"role\": \"user\", \"content\": original_query}],\n    )\n    variants = resp.content[0].text.strip().split(\"\\n\")\n    return [original_query] + [v.strip() for v in variants if v.strip()]\n\ndef score_with_recency(base_score: float, timestamp: str) -> float:\n    \"\"\"加入时间衰减：每过 7 天，相关性分数降低 10%\"\"\"\n    try:\n        doc_time = datetime.fromisoformat(timestamp)\n        days_old = (datetime.now() - doc_time).days\n        decay = 0.9 ** (days_old // 7)\n        return base_score * decay\n    except Exception:\n        return base_score\n\ndef retrieve_with_strategy(query: str, memories: list) -> list:\n    \"\"\"综合策略检索：查询扩展 + 时间衰减 + 元数据过滤\"\"\"\n    queries = expand_query(query)\n    print(f\"扩展查询：{queries}\")\n    \n    # 模拟：对每条记忆计算综合分数（实际中接向量库）\n    scored = []\n    for mem in memories:\n        # 简化：用关键词重叠率代替向量相似度\n        base = sum(1 for q in queries if any(w in mem[\"content\"] for w in q.split()))\n        final_score = score_with_recency(base, mem.get(\"timestamp\", datetime.now().isoformat()))\n        scored.append((final_score, mem))\n    \n    scored.sort(key=lambda x: x[0], reverse=True)\n    return [m for _, m in scored[:3]]\n\n# 测试\nmemories = [\n    {\"content\": \"Python 项目配置文件在 config.yaml\", \"timestamp\": (datetime.now() - timedelta(days=1)).isoformat()},\n    {\"content\": \"数据库连接参数已更新\", \"timestamp\": (datetime.now() - timedelta(days=30)).isoformat()},\n    {\"content\": \"Python 依赖用 requirements.txt 管理\", \"timestamp\": datetime.now().isoformat()},\n]\nresults = retrieve_with_strategy(\"Python 项目怎么配置\", memories)\nfor r in results:\n    print(\"-\", r[\"content\"])</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>混合检索结合语义和关键词，提升精度</li><li>时间衰减给近期记忆更高权重</li><li>元数据过滤先收窄候选集再向量检索</li><li>查询扩展改写多种表达，提升召回率</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>&quot;查询扩展&quot;技术在记忆检索中的作用是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"a\"><span>减少需要检索的记忆数量</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"b\"><span>将原始查询改写为多种表达方式分别检索，合并结果以提升召回率</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"c\"><span>让检索速度更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"d\"><span>替代向量数据库</span></label></div><div class=\"quiz-result\" id=\"q12-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>优化检索策略</h3><ol><li>实现查询扩展函数，生成 3 个变体查询。</li><li>对同一问题分别用原始查询和扩展查询检索，比较结果集的差异。</li><li>加入时间衰减，验证新记忆的优先级是否高于旧记忆。</li></ol></div></div>" },
      ]
    },
    {
      title: "工具与行动空间",
      lessons: [
        { id: "tool-design", title: "为 Agent 设计高效工具的原则", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>为 Agent 设计高效工具的原则</h1><p class=\"lesson-lead\">工具是 Agent 与外部世界交互的桥梁。好的工具设计能让 Agent 更准确、更高效地完成任务。</p></div><div class=\"lesson-body\"><h2>工具设计的核心原则</h2><p><strong>单一职责</strong>：每个工具只做一件事，输入输出语义清晰。<strong>描述精准</strong>：工具描述是 Agent 选择工具的依据，必须准确说明&quot;何时用、怎么用、返回什么&quot;。<strong>参数最简</strong>：只要求必要参数，可选参数提供合理默认值。<strong>幂等设计</strong>：读取类工具一定要是幂等的；写入类工具考虑幂等或提供确认机制。</p><h2>工具描述质量至关重要</h2><p>模型看不到工具的代码实现，它只能根据 name、description 和 input_schema 来判断该不该用这个工具、怎么用。描述模糊的工具会导致 Agent 频繁选错工具或传错参数。</p><div class=\"card card-key\"><div class=\"card-label\">描述写法示例</div><p>差：<code>\"search\": \"搜索信息\"</code><br>好：<code>\"web_search\": \"在互联网上搜索最新信息。输入搜索关键词，返回前 5 条结果的标题和摘要。适用于需要获取实时或训练数据截止后的信息时。\"</code></p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\n# 定义工具时的最佳实践\ntools = [\n    {\n        \"name\": \"read_file\",\n        \"description\": \"读取本地文件的内容。适用于需要查看代码、配置或文档时。只能读取，不会修改文件。返回文件的完整文本内容。\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"file_path\": {\n                    \"type\": \"string\",\n                    \"description\": \"要读取的文件的绝对路径，例如 /home/user/config.yaml\",\n                },\n                \"encoding\": {\n                    \"type\": \"string\",\n                    \"description\": \"文件编码，默认 utf-8\",\n                    \"default\": \"utf-8\",\n                },\n            },\n            \"required\": [\"file_path\"],\n        },\n    },\n    {\n        \"name\": \"execute_python\",\n        \"description\": \"在沙箱环境中执行 Python 代码。适用于数据计算、格式转换、文本处理等任务。代码在隔离环境中运行，不影响宿主系统。返回标准输出和错误信息。\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"code\": {\n                    \"type\": \"string\",\n                    \"description\": \"要执行的 Python 代码字符串\",\n                },\n                \"timeout_seconds\": {\n                    \"type\": \"integer\",\n                    \"description\": \"最大执行时间（秒），默认 30\",\n                    \"default\": 30,\n                },\n            },\n            \"required\": [\"code\"],\n        },\n    },\n]\n\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=1024,\n    tools=tools,\n    messages=[{\"role\": \"user\", \"content\": \"读取 /etc/hosts 文件的内容\"}],\n)\nprint(resp.stop_reason, resp.content)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>工具单一职责，描述精准说明使用场景</li><li>描述质量决定 Agent 工具选择的准确率</li><li>参数设计最简化，提供合理默认值</li><li>读取类工具设计为幂等，写入类考虑确认</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>工具的 description 字段对 Agent 最重要的作用是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"a\"><span>决定工具的执行速度</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"b\"><span>是 Agent 判断何时使用该工具以及如何传参的唯一依据，直接影响工具调用准确率</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"c\"><span>用来显示给最终用户看的</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"d\"><span>description 可以留空，不影响功能</span></label></div><div class=\"quiz-result\" id=\"q13-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>优化工具描述</h3><ol><li>为一个数据库查询工具写两版描述：一版模糊、一版精准。</li><li>分别让 Agent 用两版工具解决同一问题，记录参数传递准确率的差异。</li><li>总结好的工具描述应包含哪些要素。</li></ol></div></div>" },
        { id: "tool-selection", title: "Agent 如何选择与组合工具", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>Agent 如何选择与组合工具</h1><p class=\"lesson-lead\">工具选择和组合是 Agent 推理能力的重要体现。了解其机制，才能设计出让 Agent 高效使用工具的系统。</p></div><div class=\"lesson-body\"><h2>工具选择的机制</h2><p>Claude 根据当前任务状态和所有工具的描述，通过推理判断：该用哪个工具、参数是什么、是否需要先用一个工具的结果再调用另一个工具。这个推理过程在模型内部完成，依赖工具描述的质量和上下文的清晰度。</p><h2>工具组合模式</h2><p><strong>顺序组合</strong>：工具 A 的输出作为工具 B 的输入（如先搜索再提取）。<strong>并行调用</strong>：Claude 可以在同一轮中请求多个独立工具同时执行。<strong>条件分支</strong>：根据工具返回结果决定下一步调用哪个工具。<strong>迭代精化</strong>：重复调用同一工具但使用更精确的参数。</p><div class=\"card card-note\"><div class=\"card-label\">并行工具调用</div><p>Claude 支持在单次响应中返回多个 tool_use 块，你的执行层应检测并并行执行这些调用，将所有结果汇总后一次性作为 tool_result 返回，这能显著减少往返次数。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport asyncio\n\nclient = anthropic.Anthropic()\n\nasync def execute_tool_async(tool_name: str, tool_input: dict) -> str:\n    \"\"\"模拟异步工具执行\"\"\"\n    await asyncio.sleep(0.1)  # 模拟网络延迟\n    if tool_name == \"get_stock_price\":\n        return f\"{tool_input['symbol']} 当前价格: ¥{100 + hash(tool_input['symbol']) % 50}\"\n    elif tool_name == \"get_company_info\":\n        return f\"{tool_input['symbol']} 是一家科技公司，成立于 2010 年\"\n    return \"未知工具\"\n\ndef handle_parallel_tools(resp_content: list) -> list:\n    \"\"\"并行执行所有工具调用\"\"\"\n    tool_calls = [b for b in resp_content if b.type == \"tool_use\"]\n    \n    if len(tool_calls) > 1:\n        print(f\"并行执行 {len(tool_calls)} 个工具\")\n    \n    # 并行执行\n    loop = asyncio.new_event_loop()\n    tasks = [execute_tool_async(tc.name, tc.input) for tc in tool_calls]\n    results = loop.run_until_complete(asyncio.gather(*tasks))\n    loop.close()\n    \n    return [\n        {\"type\": \"tool_result\", \"tool_use_id\": tc.id, \"content\": result}\n        for tc, result in zip(tool_calls, results)\n    ]\n\n# 工具定义\ntools = [\n    {\"name\": \"get_stock_price\", \"description\": \"获取股票实时价格\",\n     \"input_schema\": {\"type\": \"object\", \"properties\": {\"symbol\": {\"type\": \"string\"}}, \"required\": [\"symbol\"]}},\n    {\"name\": \"get_company_info\", \"description\": \"获取公司基本信息\",\n     \"input_schema\": {\"type\": \"object\", \"properties\": {\"symbol\": {\"type\": \"string\"}}, \"required\": [\"symbol\"]}},\n]\n\nmessages = [{\"role\": \"user\", \"content\": \"同时告诉我 BABA 的股价和公司信息\"}]\nresp = client.messages.create(model=\"claude-sonnet-4-20250514\", max_tokens=1024, tools=tools, messages=messages)\n\nif resp.stop_reason == \"tool_use\":\n    tool_results = handle_parallel_tools(resp.content)\n    messages.append({\"role\": \"assistant\", \"content\": resp.content})\n    messages.append({\"role\": \"user\", \"content\": tool_results})\n    final = client.messages.create(model=\"claude-sonnet-4-20250514\", max_tokens=512, tools=tools, messages=messages)\n    print(final.content[0].text)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Claude 通过推理自主决定工具选择和参数</li><li>工具可以顺序、并行、条件分支等方式组合</li><li>检测并行工具调用并同时执行可减少往返次数</li><li>工具结果质量影响后续工具的选择准确性</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Claude 在单次响应中返回多个 tool_use 块时，最高效的执行方式是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"a\"><span>逐个串行执行，等一个完成再执行下一个</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"b\"><span>并行执行所有工具调用，汇总结果后一次性返回，减少往返次数</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"c\"><span>只执行第一个工具调用</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"d\"><span>返回错误，不支持多工具</span></label></div><div class=\"quiz-result\" id=\"q14-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现并行工具执行</h3><ol><li>设计三个可以独立执行的工具（如查天气、查股价、查汇率）。</li><li>让 Agent 请求同时获取这三类信息，实现并行执行。</li><li>对比串行和并行执行的总耗时差异。</li></ol></div></div>" },
        { id: "action-types", title: "读取、写入、调用与通信类行动", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>读取、写入、调用与通信类行动</h1><p class=\"lesson-lead\">Agent 的行动空间可以分为四大类型，每类有不同的风险等级和设计考量。</p></div><div class=\"lesson-body\"><h2>四类行动</h2><p><strong>读取类</strong>：读文件、查数据库、搜索网络、获取 API 数据。风险最低，通常无需确认，可自由调用。<strong>写入类</strong>：创建/修改文件、写入数据库、更新状态。有副作用，需要权限控制和操作日志。<strong>调用类</strong>：执行代码、运行命令、触发计算。风险视内容而定，通常需要沙箱隔离。<strong>通信类</strong>：发邮件、发消息、调用外部 API（有写副作用）。通常是不可撤销的，高风险操作需人工确认。</p><div class=\"card card-key\"><div class=\"card-label\">风险分级原则</div><p>按副作用的可逆性排序：读取（可逆）< 写入（可撤销）< 执行（视情况）< 通信（通常不可逆）。越靠右的行动越需要谨慎设计，越需要权限控制和人工确认机制。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nfrom enum import Enum\n\nclient = anthropic.Anthropic()\n\nclass ActionRisk(Enum):\n    READ = \"read\"      # 低风险，可自由执行\n    WRITE = \"write\"    # 中风险，需权限检查\n    EXECUTE = \"exec\"   # 中高风险，需沙箱\n    COMMUNICATE = \"comm\"  # 高风险，需人工确认\n\nACTION_REGISTRY = {\n    \"read_file\": ActionRisk.READ,\n    \"search_web\": ActionRisk.READ,\n    \"write_file\": ActionRisk.WRITE,\n    \"update_db\": ActionRisk.WRITE,\n    \"run_python\": ActionRisk.EXECUTE,\n    \"send_email\": ActionRisk.COMMUNICATE,\n    \"post_message\": ActionRisk.COMMUNICATE,\n}\n\ndef check_action_permission(action_name: str, user_role: str) -> tuple:\n    \"\"\"返回 (是否允许, 是否需要确认)\"\"\"\n    risk = ACTION_REGISTRY.get(action_name, ActionRisk.EXECUTE)\n    \n    if risk == ActionRisk.READ:\n        return True, False  # 直接执行\n    elif risk == ActionRisk.WRITE:\n        return user_role in [\"admin\", \"editor\"], False\n    elif risk == ActionRisk.EXECUTE:\n        return True, True  # 需要确认\n    elif risk == ActionRisk.COMMUNICATE:\n        return user_role == \"admin\", True  # 需要管理员权限且确认\n    return False, True\n\n# 测试权限检查\nfor action in [\"read_file\", \"write_file\", \"send_email\"]:\n    allowed, needs_confirm = check_action_permission(action, \"editor\")\n    print(f\"{action}: 允许={allowed}, 需确认={needs_confirm}\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>四类行动：读取、写入、调用、通信</li><li>风险等级从低到高：读取→写入→执行→通信</li><li>越高风险的行动越需要权限控制和确认</li><li>通信类行动通常不可逆，必须谨慎设计</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪类行动风险最高，最需要人工确认？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"a\"><span>读取文件内容</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"b\"><span>发送邮件给外部客户（通信类，不可逆操作）</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"c\"><span>搜索网络信息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"d\"><span>查询数据库记录</span></label></div><div class=\"quiz-result\" id=\"q15-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>设计行动权限系统</h3><ol><li>为你的 Agent 设计 8 个工具，按四类行动分类。</li><li>实现权限检查函数，不同用户角色有不同权限。</li><li>为高风险行动实现确认机制（打印确认提示，等待用户输入 yes）。</li></ol></div></div>" },
        { id: "sandboxing", title: "工具执行的沙箱与安全隔离", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>工具执行的沙箱与安全隔离</h1><p class=\"lesson-lead\">让 Agent 执行代码或操作系统资源时，沙箱隔离是保护宿主系统安全的必要措施。</p></div><div class=\"lesson-body\"><h2>为什么需要沙箱</h2><p>Agent 生成的代码可能存在 bug、恶意注入或意外的系统调用。没有隔离的情况下，一次错误的代码执行可能删除文件、泄露数据或消耗大量资源。沙箱将这些风险限制在一个受控环境中。</p><h2>沙箱实现方案</h2><p><strong>进程级隔离</strong>：用 subprocess 在独立进程中执行，配合超时和资源限制。<strong>容器化</strong>：Docker 容器提供文件系统、网络、进程的完整隔离，是生产首选。<strong>虚拟机</strong>：最强隔离，但启动慢，适合高安全要求场景。<strong>WebAssembly</strong>：轻量级沙箱，适合浏览器或边缘计算场景。</p><div class=\"card card-tip\"><div class=\"card-label\">最小权限原则</div><p>沙箱不仅是技术隔离，还要遵循最小权限原则：只给 Agent 完成任务所必需的权限。文件读取权限不应包含系统目录；网络访问只允许白名单域名；不允许执行 shell 命令除非必要。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport subprocess\nimport tempfile\nimport os\n\nclient = anthropic.Anthropic()\n\ndef execute_in_sandbox(code: str, timeout: int = 10) -> dict:\n    \"\"\"在受限子进程中执行 Python 代码\"\"\"\n    # 创建临时文件存放代码\n    with tempfile.NamedTemporaryFile(mode=\"w\", suffix=\".py\", delete=False) as f:\n        # 添加安全限制：禁止导入危险模块\n        safe_code = \"\"\"\nimport sys\n# 禁止访问文件系统危险路径\nimport builtins\n_original_open = builtins.open\ndef _safe_open(file, mode='r', **kwargs):\n    if 'w' in mode or 'a' in mode:\n        raise PermissionError(\"沙箱禁止写入文件\")\n    return _original_open(file, mode, **kwargs)\nbuiltins.open = _safe_open\n\"\"\" + code\n        f.write(safe_code)\n        tmp_path = f.name\n    \n    try:\n        result = subprocess.run(\n            [\"python3\", tmp_path],\n            capture_output=True,\n            text=True,\n            timeout=timeout,\n            # 限制资源（Unix）\n            # preexec_fn=lambda: resource.setrlimit(resource.RLIMIT_AS, (256*1024*1024, -1))\n        )\n        return {\n            \"stdout\": result.stdout[:2000],  # 截断超长输出\n            \"stderr\": result.stderr[:500],\n            \"returncode\": result.returncode,\n        }\n    except subprocess.TimeoutExpired:\n        return {\"stdout\": \"\", \"stderr\": \"执行超时\", \"returncode\": -1}\n    finally:\n        os.unlink(tmp_path)\n\n# 测试沙箱\nresult = execute_in_sandbox(\"print(sum(range(100)))\")\nprint(\"输出:\", result[\"stdout\"])\n\n# 恶意代码应被拦截\nresult2 = execute_in_sandbox(\"open('/etc/passwd', 'w').write('hack')\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>代码执行必须在隔离环境中进行</li><li>进程隔离简单可用，容器化是生产首选</li><li>遵循最小权限：只给必要的文件和网络访问</li><li>设置超时和资源限制防止滥用</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>生产环境中 Agent 代码执行沙箱的首选方案是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"a\"><span>直接在主进程中执行，最简单</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"b\"><span>Docker 容器，提供文件系统、网络、进程的完整隔离，是生产环境的最佳平衡</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"c\"><span>不执行任何代码，完全禁止</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"d\"><span>让用户自己来执行</span></label></div><div class=\"quiz-result\" id=\"q16-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建代码执行沙箱</h3><ol><li>实现上面的 execute_in_sandbox 函数并加入更多安全检查。</li><li>测试超时机制：提交一个死循环代码，验证超时是否生效。</li><li>尝试在沙箱中执行危险操作（删文件、网络请求），验证拦截效果。</li></ol></div></div>" },
      ]
    },
    {
      title: "错误处理与可靠性",
      lessons: [
        { id: "error-detection", title: "识别 Agent 执行错误与异常", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>识别 Agent 执行错误与异常</h1><p class=\"lesson-lead\">Agent 运行中的错误多种多样，从工具失败到模型幻觉，都需要系统化的检测和分类机制。</p></div><div class=\"lesson-body\"><h2>Agent 错误的分类</h2><p><strong>工具执行错误</strong>：API 超时、权限拒绝、网络断开、返回格式异常。<strong>规划错误</strong>：Agent 选错工具、参数格式不对、陷入无意义循环。<strong>结果质量错误</strong>：工具返回了结果但结果不可信（幻觉、截断、编码错误）。<strong>状态不一致</strong>：Agent 对任务状态的判断与实际状态不符（认为完成但实际未完成）。</p><h2>检测策略</h2><p>用结构化的工具结果格式（包含 success 字段和 error 字段）让错误明确可检测；对关键步骤加入断言验证；对长时间运行的任务定期做状态校验。</p><div class=\"card card-note\"><div class=\"card-label\">幻觉检测</div><p>模型有时会&quot;编造&quot;工具调用结果而不是真正执行工具，或在没有实际数据支撑的情况下声称任务已完成。对关键操作，始终通过工具返回值验证，不要只依赖模型的文字描述。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nfrom dataclasses import dataclass\nfrom typing import Optional, Any\n\nclient = anthropic.Anthropic()\n\n@dataclass\nclass ToolResult:\n    success: bool\n    data: Optional[Any]\n    error: Optional[str]\n    tool_name: str\n    \n    def to_str(self) -> str:\n        if self.success:\n            return f\"成功: {self.data}\"\n        return f\"错误: {self.error}\"\n\ndef safe_tool_execute(tool_name: str, tool_input: dict) -> ToolResult:\n    \"\"\"带错误分类的工具执行包装器\"\"\"\n    try:\n        # 模拟工具执行\n        if tool_name == \"fetch_url\":\n            url = tool_input.get(\"url\", \"\")\n            if not url.startswith(\"https://\"):\n                return ToolResult(False, None, \"只允许 HTTPS 请求\", tool_name)\n            # 实际执行...\n            return ToolResult(True, f\"页面内容来自 {url}\", None, tool_name)\n        return ToolResult(False, None, f\"未知工具: {tool_name}\", tool_name)\n    except TimeoutError:\n        return ToolResult(False, None, \"工具执行超时\", tool_name)\n    except PermissionError as e:\n        return ToolResult(False, None, f\"权限不足: {e}\", tool_name)\n    except Exception as e:\n        return ToolResult(False, None, f\"未知错误: {type(e).__name__}: {e}\", tool_name)\n\ndef detect_loop(step_history: list, window: int = 5) -> bool:\n    \"\"\"检测 Agent 是否陷入重复循环\"\"\"\n    if len(step_history) < window:\n        return False\n    recent = step_history[-window:]\n    # 如果最近 N 步工具调用完全相同，判定为循环\n    return len(set(str(s) for s in recent)) == 1\n\n# 测试\nresult = safe_tool_execute(\"fetch_url\", {\"url\": \"http://example.com\"})\nprint(result.to_str())\n\nhistory = [{\"tool\": \"search\", \"query\": \"test\"}] * 6\nprint(\"循环检测:\", detect_loop(history))</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>错误分四类：工具错误、规划错误、质量错误、状态不一致</li><li>结构化工具结果让错误明确可检测</li><li>通过工具返回值验证，不依赖模型文字声明</li><li>循环检测防止 Agent 陷入无意义重复</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>防止 Agent&quot;幻觉完成&quot;（声称完成但实际未执行）的最可靠方法是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"a\"><span>相信模型的文字描述，它说完成就是完成了</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"b\"><span>对关键操作通过工具的实际返回值验证结果，而不是依赖模型的文字声明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"c\"><span>多问模型几次直到它说完成</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"d\"><span>使用更大的模型就不会有幻觉</span></label></div><div class=\"quiz-result\" id=\"q17-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建错误检测系统</h3><ol><li>实现 safe_tool_execute 包装器，覆盖超时、权限、网络等错误类型。</li><li>实现 detect_loop 函数，在你的 Agent 循环中集成它。</li><li>模拟各类错误场景，验证检测和分类的准确性。</li></ol></div></div>" },
        { id: "retry-strategies", title: "重试、回退与备选策略", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>重试、回退与备选策略</h1><p class=\"lesson-lead\">面对错误，Agent 需要智能的恢复策略。重试、回退和备选方案构成三层防御机制。</p></div><div class=\"lesson-body\"><h2>三层恢复机制</h2><p><strong>第一层：智能重试</strong>：对暂时性错误（超时、限流）自动重试，用指数退避避免加重拥塞。<strong>第二层：参数调整后重试</strong>：如果工具返回参数错误，让模型重新生成参数再尝试。<strong>第三层：备选工具/路径</strong>：主要方案失败后切换到备选工具或降级方案完成核心目标。</p><div class=\"card card-key\"><div class=\"card-label\">何时停止重试</div><p>重试必须有终止条件：最大次数（如 3 次）、最大等待时间（如 60 秒）、错误类型（4xx 客户端错误不应重试）。永不终止的重试是 Bug，不是弹性。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport time\nimport random\nfrom typing import Callable, Optional\n\nclient = anthropic.Anthropic()\n\ndef retry_with_backoff(\n    fn: Callable,\n    max_retries: int = 3,\n    base_delay: float = 1.0,\n    retryable_errors: tuple = (TimeoutError, ConnectionError),\n) -> any:\n    \"\"\"带指数退避的重试装饰器\"\"\"\n    last_error = None\n    for attempt in range(max_retries + 1):\n        try:\n            return fn()\n        except retryable_errors as e:\n            last_error = e\n            if attempt == max_retries:\n                break\n            delay = base_delay * (2 ** attempt) + random.uniform(0, 0.5)\n            print(f\"第 {attempt+1} 次失败，{delay:.1f}s 后重试: {e}\")\n            time.sleep(delay)\n        except Exception as e:\n            # 不可重试的错误，直接抛出\n            raise e\n    raise RuntimeError(f\"重试 {max_retries} 次后仍失败: {last_error}\")\n\ndef agent_with_fallback(task: str) -> str:\n    \"\"\"带备选策略的 Agent 执行\"\"\"\n    primary_tools = [{\"name\": \"search_web\", \"description\": \"搜索互联网\",\n                      \"input_schema\": {\"type\": \"object\", \"properties\": {\"query\": {\"type\": \"string\"}}, \"required\": [\"query\"]}}]\n    fallback_tools = [{\"name\": \"search_local_db\", \"description\": \"搜索本地知识库\",\n                       \"input_schema\": {\"type\": \"object\", \"properties\": {\"query\": {\"type\": \"string\"}}, \"required\": [\"query\"]}}]\n    \n    for tools, label in [(primary_tools, \"主要\"), (fallback_tools, \"备选\")]:\n        try:\n            resp = client.messages.create(\n                model=\"claude-sonnet-4-20250514\",\n                max_tokens=512,\n                tools=tools,\n                messages=[{\"role\": \"user\", \"content\": task}],\n            )\n            print(f\"使用{label}工具成功\")\n            return resp.content[0].text if resp.content else \"\"\n        except Exception as e:\n            print(f\"{label}工具失败: {e}，尝试下一方案\")\n    \n    # 最终降级：纯模型回答（无工具）\n    print(\"降级到纯模型回答\")\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=512,\n        messages=[{\"role\": \"user\", \"content\": task}],\n    )\n    return resp.content[0].text\n\nresult = agent_with_fallback(\"查询最新的 Python 版本信息\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>三层恢复：自动重试、调整参数重试、切换备选</li><li>指数退避+抖动避免拥塞加剧</li><li>4xx 客户端错误不应重试</li><li>重试必须有终止条件，防止无限循环</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Agent 工具调用收到 HTTP 403 权限拒绝错误，正确的处理是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"a\"><span>立即重试 5 次，希望权限自动恢复</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"b\"><span>不重试（客户端错误），改为切换备选工具或触发重规划寻找其他路径</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"c\"><span>等待 60 秒后重试</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q18\" value=\"d\"><span>忽略错误，继续假设操作已成功</span></label></div><div class=\"quiz-result\" id=\"q18-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现三层恢复机制</h3><ol><li>实现 retry_with_backoff，区分可重试和不可重试错误。</li><li>为一个工具设计主方案和备选方案（如主用实时 API，备用缓存数据）。</li><li>模拟主方案失败，验证自动切换到备选方案是否正常。</li></ol></div></div>" },
        { id: "human-in-loop", title: "何时暂停并请求人类确认", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>何时暂停并请求人类确认</h1><p class=\"lesson-lead\">自主 Agent 并不意味着完全不需要人类介入。在正确的时机引入人类监督，是安全高效的 Agent 设计的关键。</p></div><div class=\"lesson-body\"><h2>需要人类确认的场景</h2><p><strong>高风险不可逆操作</strong>：删除数据、发送大量邮件、提交大额交易。<strong>信心不足</strong>：Agent 自评不确定性高，或任务与训练数据差异大。<strong>授权边界</strong>：操作超出预设权限范围，如修改核心配置文件。<strong>成本控制</strong>：预计费用超过阈值时，先征得用户同意再继续。</p><h2>人在环路（HITL）设计模式</h2><p>不是每步都要人工确认——那会抵消 Agent 的效率优势。好的 HITL 设计是：在关键决策点插入确认节点，非关键操作全自动，只在真正需要时暂停。</p><div class=\"card card-tip\"><div class=\"card-label\">优化确认体验</div><p>设计确认请求时，给用户清晰的上下文：Agent 打算做什么、为什么、影响是什么、有哪些选项。&quot;是否继续？(yes/no)&quot;比&quot;操作待确认&quot;对用户友好得多。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nfrom typing import Callable\n\nclient = anthropic.Anthropic()\n\nclass HumanInLoopAgent:\n    def __init__(self, confirm_fn: Callable = None):\n        # confirm_fn 可以是 CLI 输入、API 调用或 Web 界面回调\n        self.confirm_fn = confirm_fn or self._cli_confirm\n        self.HIGH_RISK_ACTIONS = {\"delete_records\", \"send_bulk_email\", \"deploy_to_production\"}\n    \n    def _cli_confirm(self, action: str, details: str) -> bool:\n        print(f\"\\n[需要确认]\\n行动：{action}\\n详情：{details}\")\n        resp = input(\"是否允许此操作？(yes/no): \").strip().lower()\n        return resp == \"yes\"\n    \n    def should_confirm(self, action_name: str, estimated_cost: float = 0) -> bool:\n        \"\"\"判断是否需要人工确认\"\"\"\n        if action_name in self.HIGH_RISK_ACTIONS:\n            return True\n        if estimated_cost > 100:  # 估算成本超过 100 元\n            return True\n        return False\n    \n    def execute_with_confirmation(self, action_name: str, action_fn: Callable, details: str) -> dict:\n        if self.should_confirm(action_name, 0):\n            approved = self.confirm_fn(action_name, details)\n            if not approved:\n                return {\"status\": \"rejected\", \"reason\": \"用户拒绝\"}\n        \n        try:\n            result = action_fn()\n            return {\"status\": \"success\", \"result\": result}\n        except Exception as e:\n            return {\"status\": \"error\", \"error\": str(e)}\n    \n    def run(self, task: str) -> str:\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=512,\n            system=\"你是一个助手。在执行高风险操作前，你会明确说明操作内容和影响。\",\n            messages=[{\"role\": \"user\", \"content\": task}],\n        )\n        return resp.content[0].text\n\nagent = HumanInLoopAgent()\n# 测试高风险操作确认\nresult = agent.execute_with_confirmation(\n    \"delete_records\",\n    lambda: \"已删除 1000 条记录\",\n    \"将删除 users 表中 2023 年以前的 1000 条记录，此操作不可逆\",\n)\nprint(result)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>高风险、不可逆操作必须人工确认</li><li>信心不足和超出权限边界也应暂停</li><li>好的 HITL 只在关键节点介入，不干扰自动流程</li><li>确认请求要给出清晰的上下文和影响说明</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪种场景最应该设计人工确认节点？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"a\"><span>读取一个配置文件的内容</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"b\"><span>向 10 万名用户发送营销邮件（不可逆的大规模通信操作）</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"c\"><span>查询数据库中的记录数</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q19\" value=\"d\"><span>生成一份内部报告草稿</span></label></div><div class=\"quiz-result\" id=\"q19-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>集成人在环路</h3><ol><li>为你的 Agent 定义高风险操作清单（至少 5 个）。</li><li>实现 HumanInLoopAgent，用 CLI 输入模拟确认界面。</li><li>测试：自动操作和需确认操作的切换是否流畅？</li></ol></div></div>" },
      ]
    },
    {
      title: "多 Agent 协作",
      lessons: [
        { id: "multi-agent-why", title: "为什么需要多 Agent 系统", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>为什么需要多 Agent 系统</h1><p class=\"lesson-lead\">单个 Agent 有其固有局限。多 Agent 系统通过分工协作突破这些限制，处理更复杂、更大规模的任务。</p></div><div class=\"lesson-body\"><h2>单 Agent 的局限</h2><p><strong>上下文窗口限制</strong>：超长任务的所有信息无法塞入一个 Agent 的上下文。<strong>专业化不足</strong>：一个通用 Agent 很难在所有领域都做到最优。<strong>并行能力有限</strong>：单 Agent 本质上是串行的，无法同时处理多个独立子任务。<strong>可靠性</strong>：单点故障，一个 Agent 失败整个任务失败。</p><h2>多 Agent 的优势</h2><p>专业化 Agent 各司其职（如代码 Agent、搜索 Agent、写作 Agent），由协调 Agent 分配任务；多个 Agent 并行工作；单个失败不影响整体；每个 Agent 的上下文聚焦于自己的子任务，质量更高。</p><div class=\"card card-key\"><div class=\"card-label\">适用场景</div><p>多 Agent 架构的复杂度和成本显著高于单 Agent。只有当任务<strong>超出单上下文窗口</strong>、或需要<strong>真正并行</strong>处理、或有明确的<strong>专业化分工需求</strong>时，才值得引入多 Agent。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\n# 专业化 Agent：只做代码审查\ndef code_review_agent(code: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"你是资深代码审查专家。专注于发现 bug、安全漏洞和性能问题。输出结构化的审查报告。\",\n        messages=[{\"role\": \"user\", \"content\": f\"审查以下代码：\\n```python\\n{code}\\n```\"}],\n    )\n    return resp.content[0].text\n\n# 专业化 Agent：只做文档生成\ndef doc_writer_agent(code: str, review: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=1024,\n        system=\"你是技术文档专家。基于代码和审查意见，生成清晰的中文技术文档。\",\n        messages=[{\"role\": \"user\", \"content\": f\"代码：\\n{code}\\n\\n审查结果：\\n{review}\\n\\n请生成文档。\"}],\n    )\n    return resp.content[0].text\n\n# 协调 Agent：分配和串联任务\ndef coordinator(code: str) -> dict:\n    print(\"[协调] 启动代码审查流程\")\n    review = code_review_agent(code)\n    print(\"[协调] 审查完成，启动文档生成\")\n    doc = doc_writer_agent(code, review)\n    print(\"[协调] 文档生成完成\")\n    return {\"review\": review, \"documentation\": doc}\n\nsample_code = \"def add(a, b): return a + b\"\nresult = coordinator(sample_code)\nprint(\"文档预览:\", result[\"documentation\"][:200])</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>单 Agent 有上下文、专业化和并行能力限制</li><li>多 Agent 通过专业分工和并行处理克服这些限制</li><li>只有任务规模或复杂度确实需要时才引入多 Agent</li><li>多 Agent 需要协调层管理分工和信息流转</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪种情况最适合引入多 Agent 架构？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"a\"><span>回答一个简单的问题</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"b\"><span>同时分析 100 份文档报告，每份需要深度理解且相互独立，总量超出单上下文窗口</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"c\"><span>翻译一段 200 字的文本</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q20\" value=\"d\"><span>所有任务都应该用多 Agent，更聪明</span></label></div><div class=\"quiz-result\" id=\"q20-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>设计多 Agent 分工</h3><ol><li>选择一个复杂任务（如&quot;全面的竞品分析报告&quot;），分析它需要几个专业化 Agent。</li><li>为每个 Agent 写下其专业领域、system prompt 的核心内容。</li><li>实现上面的 coordinator 模式，串联两个专业化 Agent。</li></ol></div></div>" },
        { id: "orchestrator-worker", title: "Orchestrator-Worker 架构模式", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>Orchestrator-Worker 架构模式</h1><p class=\"lesson-lead\">Orchestrator-Worker 是多 Agent 系统中最常见的架构模式。理解它的结构和实现，是构建生产级多 Agent 系统的基础。</p></div><div class=\"lesson-body\"><h2>架构结构</h2><p><strong>Orchestrator（协调者）</strong>：接收高层目标，分解任务，分配给合适的 Worker，整合结果，决定下一步。Orchestrator 通常使用能力强的模型（如 claude-sonnet）。<strong>Worker（执行者）</strong>：接受具体子任务，专注执行，返回结果。Worker 可根据任务简单程度选用更轻量的模型（如 claude-haiku）。</p><h2>通信模式</h2><p>Orchestrator 通过消息传递给 Worker 分配任务，Worker 完成后将结构化结果返回给 Orchestrator。这种解耦设计让 Worker 可以独立替换和扩展。</p><div class=\"card card-tip\"><div class=\"card-label\">模型选型</div><p>Orchestrator 负责复杂推理和全局决策，用更强的模型；Worker 执行明确的单一任务，用更轻量的模型。这种分层模型选型能在性能和成本之间取得最优平衡。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\nclass Worker:\n    def __init__(self, name: str, expertise: str):\n        self.name = name\n        self.expertise = expertise\n    \n    def execute(self, task: str, context: str = \"\") -> str:\n        resp = client.messages.create(\n            model=\"claude-haiku-4-20250514\",  # Worker 用轻量模型\n            max_tokens=512,\n            system=f\"你是{self.expertise}专家。只做自己专业领域的任务，输出简洁准确的结果。\",\n            messages=[{\"role\": \"user\", \"content\": f\"上下文：{context}\\n\\n任务：{task}\"}],\n        )\n        return resp.content[0].text\n\nclass Orchestrator:\n    def __init__(self):\n        self.workers = {\n            \"researcher\": Worker(\"研究员\", \"信息搜集和分析\"),\n            \"writer\": Worker(\"写作\", \"内容撰写和润色\"),\n            \"reviewer\": Worker(\"审核\", \"质量检查和改进建议\"),\n        }\n    \n    def decompose_goal(self, goal: str) -> list:\n        \"\"\"用强模型分解目标为子任务\"\"\"\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",  # Orchestrator 用强模型\n            max_tokens=1024,\n            system=\"将目标分解为子任务列表，每个子任务指定执行的 worker（researcher/writer/reviewer）。输出 JSON 数组。\",\n            messages=[{\"role\": \"user\", \"content\": goal}],\n        )\n        text = resp.content[0].text\n        start, end = text.find(\"[\"), text.rfind(\"]\") + 1\n        return json.loads(text[start:end]) if start != -1 else []\n    \n    def run(self, goal: str) -> str:\n        print(f\"[Orchestrator] 开始处理目标: {goal}\")\n        tasks = self.decompose_goal(goal)\n        results = {}\n        \n        for task_info in tasks:\n            worker_name = task_info.get(\"worker\", \"researcher\")\n            task_desc = task_info.get(\"task\", \"\")\n            context = str(results)  # 传递已有结果作为上下文\n            \n            if worker_name in self.workers:\n                print(f\"[Orchestrator] 分配给 {worker_name}: {task_desc[:50]}\")\n                results[worker_name] = self.workers[worker_name].execute(task_desc, context)\n        \n        # 整合最终结果\n        final = client.messages.create(\n            model=\"claude-sonnet-4-20250514\",\n            max_tokens=512,\n            messages=[{\"role\": \"user\", \"content\": f\"整合以下各 Worker 的结果为最终报告：{json.dumps(results, ensure_ascii=False)}\"}],\n        )\n        return final.content[0].text\n\norch = Orchestrator()\nresult = orch.run(\"写一篇关于 Python 异步编程的技术博客\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Orchestrator 用强模型做全局规划和决策</li><li>Worker 用轻量模型执行具体专业任务</li><li>解耦设计让 Worker 可以独立替换和扩展</li><li>分层模型选型平衡性能和成本</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Orchestrator-Worker 架构中，为什么 Orchestrator 通常用更强的模型？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"a\"><span>强模型运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"b\"><span>Orchestrator 负责复杂的全局推理、任务分解和结果整合，需要更强的推理能力</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"c\"><span>因为 Orchestrator 需要访问更多工具</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q21\" value=\"d\"><span>API 规定 Orchestrator 必须用强模型</span></label></div><div class=\"quiz-result\" id=\"q21-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构建 Orchestrator-Worker 系统</h3><ol><li>实现上面的 Orchestrator 和 Worker 类。</li><li>添加第四个 Worker（如&quot;数据分析师&quot;），扩展任务分配逻辑。</li><li>对比用单一 Agent 和 Orchestrator-Worker 完成同一复杂任务的质量差异。</li></ol></div></div>" },
        { id: "agent-communication", title: "Agent 间通信协议与消息格式", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块六</span><span>⏱ 10 分钟</span></div><h1>Agent 间通信协议与消息格式</h1><p class=\"lesson-lead\">多 Agent 系统中，Agent 之间的通信质量直接影响协作效率。标准化的消息格式和协议是可靠通信的基础。</p></div><div class=\"lesson-body\"><h2>消息格式的重要性</h2><p>Agent 之间传递的消息如果格式不一致，会导致解析错误、信息丢失或误解。结构化的消息格式（如 JSON）让每个 Agent 能可靠地读取它需要的字段，而忽略不相关的信息。</p><h2>标准消息结构</h2><p>一条 Agent 间消息通常包含：<strong>发送方和接收方标识</strong>、<strong>消息类型</strong>（任务分配、结果汇报、状态更新、错误通知）、<strong>消息内容</strong>（结构化 payload）、<strong>元数据</strong>（时间戳、消息 ID、优先级）。</p><div class=\"card card-note\"><div class=\"card-label\">协议选择</div><p>简单的多 Agent 系统可以用 Python 函数调用直接传 dict；需要跨进程或跨机器通信时，考虑消息队列（Redis、RabbitMQ）或 HTTP API；需要流式通信时，考虑 WebSocket 或 SSE。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\nimport json\nimport uuid\nfrom datetime import datetime\nfrom dataclasses import dataclass, asdict\nfrom typing import Any, Optional\n\nclient = anthropic.Anthropic()\n\n@dataclass\nclass AgentMessage:\n    \"\"\"标准化的 Agent 间消息格式\"\"\"\n    msg_id: str\n    sender: str\n    receiver: str\n    msg_type: str  # task | result | status | error\n    payload: Any\n    timestamp: str\n    priority: int = 1  # 1=normal, 2=high, 3=urgent\n    correlation_id: Optional[str] = None  # 关联的原始任务 ID\n    \n    @classmethod\n    def create_task(cls, sender: str, receiver: str, task_desc: str, task_data: dict) -> \"AgentMessage\":\n        msg_id = str(uuid.uuid4())[:8]\n        return cls(\n            msg_id=msg_id,\n            sender=sender,\n            receiver=receiver,\n            msg_type=\"task\",\n            payload={\"description\": task_desc, \"data\": task_data},\n            timestamp=datetime.now().isoformat(),\n        )\n    \n    @classmethod\n    def create_result(cls, sender: str, receiver: str, result: Any, correlation_id: str) -> \"AgentMessage\":\n        return cls(\n            msg_id=str(uuid.uuid4())[:8],\n            sender=sender,\n            receiver=receiver,\n            msg_type=\"result\",\n            payload={\"result\": result, \"status\": \"success\"},\n            timestamp=datetime.now().isoformat(),\n            correlation_id=correlation_id,\n        )\n    \n    def to_context(self) -> str:\n        \"\"\"转为可注入 Agent 上下文的字符串\"\"\"\n        return json.dumps(asdict(self), ensure_ascii=False, indent=2)\n\nclass MessageBus:\n    \"\"\"简单的内存消息总线\"\"\"\n    def __init__(self):\n        self.queues: dict = {}\n    \n    def send(self, msg: AgentMessage):\n        if msg.receiver not in self.queues:\n            self.queues[msg.receiver] = []\n        self.queues[msg.receiver].append(msg)\n        print(f\"[Bus] {msg.sender} → {msg.receiver}: {msg.msg_type}\")\n    \n    def receive(self, agent_name: str) -> Optional[AgentMessage]:\n        queue = self.queues.get(agent_name, [])\n        return queue.pop(0) if queue else None\n\nbus = MessageBus()\ntask_msg = AgentMessage.create_task(\"orchestrator\", \"researcher\", \"搜集 Python 3.12 新特性\", {})\nbus.send(task_msg)\n\nreceived = bus.receive(\"researcher\")\nif received:\n    # 模拟 researcher Agent 处理任务\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=256,\n        messages=[{\"role\": \"user\", \"content\": f\"处理任务：{received.payload['description']}\"}],\n    )\n    result_msg = AgentMessage.create_result(\n        \"researcher\", \"orchestrator\",\n        resp.content[0].text[:100],\n        received.msg_id,\n    )\n    bus.send(result_msg)\n    print(\"结果:\", bus.receive(\"orchestrator\").payload[\"result\"])</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>标准化消息格式让 Agent 间通信可靠且可扩展</li><li>消息需包含发送方、接收方、类型、内容和元数据</li><li>消息总线解耦 Agent 间的直接依赖</li><li>correlation_id 用于追踪任务和结果的对应关系</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Agent 间消息中 correlation_id 字段的作用是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"a\"><span>存放消息内容的摘要</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"b\"><span>关联结果消息与原始任务消息，让接收方知道这个结果对应哪个请求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"c\"><span>记录消息的发送时间</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q22\" value=\"d\"><span>验证消息的合法性</span></label></div><div class=\"quiz-result\" id=\"q22-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现消息总线</h3><ol><li>实现上面的 MessageBus 和 AgentMessage，支持优先级队列。</li><li>模拟三个 Agent（orchestrator、researcher、writer）通过总线协作完成一个任务。</li><li>实现消息追踪：打印每条消息的完整流转路径。</li></ol></div></div>" },
