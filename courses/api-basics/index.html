<script>
const COURSE = {
  id: 'api-basics',
  title: 'Claude API 基础',
  modules: [
    {
      title: "API 入门与环境搭建",
      lessons: [
        { id: "what-is-claude-api", title: "什么是 Claude API？架构与核心概念", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>什么是 Claude API？架构与核心概念</h1><p class=\"lesson-lead\">Claude API 让你通过 HTTP 请求把 Anthropic 的大语言模型集成进自己的应用。本节带你建立整体的心智模型。</p></div><div class=\"lesson-body\"><h2>API 是什么</h2><p>Claude API 是一个基于 HTTPS 的 REST 接口。你的程序发送一段对话（messages），Anthropic 的服务器在云端运行 Claude 模型，再把生成的文本返回给你。你无需自己部署 GPU，也不用维护模型权重。</p><h2>核心组成</h2><ul><li><code>API Key</code>：身份凭证，标识“谁在调用”并用于计费。</li><li><code>Endpoint</code>：请求地址，最常用的是 <code>/v1/messages</code>。</li><li><code>Model</code>：你选择的模型，例如 <code>claude-sonnet-4</code>。</li><li><code>Messages</code>：多轮对话内容，由 user 与 assistant 角色交替组成。</li></ul><div class=\"card card-key\"><div class=\"card-label\">核心概念</div><p>Claude API 是<strong>无状态（stateless）</strong>的：服务器不会记住上一次请求。要实现多轮对话，必须在每次请求里把完整的历史消息再发一遍。</p></div><h2>一次请求的生命周期</h2><ol><li>你的应用构造 JSON 请求体（model + messages + 参数）。</li><li>带上 <code>x-api-key</code> 请求头发往 Anthropic 服务器。</li><li>模型推理并生成回复。</li><li>服务器返回 JSON，包含回复内容与 token 用量。</li></ol><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic(api_key=\"sk-ant-...\")\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=256,\n    messages=[{\"role\": \"user\", \"content\": \"用一句话介绍 Claude API\"}],\n)\nprint(resp.content[0].text)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Claude API 是基于 HTTPS 的无状态 REST 接口</li><li>核心要素：API Key、Endpoint、Model、Messages</li><li>多轮对话需要每次携带完整历史</li><li>计费按输入与输出的 token 量计算</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Claude API 是无状态的，这意味着什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>服务器会自动保存所有历史对话</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>每次请求都必须自行携带完整对话历史，服务器不记忆上一次请求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>API 不支持多轮对话</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q1\" value=\"d\"><span>必须在本地部署模型权重</span></label></div><div class=\"quiz-result\" id=\"q1-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>梳理一次 API 调用</h3><ol><li>画出从你的应用到 Anthropic 服务器再返回的完整流程图。</li><li>在流程中标注 API Key、model、messages 分别出现在哪一步。</li><li>思考：如果要让 Claude 记住三轮前说过的话，你需要怎么做？</li></ol></div></div>" },
        { id: "get-api-key", title: "申请 API Key 与账号配置", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 8 分钟</span></div><h1>申请 API Key 与账号配置</h1><p class=\"lesson-lead\">在写第一行代码之前，你需要一个 Anthropic 账号和一把 API Key。本节讲解注册、创建 Key 与环境变量配置。</p></div><div class=\"lesson-body\"><h2>注册与创建 Key</h2><ol><li>访问 Anthropic Console 并注册账号。</li><li>进入 <strong>API Keys</strong> 页面，点击 <em>Create Key</em>。</li><li>给 Key 起一个有意义的名字（如 <code>dev-laptop</code>），复制并妥善保存。</li></ol><div class=\"card card-warn\"><div class=\"card-label\">注意</div><p>API Key 只在创建时<strong>完整显示一次</strong>。关闭弹窗后将无法再次查看，只能重新生成。请立刻保存到安全的地方。</p></div><h2>用环境变量保存 Key</h2><p>不要把 Key 写死在代码里。推荐放进环境变量，SDK 会自动读取 <code>ANTHROPIC_API_KEY</code>。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">bash</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>export ANTHROPIC_API_KEY=\"sk-ant-xxxxxxxx\"</pre></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\n# 不传 api_key 时，SDK 自动读取 ANTHROPIC_API_KEY 环境变量\nclient = anthropic.Anthropic()\nprint(\"客户端已就绪\")</pre></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>开发中可使用 <code>.env</code> 文件配合 <code>python-dotenv</code> 管理密钥，并把 <code>.env</code> 加入 <code>.gitignore</code>。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>在 Anthropic Console 创建 API Key</li><li>Key 仅完整显示一次，务必立即保存</li><li>用环境变量 ANTHROPIC_API_KEY 而非硬编码</li><li>把密钥文件排除在版本控制之外</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>为什么推荐用环境变量保存 API Key 而不是写在代码里？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>环境变量运行更快</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>避免密钥被提交进代码仓库而泄露，并便于在不同环境间切换</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>SDK 只能从环境变量读取 Key</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q2\" value=\"d\"><span>环境变量可以让 Key 永不过期</span></label></div><div class=\"quiz-result\" id=\"q2-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>配置你的开发环境</h3><ol><li>在 Console 创建一把命名清晰的 API Key。</li><li>把它写入环境变量 ANTHROPIC_API_KEY。</li><li>新建 .gitignore 并加入 .env，验证密钥不会被 git 跟踪。</li></ol></div></div>" },
        { id: "hello-world", title: "安装 SDK 与第一个 Hello World", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块一</span><span>⏱ 10 分钟</span></div><h1>安装 SDK 与第一个 Hello World</h1><p class=\"lesson-lead\">环境就绪后，我们用官方 anthropic Python SDK 完成第一个真正的请求。</p></div><div class=\"lesson-body\"><h2>安装 SDK</h2><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">bash</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>pip install anthropic</pre></div><h2>第一个 Hello World</h2><p>下面的程序向 Claude 发送一条消息并打印回复。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\nclient = anthropic.Anthropic()\n\nmessage = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=1024,\n    messages=[\n        {\"role\": \"user\", \"content\": \"你好，Claude！请用中文跟我打个招呼。\"}\n    ],\n)\n\nprint(message.content[0].text)\nprint(\"input tokens:\", message.usage.input_tokens)\nprint(\"output tokens:\", message.usage.output_tokens)</pre></div><div class=\"card card-note\"><div class=\"card-label\">返回结构</div><p>回复在 <code>message.content</code> 中，它是一个内容块列表。文本块的实际文字在 <code>.text</code> 字段；<code>message.usage</code> 记录了本次的 token 用量。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>用 pip install anthropic 安装官方 SDK</li><li>messages.create 是发起对话的核心方法</li><li>回复文本在 message.content[0].text</li><li>message.usage 提供 token 计数</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在标准（非流式）响应中，Claude 生成的文本通常位于哪里？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>message.text</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>message.result</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>message.content[0].text</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q3\" value=\"d\"><span>message.choices[0].message</span></label></div><div class=\"quiz-result\" id=\"q3-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>跑通 Hello World</h3><ol><li>安装 anthropic SDK。</li><li>运行上面的程序，确认能看到 Claude 的回复。</li><li>修改 user 消息，让 Claude 用英文回复，观察输出变化。</li></ol></div></div>" },
      ]
    },
    {
      title: "Messages API 深度解析",
      lessons: [
        { id: "message-structure", title: "消息结构：role、content 与多轮对话", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 12 分钟</span></div><h1>消息结构：role、content 与多轮对话</h1><p class=\"lesson-lead\">messages 数组是 API 的核心。理解 role 与 content 的规则，是写好一切请求的基础。</p></div><div class=\"lesson-body\"><h2>role 的三种角色</h2><ul><li><code>user</code>：用户输入。</li><li><code>assistant</code>：Claude 的回复（用于提供历史，或做 prefill）。</li><li><code>system</code>：不在 messages 内，而是单独的 system 参数。</li></ul><h2>多轮对话</h2><p>要让 Claude 记住上下文，把每一轮都按时间顺序放进 messages，user 与 assistant 交替出现。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>messages = [\n    {\"role\": \"user\", \"content\": \"我叫小明。\"},\n    {\"role\": \"assistant\", \"content\": \"你好小明，很高兴认识你！\"},\n    {\"role\": \"user\", \"content\": \"我叫什么名字？\"},\n]\n\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=256,\n    messages=messages,\n)\nprint(resp.content[0].text)  # Claude 能答出 小明</pre></div><div class=\"card card-key\"><div class=\"card-label\">关键规则</div><p>messages 通常以 <code>user</code> 开头，且相邻消息角色应交替。content 既可以是字符串，也可以是内容块列表（用于图片、文档等多模态输入）。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>role 有 user 与 assistant 两种（system 单列）</li><li>多轮对话靠按顺序拼接历史消息实现</li><li>messages 一般以 user 开头并交替</li><li>content 可为字符串或内容块列表</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>要让 Claude 在多轮对话中记住前面的内容，正确做法是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"a\"><span>开启一个 memory 参数</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"b\"><span>在每次请求里把之前所有的 user 和 assistant 消息按顺序一并发送</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"c\"><span>只发送最后一条 user 消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q4\" value=\"d\"><span>把历史写进 API Key</span></label></div><div class=\"quiz-result\" id=\"q4-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>构造多轮对话</h3><ol><li>写一段三轮对话，让 Claude 记住你设定的一个事实。</li><li>故意只发最后一条消息，观察 Claude 是否还能记住。</li><li>总结：为什么无状态 API 下历史必须由客户端维护？</li></ol></div></div>" },
        { id: "system-prompt", title: "System Prompt：设定模型行为", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 10 分钟</span></div><h1>System Prompt：设定模型行为</h1><p class=\"lesson-lead\">System Prompt 是你给 Claude 的“岗位说明书”，用来设定身份、语气、规则与约束。</p></div><div class=\"lesson-body\"><h2>system 参数</h2><p>它独立于 messages，作为 <code>system</code> 参数传入，对整段对话全程生效。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>resp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=512,\n    system=\"你是一名严谨的中文法律助理。只回答与中国法律相关的问题，遇到其它问题礼貌拒绝，并始终提醒用户咨询专业律师。\",\n    messages=[{\"role\": \"user\", \"content\": \"签合同要注意什么？\"}],\n)\nprint(resp.content[0].text)</pre></div><div class=\"prompt-box\"><div class=\"prompt-header\"><span class=\"prompt-label\">System Prompt 范例</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><div class=\"prompt-body\">你是「小安」，一个友好、耐心的少儿英语口语老师。\n规则：\n1. 只用简单的英文单词，必要时附上中文解释。\n2. 每次回复不超过三句话。\n3. 多鼓励，少纠错。</div></div><div class=\"card card-tip\"><div class=\"card-label\">最佳实践</div><p>把<strong>稳定的角色与规则</strong>放进 system，把<strong>具体任务</strong>放进 user 消息。这样既清晰又便于复用与缓存。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>system 是独立参数，对整段对话生效</li><li>适合放角色、语气、规则与边界</li><li>稳定内容放 system，可变任务放 user</li><li>清晰的 system 能显著提升输出一致性</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>关于 System Prompt，下面哪个说法最准确？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"a\"><span>它是 messages 数组里的第一条 user 消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"b\"><span>它作为独立的 system 参数传入，用于设定角色与规则并对整段对话全程生效</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"c\"><span>它只在第一轮对话生效，之后失效</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q5\" value=\"d\"><span>它用来存放 API Key</span></label></div><div class=\"quiz-result\" id=\"q5-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>设计一个角色</h3><ol><li>为一个健身教练助手写一段 system prompt，包含身份、语气与两条规则。</li><li>用相同的 user 问题分别在有/无 system 的情况下提问。</li><li>对比两次回复，记录 system 带来的差异。</li></ol></div></div>" },
        { id: "model-params", title: "模型参数：temperature、max_tokens、top_p", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 12 分钟</span></div><h1>模型参数：temperature、max_tokens、top_p</h1><p class=\"lesson-lead\">采样参数决定了回复的随机性与长度。理解它们，才能在创意与稳定之间精准取舍。</p></div><div class=\"lesson-body\"><h2>三个关键参数</h2><ul><li><code>max_tokens</code>：本次回复最多生成的 token 数（必填，控制长度与成本上限）。</li><li><code>temperature</code>：0 到 1，越高越随机、越有创意；越低越确定、越一致。</li><li><code>top_p</code>：核采样，限制候选词的累积概率范围。一般与 temperature 二选一调节。</li></ul><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 需要稳定、可复现的结果（如分类、抽取）\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=128,\n    temperature=0.0,\n    messages=[{\"role\": \"user\", \"content\": \"把这句话情感分类为正面/负面：这家店太棒了\"}],\n)\nprint(resp.content[0].text)</pre></div><div class=\"card card-key\"><div class=\"card-label\">选择原则</div><p>追求<strong>一致与准确</strong>（分类、信息抽取、代码）用低 temperature（0–0.3）；追求<strong>多样与创意</strong>（头脑风暴、文案）用较高 temperature（0.7–1.0）。通常只调 temperature，不要同时大改 top_p。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>max_tokens 控制回复长度与成本上限，必填</li><li>temperature 低=确定，高=随机</li><li>top_p 与 temperature 一般二选一</li><li>确定性任务用低温，创意任务用高温</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>你要做情感分类，希望同样输入每次得到一致结果，应如何设置？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"a\"><span>temperature 设为 1.0</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"b\"><span>把 max_tokens 设到最大</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"c\"><span>temperature 设为接近 0，以获得最确定、可复现的输出</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q6\" value=\"d\"><span>随机设置 top_p</span></label></div><div class=\"quiz-result\" id=\"q6-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>调参对比</h3><ol><li>用同一个写一句广告语的提问，分别设 temperature=0 和 0.9，各跑三次。</li><li>记录两组结果的差异（重复度、创意度）。</li><li>总结这两类任务各自适合的温度区间。</li></ol></div></div>" },
        { id: "understanding-tokens", title: "理解 Token：计算、限制与成本控制", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块二</span><span>⏱ 12 分钟</span></div><h1>理解 Token：计算、限制与成本控制</h1><p class=\"lesson-lead\">Token 是模型处理文本的最小单位，也是计费与上下文限制的基础。本节教你估算和控制它。</p></div><div class=\"lesson-body\"><h2>什么是 Token</h2><p>模型不直接看字符，而是把文本切成 token。英文里一个 token 约 4 个字符；中文一个汉字往往是 1–2 个 token。输入和输出都计入用量。</p><h2>上下文窗口</h2><p>每个模型有最大上下文长度（输入+输出之和不能超过它）。对话越长，token 越多，成本越高，也越接近上限。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre># 发送前先用 count_tokens 估算输入规模\ncount = client.messages.count_tokens(\n    model=\"claude-sonnet-4-20250514\",\n    messages=[{\"role\": \"user\", \"content\": \"请总结这段很长的文章……\"}],\n)\nprint(\"estimated input tokens:\", count.input_tokens)</pre></div><div class=\"card card-note\"><div class=\"card-label\">计费</div><p>费用 = 输入 token × 输入单价 + 输出 token × 输出单价。输出通常比输入更贵。压缩历史、精简提示、限制 max_tokens 都能省钱。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Token 是模型处理与计费的最小单位</li><li>输入与输出都计入用量</li><li>上下文窗口限制 输入+输出 的总长度</li><li>count_tokens 可在发送前估算成本</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪项<strong>不会</strong>帮助你降低 token 成本？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"a\"><span>精简 system prompt 与历史消息</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"b\"><span>合理设置 max_tokens 上限</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"c\"><span>把 temperature 调高</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q7\" value=\"d\"><span>只保留与当前问题相关的上下文</span></label></div><div class=\"quiz-result\" id=\"q7-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>估算与优化</h3><ol><li>用 count_tokens 测量一段长文本的输入 token 数。</li><li>删掉冗余内容后再测一次，记录下降幅度。</li><li>估算：若每天处理一万次这样的请求，优化能省多少 token？</li></ol></div></div>" },
      ]
    },
    {
      title: "模型选择与流式输出",
      lessons: [
        { id: "choosing-model", title: "Haiku、Sonnet、Opus：如何选择？", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 10 分钟</span></div><h1>Haiku、Sonnet、Opus：如何选择？</h1><p class=\"lesson-lead\">Claude 家族提供不同档位的模型。学会按任务复杂度、延迟和成本来选型。</p></div><div class=\"lesson-body\"><h2>三个档位</h2><ul><li><code>Haiku</code>：最快、最便宜，适合高频、简单、对延迟敏感的任务（分类、抽取、路由）。</li><li><code>Sonnet</code>：速度与能力的平衡点，适合大多数生产场景。</li><li><code>Opus</code>：能力最强，适合复杂推理、长文写作与高难度编程。</li></ul><div class=\"card card-key\"><div class=\"card-label\">选型思路</div><p>先用<strong>能力最强的模型把效果跑通</strong>，再尝试降档到更便宜的模型，只要质量仍达标就采用。这样能在保证质量的前提下最小化成本。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>def pick_model(task_complexity: str) -&gt; str:\n    return {\n        \"simple\":   \"claude-haiku-4-20250514\",\n        \"balanced\": \"claude-sonnet-4-20250514\",\n        \"complex\":  \"claude-opus-4-20250514\",\n    }[task_complexity]\n\nmodel = pick_model(\"balanced\")</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Haiku 快而省，适合简单高频任务</li><li>Sonnet 平衡，覆盖大多数生产场景</li><li>Opus 最强，适合复杂推理与高难任务</li><li>先跑通效果再向下降档省成本</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>一个需要低延迟、高并发的简单意图分类服务，最合适的起点是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"a\"><span>Opus，因为它最聪明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"b\"><span>Haiku，因为它最快最便宜且足以胜任简单分类</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"c\"><span>必须三个模型一起用</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q8\" value=\"d\"><span>不该用 Claude 做分类</span></label></div><div class=\"quiz-result\" id=\"q8-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>为场景选型</h3><ol><li>列出你项目中的三个不同任务。</li><li>为每个任务选一个档位并写明理由。</li><li>对其中一个任务做 A/B：同一输入跑 Haiku 与 Sonnet，比较质量与延迟。</li></ol></div></div>" },
        { id: "streaming", title: "流式输出（Streaming）实战", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>流式输出（Streaming）实战</h1><p class=\"lesson-lead\">流式输出让文字像打字一样逐步呈现，大幅改善长回复的体验。本节讲解如何实现。</p></div><div class=\"lesson-body\"><h2>为什么要流式</h2><p>非流式要等整段生成完才返回；流式则边生成边推送，用户能立刻看到内容，感知延迟显著降低，尤其适合聊天界面。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>with client.messages.stream(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=1024,\n    messages=[{\"role\": \"user\", \"content\": \"写一首关于春天的短诗\"}],\n) as stream:\n    for text in stream.text_stream:\n        print(text, end=\"\", flush=True)\n\nfinal = stream.get_final_message()\nprint(\"\\noutput tokens:\", final.usage.output_tokens)</pre></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>SDK 的 <code>stream.text_stream</code> 已帮你处理好底层的 SSE 事件，直接迭代文本增量即可。需要完整对象时用 <code>get_final_message()</code>。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>流式边生成边返回，降低感知延迟</li><li>用 messages.stream 上下文管理器</li><li>迭代 text_stream 获取文本增量</li><li>get_final_message 拿到完整结果与用量</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>流式输出相比非流式，最主要的优势是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"a\"><span>总 token 数更少</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"b\"><span>用户能在生成过程中就看到逐步出现的文字，显著降低感知延迟</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"c\"><span>模型会更聪明</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q9\" value=\"d\"><span>不需要 API Key</span></label></div><div class=\"quiz-result\" id=\"q9-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>做一个流式聊天</h3><ol><li>用 messages.stream 实现一个命令行流式对话。</li><li>对比同样的问题在流式与非流式下的体验差异。</li><li>在流末尾打印本次输出的 token 用量。</li></ol></div></div>" },
        { id: "async-concurrency", title: "异步调用与并发处理", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块三</span><span>⏱ 12 分钟</span></div><h1>异步调用与并发处理</h1><p class=\"lesson-lead\">当你要同时处理大量请求时，异步与并发能大幅提升吞吐。本节介绍 AsyncAnthropic 与并发控制。</p></div><div class=\"lesson-body\"><h2>异步客户端</h2><p>SDK 提供 <code>AsyncAnthropic</code>，配合 <code>asyncio</code> 可以并发发起多个请求，而不必串行等待。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import asyncio\nimport anthropic\n\nclient = anthropic.AsyncAnthropic()\n\nasync def ask(prompt):\n    resp = await client.messages.create(\n        model=\"claude-haiku-4-20250514\",\n        max_tokens=128,\n        messages=[{\"role\": \"user\", \"content\": prompt}],\n    )\n    return resp.content[0].text\n\nasync def main():\n    prompts = [\"translate: hello\", \"translate: world\", \"translate: python\"]\n    results = await asyncio.gather(*[ask(p) for p in prompts])\n    for r in results:\n        print(r)\n\nasyncio.run(main())</pre></div><div class=\"card card-warn\"><div class=\"card-label\">注意速率限制</div><p>并发不是越高越好。账号有每分钟请求数与 token 的速率上限。用信号量（<code>asyncio.Semaphore</code>）限制同时在飞的请求数，避免触发 429。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>AsyncAnthropic 支持异步并发请求</li><li>asyncio.gather 可并行处理一批任务</li><li>并发能显著提升批量任务吞吐</li><li>用 Semaphore 控制并发以避开速率限制</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>做高吞吐批量处理时，为什么要用信号量限制并发数？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"a\"><span>让代码看起来更复杂</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"b\"><span>避免同时在飞的请求过多而触发账号的速率限制（429 错误）</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"c\"><span>信号量能让模型更准确</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q10\" value=\"d\"><span>并发数越高一定越快</span></label></div><div class=\"quiz-result\" id=\"q10-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>并发批处理</h3><ol><li>用 AsyncAnthropic 并发翻译 20 条短句。</li><li>加入一个 Semaphore(5) 限制并发，观察是否更稳定。</li><li>对比串行与并发两种方式的总耗时。</li></ol></div></div>" },
      ]
    },
    {
      title: "错误处理与生产实践",
      lessons: [
        { id: "error-codes", title: "常见错误码与处理策略", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>常见错误码与处理策略</h1><p class=\"lesson-lead\">生产环境一定会遇到错误。认识常见 HTTP 错误码并分类处理，是稳定服务的前提。</p></div><div class=\"lesson-body\"><h2>常见错误码</h2><ul><li><code>400</code> invalid_request：请求格式或参数错误，<strong>不应重试</strong>。</li><li><code>401</code> authentication：API Key 无效。</li><li><code>429</code> rate_limit：触发速率限制，<strong>应退避后重试</strong>。</li><li><code>500/529</code>：服务端错误或过载，<strong>可重试</strong>。</li></ul><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import anthropic\n\ntry:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-20250514\",\n        max_tokens=256,\n        messages=[{\"role\": \"user\", \"content\": \"你好\"}],\n    )\nexcept anthropic.RateLimitError:\n    print(\"rate limited, retry later\")\nexcept anthropic.AuthenticationError:\n    print(\"bad API key, check config\")\nexcept anthropic.APIStatusError as e:\n    print(\"other API error:\", e.status_code)</pre></div><div class=\"card card-key\"><div class=\"card-label\">分类原则</div><p>把错误分成<strong>可重试</strong>（429、500、529、网络超时）与<strong>不可重试</strong>（400、401、403）。前者退避重试，后者直接报错并修复请求本身。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>4xx 多为客户端问题，5xx/529 为服务端问题</li><li>429 限流应退避后重试</li><li>400/401 不应重试，需修正请求或密钥</li><li>SDK 提供分类好的异常类型便于捕获</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>收到 400 invalid_request 错误时，最合理的处理是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"a\"><span>立即原样重试，越快越好</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"b\"><span>无限重试直到成功</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"c\"><span>不要重试，检查并修正请求参数本身，因为重复发送同样的错误请求仍会失败</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q11\" value=\"d\"><span>切换 API Key 再发</span></label></div><div class=\"quiz-result\" id=\"q11-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>分类处理错误</h3><ol><li>列出 400、401、429、529 四种错误并标注是否可重试。</li><li>写一个函数，根据异常类型返回重试或不重试。</li><li>故意构造一个非法请求，观察 SDK 抛出的异常类型。</li></ol></div></div>" },
        { id: "retry-backoff", title: "重试机制与指数退避", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 12 分钟</span></div><h1>重试机制与指数退避</h1><p class=\"lesson-lead\">面对临时性故障，正确的重试策略能让服务自愈。核心是指数退避加随机抖动。</p></div><div class=\"lesson-body\"><h2>指数退避</h2><p>每次重试都把等待时间翻倍（1s、2s、4s……），并加入随机抖动，避免大量客户端同时重试造成惊群。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import time, random\nimport anthropic\n\ndef call_with_retry(client, **kwargs):\n    for attempt in range(5):\n        try:\n            return client.messages.create(**kwargs)\n        except (anthropic.RateLimitError, anthropic.InternalServerError):\n            wait = (2 ** attempt) + random.uniform(0, 1)  # backoff + jitter\n            print(f\"attempt {attempt+1} failed, retry in {wait:.1f}s\")\n            time.sleep(wait)\n    raise RuntimeError(\"still failing after retries\")</pre></div><div class=\"card card-tip\"><div class=\"card-label\">提示</div><p>官方 SDK 内置了对部分错误的自动重试，可用 <code>max_retries</code> 配置。理解原理后，你也能在更高层加上自定义退避逻辑。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>指数退避让等待时间随次数翻倍</li><li>加入随机抖动避免惊群效应</li><li>只对可重试错误进行重试</li><li>设置最大重试次数防止无限循环</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>指数退避中加入随机抖动（jitter）的主要目的是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"a\"><span>让代码更难读</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"b\"><span>避免大量客户端在同一时刻一起重试，从而分散负载、减少再次拥塞</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"c\"><span>增加总等待时间</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q12\" value=\"d\"><span>让重试次数更多</span></label></div><div class=\"quiz-result\" id=\"q12-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>实现自愈重试</h3><ol><li>实现一个带指数退避与抖动的重试包装函数。</li><li>设置最多 5 次、上限 30 秒。</li><li>用一个模拟会偶发失败的函数测试它能否最终成功。</li></ol></div></div>" },
        { id: "key-security", title: "API Key 安全管理", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>API Key 安全管理</h1><p class=\"lesson-lead\">API Key 等于你的钱包。一旦泄露，可能被盗刷或滥用。本节讲安全管理的关键做法。</p></div><div class=\"lesson-body\"><h2>核心原则</h2><ul><li><strong>绝不</strong>把 Key 写进前端代码或公开仓库。</li><li>用环境变量或密钥管理服务（如 Secrets Manager）存储。</li><li>为不同用途创建不同的 Key，便于隔离与吊销。</li><li>定期轮换；一旦怀疑泄露，立即在 Console 撤销。</li></ul><div class=\"card card-warn\"><div class=\"card-label\">前端绝对禁止</div><p>任何放在浏览器/移动端的 Key 都可被用户提取。正确做法是让前端调用<strong>你自己的后端</strong>，由后端持有 Key 再去请求 Claude API。</p></div><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>import os\n# read from environment, never hardcode\napi_key = os.environ[\"ANTHROPIC_API_KEY\"]\nclient = anthropic.Anthropic(api_key=api_key)</pre></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>永不在前端或公开仓库暴露 Key</li><li>用环境变量或密钥管理服务存储</li><li>按用途分配独立 Key 便于吊销</li><li>定期轮换，疑似泄露立即撤销</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>在一个手机 App 中调用 Claude API，安全的架构是？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"a\"><span>把 API Key 打包进 App，由手机直接请求 Claude</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"b\"><span>把 Key 写在前端配置文件里</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"c\"><span>让 App 调用自己的后端服务，由后端持有 Key 再去请求 Claude API</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q13\" value=\"d\"><span>把 Key 发给每个用户保管</span></label></div><div class=\"quiz-result\" id=\"q13-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>做一次安全自查</h3><ol><li>检查你的项目，确认没有任何 Key 出现在代码或 git 历史里。</li><li>为开发和生产分别创建独立 Key。</li><li>写下一份疑似泄露时的应急步骤清单。</li></ol></div></div>" },
        { id: "usage-monitoring", title: "用量监控与成本控制", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块四</span><span>⏱ 10 分钟</span></div><h1>用量监控与成本控制</h1><p class=\"lesson-lead\">上线后要持续盯住用量和花费。本节介绍如何监控 token、设预算与告警。</p></div><div class=\"lesson-body\"><h2>记录每次用量</h2><p>每次响应都带 <code>usage</code>，把它累计记录下来，就能掌握真实成本结构。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>total_in = total_out = 0\n\ndef tracked_call(client, **kwargs):\n    global total_in, total_out\n    resp = client.messages.create(**kwargs)\n    total_in += resp.usage.input_tokens\n    total_out += resp.usage.output_tokens\n    print(f\"cumulative in={total_in} out={total_out}\")\n    return resp</pre></div><div class=\"card card-note\"><div class=\"card-label\">控制手段</div><p>常用降本手段：选更便宜的模型、压缩提示与历史、限制 max_tokens、对重复前缀用 Prompt Caching、批量任务用 Batch API。再配合 Console 的用量看板与预算告警。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>每次响应的 usage 是成本的第一手数据</li><li>累计记录 token 以掌握成本结构</li><li>降本：选型、压缩、限长、缓存、批处理</li><li>在 Console 设置预算与用量告警</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>下面哪一组都是有效的成本控制手段？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"a\"><span>提高 temperature、增大 max_tokens</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"b\"><span>选更便宜的模型、压缩历史、限制 max_tokens、使用 Prompt Caching</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"c\"><span>把所有任务都换成 Opus</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q14\" value=\"d\"><span>关闭 usage 记录</span></label></div><div class=\"quiz-result\" id=\"q14-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>搭建用量监控</h3><ol><li>封装一个会累计 input/output token 的调用函数。</li><li>跑 50 次后估算单次平均成本。</li><li>在 Console 设一个预算告警阈值。</li></ol></div></div>" },
      ]
    },
    {
      title: "进阶功能预览",
      lessons: [
        { id: "prompt-caching", title: "提示词缓存（Prompt Caching）", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>提示词缓存（Prompt Caching）</h1><p class=\"lesson-lead\">当多次请求共享一大段相同前缀（如长 system 或文档），Prompt Caching 能省钱又提速。</p></div><div class=\"lesson-body\"><h2>原理</h2><p>把稳定不变的前缀标记为可缓存，服务器会缓存其计算结果。后续命中缓存的请求，这部分以更低的价格计费，且响应更快。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>resp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=512,\n    system=[\n        {\n            \"type\": \"text\",\n            \"text\": \"(a very long policy document, identical every time...)\",\n            \"cache_control\": {\"type\": \"ephemeral\"},  # mark as cacheable\n        }\n    ],\n    messages=[{\"role\": \"user\", \"content\": \"根据上面的政策，能退货吗？\"}],\n)\nprint(resp.usage)  # watch cache_read_input_tokens</pre></div><div class=\"card card-key\"><div class=\"card-label\">适用场景</div><p>最划算的情况是：<strong>同一大段前缀被多次复用</strong>，例如固定的长 system、知识库文档、few-shot 示例。变化频繁的内容放在缓存段<strong>之后</strong>。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>缓存稳定前缀的计算结果以复用</li><li>命中缓存的 token 更便宜、更快</li><li>用 cache_control 标记可缓存段</li><li>把可变内容放在缓存段之后</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>Prompt Caching 在以下哪种情况收益最大？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"a\"><span>每次请求内容完全不同，没有共享前缀</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"b\"><span>多次请求共享一大段相同的前缀（如固定长 system 或文档），只有末尾的问题不同</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"c\"><span>只调用一次的请求</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q15\" value=\"d\"><span>只想提高 temperature 时</span></label></div><div class=\"quiz-result\" id=\"q15-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>用缓存省钱</h3><ol><li>构造一段超长的固定 system 文档。</li><li>对它连续提多个不同问题，观察 cache_read_input_tokens 的变化。</li><li>估算缓存命中后节省的成本比例。</li></ol></div></div>" },
        { id: "batch-api", title: "Batch API：批量处理", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 10 分钟</span></div><h1>Batch API：批量处理</h1><p class=\"lesson-lead\">对不要求实时的大批量任务，Batch API 以更低的价格异步处理，非常适合离线作业。</p></div><div class=\"lesson-body\"><h2>什么时候用</h2><p>当你有成千上万条可以晚点再要结果的请求（如批量打标、离线评测、内容生成），用 Batch API 一次性提交，系统在后台处理，价格通常更优惠。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>batch = client.messages.batches.create(\n    requests=[\n        {\n            \"custom_id\": f\"req-{i}\",\n            \"params\": {\n                \"model\": \"claude-haiku-4-20250514\",\n                \"max_tokens\": 128,\n                \"messages\": [{\"role\": \"user\", \"content\": text}],\n            },\n        }\n        for i, text in enumerate([\"translate:cat\", \"translate:dog\", \"translate:fish\"])\n    ]\n)\nprint(\"batch submitted:\", batch.id)  # poll status then fetch results</pre></div><div class=\"card card-note\"><div class=\"card-label\">权衡</div><p>Batch 用<strong>更低价格</strong>换<strong>非实时</strong>：结果通常在一段时间内异步返回。需要立刻拿到回复的场景仍用普通 Messages API。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>Batch API 适合大批量、非实时任务</li><li>一次提交多条请求，后台异步处理</li><li>价格通常比实时调用更优惠</li><li>每条请求用 custom_id 标识以便对应结果</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>以下哪个场景最适合用 Batch API 而不是实时 Messages API？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"a\"><span>面向用户的实时聊天机器人</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"b\"><span>需要毫秒级响应的自动补全</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"c\"><span>离线给十万条评论批量打情感标签，结果可以稍后再取</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q16\" value=\"d\"><span>一次性的单条问答</span></label></div><div class=\"quiz-result\" id=\"q16-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>提交一个批次</h3><ol><li>构造 10 条翻译请求，每条带唯一 custom_id。</li><li>用 batches.create 提交并记录批次 id。</li><li>轮询状态，完成后按 custom_id 取回并核对结果。</li></ol></div></div>" },
        { id: "next-steps-agent", title: "下一步：工具调用与 Agent", html: "<div class=\"lesson-header\"><div class=\"lesson-meta\"><span class=\"module-tag\">模块五</span><span>⏱ 8 分钟</span></div><h1>下一步：工具调用与 Agent</h1><p class=\"lesson-lead\">你已掌握 Claude API 的基础。接下来通往更强大的能力：工具调用与自主 Agent。</p></div><div class=\"lesson-body\"><h2>从对话到行动</h2><p>普通对话只能说。通过<strong>工具调用（Tool Use）</strong>，Claude 可以请求你的程序去查数据库、调 API、执行代码，再根据结果继续回答，这让它能真正做事。</p><h2>Agent 的雏形</h2><p>把调用工具、观察结果、再决策放进一个循环，Claude 就能自主地多步完成复杂任务，这就是 Agent 的基本形态。</p><div class=\"code-block\"><div class=\"cb-header\"><span class=\"cb-lang\">python</span><button class=\"copy-btn\" onclick=\"copyPrompt(this)\">复制</button></div><pre>tools = [{\n    \"name\": \"get_weather\",\n    \"description\": \"query realtime weather for a city\",\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\"city\": {\"type\": \"string\"}},\n        \"required\": [\"city\"],\n    },\n}]\n\nresp = client.messages.create(\n    model=\"claude-sonnet-4-20250514\",\n    max_tokens=512,\n    tools=tools,\n    messages=[{\"role\": \"user\", \"content\": \"北京今天天气怎么样？\"}],\n)\nprint(resp.stop_reason)  # may be \"tool_use\"</pre></div><div class=\"card card-success\"><div class=\"card-label\">学习路线</div><p>建议下一步学习《提示词工程》打磨指令质量，再学《工具调用与 Function Calling》让 Claude 连接真实世界，最终构建属于你的 Agent。</p></div><div class=\"key-points\"><h3>本节要点</h3><ul><li>工具调用让 Claude 从说走向做</li><li>Claude 返回 tool_use 请求，由你的程序执行</li><li>调用、观察、决策的循环构成 Agent</li><li>下一步：提示词工程与工具调用课程</li></ul></div><div class=\"quiz\"><div class=\"quiz-label\">随堂测验</div><h3>工具调用（Tool Use）给 Claude 带来的最核心的新能力是什么？</h3><div class=\"quiz-options\"><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"a\"><span>让模型回复更长</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"b\"><span>让 Claude 能请求你的程序执行外部操作（查数据、调 API、跑代码）并据其结果继续作答，从说走向做</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"c\"><span>降低 token 成本</span></label><label class=\"quiz-option\"><input type=\"radio\" name=\"q17\" value=\"d\"><span>替代 API Key</span></label></div><div class=\"quiz-result\" id=\"q17-result\"></div></div><div class=\"exercise\"><div class=\"exercise-label\">动手练习</div><h3>规划你的第一个 Agent</h3><ol><li>写下一个你想让 Claude 自主完成的多步任务。</li><li>列出它需要的 2–3 个工具及各自的输入。</li><li>画出调用工具、观察、再决策的循环草图。</li></ol></div></div>" },
      ]
    },
  ],
  answers: { q1: 'b', q2: 'b', q3: 'c', q4: 'b', q5: 'b', q6: 'c', q7: 'c', q8: 'b', q9: 'b', q10: 'b', q11: 'c', q12: 'b', q13: 'c', q14: 'b', q15: 'b', q16: 'c', q17: 'b' }
